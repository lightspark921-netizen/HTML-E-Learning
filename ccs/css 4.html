<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 4 - CSS Typography & Fonts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #1a1a1a;
            --css-blue: #2196f3; /* เปลี่ยนเป็นสีฟ้า CSS */
            --typo-purple: #6c5ce7;
            --desk: #e0e0e0;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 850px; /* ขยายความสูงเพิ่ม */
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: var(--typo-purple); left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid #4834d4; box-shadow: 15px 0 50px rgba(0,0,0,0.3);
            cursor: pointer; backface-visibility: hidden;
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 50px 60px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--typo-purple); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; font-weight: 700; font-size: 1.8rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 25px; font-weight: 700; border-left: 4px solid var(--typo-purple); padding-left: 12px; font-size: 1.2rem; }
        p { line-height: 1.7; font-size: 1rem; color: #2d3436; margin-bottom: 1.2rem; text-align: justify; }

        .code-block { 
            background: #2d3436; color: #dfe6e9; padding: 18px; 
            border-radius: 10px; font-family: 'Fira Code', monospace; 
            font-size: 0.85rem; margin: 15px 0; border-right: 5px solid var(--typo-purple);
            line-height: 1.5;
        }
        
        .property { color: #81ecec; } .value { color: #fab1a0; } .comment { color: #636e72; font-style: italic; }

        .tip-box { background: #f0f3ff; border-radius: 10px; padding: 15px; border-left: 5px solid var(--typo-purple); margin: 20px 0; font-size: 0.9rem; }
        
        .font-demo { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: white; margin: 10px 0; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: #2d3436; color: white; border: none; padding: 8px 25px; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-nav:hover:not(:disabled) { background: var(--typo-purple); transform: translateY(-2px); }
        
        #editor { width: 100%; height: 220px; font-family: 'Fira Code', monospace; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        #live-preview { width: 100%; height: 250px; background: white; border: 2px dashed #bbb; border-radius: 8px; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
         <div style="width:140px; height:140px; background:rgba(255,255,255,0.1); border: 2px dashed white; border-radius:15px; display:flex; align-items:center; justify-content:center; margin-bottom:25px; transform: rotate(-5deg);">
            <span style="font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: bold;">Aa</span>
        </div>
        <h1 class="display-5 fw-bold" style="font-family: 'Chakra Petch';">CSS Typography</h1>
        <p class="lead">THE ART OF DIGITAL FONTS</p>
        <div style="width: 100px; height: 5px; background: white; margin: 20px 0; border-radius: 2px;"></div>
        <h5 class="fw-bold">UNIT 04: FONTS & STYLING</h5>
        <p class="small opacity-75">ศาสตร์แห่งการใช้ตัวอักษรเพื่อสร้างอารมณ์ให้เว็บไซต์</p>
        <div class="mt-4 small animate-bounce"><i class="bi bi-mouse-fill"></i> คลิกเพื่อเปิดบทเรียน</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_css.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            <div class="fw-bold text-muted">หน้า <span id="pageNum">1</span> / <span id="totalPage"></span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. พลังของ Typography</h2>
            <p>ถ้านายคิดว่าฟอนต์เป็นแค่ตัวหนังสือ นายกำลังพลาดแล้ว! ในโลกของ Web Design ตัวอักษรคือ 95% ของเนื้อหาทั้งหมด การเลือกฟอนต์ที่ถูกต้องช่วยเพิ่มการอ่าน (Readability) และสื่ออารมณ์ของแบรนด์ได้ทันที</p>
            <h4>Font Families</h4>
            <p>CSS แบ่งกลุ่มฟอนต์หลักๆ เป็น 5 ประเภทที่เราต้องรู้จักเพื่อใช้ทำ "Fallback":</p>
            <ul>
                <li><b>Serif:</b> มีหัว (ขีดเล็กๆ ที่ปลาย) ดูหรูหรา ทางการ เช่น Times New Roman</li>
                <li><b>Sans-serif:</b> ไม่มีหัว ดูทันสมัย เรียบง่าย เช่น Arial, Helvetica</li>
                <li><b>Monospace:</b> ตัวอักษรกว้างเท่ากันทุกตัว เหมาะกับเขียนโค้ด</li>
                <li><b>Cursive:</b> ลายมือเขียน</li>
                <li><b>Display:</b> เน้นความสวยงาม ใช้สำหรับหัวข้อใหญ่</li>
            </ul>
            <div class="tip-box">
                <i class="bi bi-info-circle-fill"></i> <b>กฎเหล็ก:</b> อย่าใช้ฟอนต์เกิน 2-3 แบบในหนึ่งหน้าเว็บ เพราะจะทำให้เว็บดูรกและโหลดช้า
            </div>
        `,
        right: `
            <h4>การประกาศ Font Family</h4>
            <p>เราควรประกาศฟอนต์สำรองไว้เสมอ เผื่อเครื่องผู้ใช้ไม่มีฟอนต์ที่เราต้องการ</p>
            <div class="code-block">
                <span class="property">font-family</span>: <span class="value">'Sarabun', 'Helvetica', sans-serif</span>;
            </div>
            <p><b>ทำไมต้องมี Font Fallback?</b><br>
            เบราว์เซอร์จะอ่านจากซ้ายไปขวา ถ้าเครื่องนายไม่มี 'Sarabun' มันจะไปหา 'Helvetica' และถ้าไม่มีจริงๆ มันจะใช้ฟอนต์ 'sans-serif' มาตรฐานของเครื่องนั้นแทน</p>
            <div class="font-demo">
                <p style="font-family: serif; margin:0;">ตัวอย่าง Serif: The quick brown fox.</p>
                <hr>
                <p style="font-family: sans-serif; margin:0;">ตัวอย่าง Sans-serif: The quick brown fox.</p>
            </div>
            <p>การเลือกฟอนต์ที่เข้ากัน (Font Pairing) เช่น หัวข้อเป็น Serif เนื้อหาเป็น Sans-serif จะทำให้เว็บดูเป็นมืออาชีพมาก</p>
        `
    },
    {
        left: `
            <h2>2. การควบคุมขนาด (Font Size)</h2>
            <p>การกำหนดขนาดไม่ใช่แค่ใส่ตัวเลข แต่นายต้องเข้าใจ "หน่วย" ที่ใช้เพื่อให้เว็บรองรับทุกหน้าจอ (Responsive):</p>
            <h4>หน่วยที่ควรรู้:</h4>
            <ul>
                <li><b>px (Pixels):</b> ขนาดคงที่ แม่นยำ แต่ไม่ขยายตามการตั้งค่าของผู้ใช้</li>
                <li><b>em:</b> อ้างอิงตามขนาดฟอนต์ของ Parent</li>
                <li><b>rem (Root em):</b> อ้างอิงตามขนาดฟอนต์ของ HTML (แนะนำที่สุด!)</li>
                <li><b>%:</b> อ้างอิงตาม Element รอบข้าง</li>
            </ul>
            <div class="code-block">
                <span class="comment">/* แนะนำให้ใช้ rem เพื่อ Accessibility */</span><br>
                <span class="property">html</span> { <span class="property">font-size</span>: <span class="value">16px</span>; }<br>
                <span class="property">h1</span> { <span class="property">font-size</span>: <span class="value">2.5rem</span>; } <span class="comment">/* = 40px */</span>
            </div>
        `,
        right: `
            <h4>Weight & Style</h4>
            <p>นอกจากการปรับขนาด นายยังปรับความหนาและรูปแบบได้หลากหลาย:</p>
            <div class="code-block">
                <span class="property">font-weight</span>: <span class="value">700</span>; <span class="comment">/* หนา (Bold) */</span><br>
                <span class="property">font-style</span>: <span class="value">italic</span>; <span class="comment">/* เอียง */</span><br>
                <span class="property">text-transform</span>: <span class="value">uppercase</span>; <span class="comment">/* ตัวพิมพ์ใหญ่หมด */</span>
            </div>
            <p><b>Pro Tip:</b> ความหนาของฟอนต์ (Weight) มีตั้งแต่ 100 (Thin) ถึง 900 (Black) แต่ต้องเช็คด้วยว่าฟอนต์ที่โหลดมามีครบทุก Weight ไหม</p>
            <div class="font-demo" style="text-align:center;">
                <span style="font-weight: 100;">Thin</span> | 
                <span style="font-weight: 400;">Regular</span> | 
                <span style="font-weight: 700;">Bold</span> | 
                <span style="font-weight: 900;">Black</span>
            </div>
            <p>การระบุตัวเลข (เช่น 400, 700) จะแม่นยำกว่าการใช้คำว่า 'bold' หรือ 'normal'</p>
        `
    },
    {
        left: `
            <h2>3. ระยะบรรทัดและการจัดวาง</h2>
            <p>เว็บที่อ่านง่ายต้องมี "พื้นที่หายใจ" นายควรปรับระยะบรรทัด (Line Height) ให้เหมาะสม ไม่ให้ตัวหนังสือเบียดกันเกินไป</p>
            <h4>Line Height & Letter Spacing</h4>
            <p><b>Line Height:</b> ปกติควรอยู่ที่ 1.5 - 1.6 สำหรับเนื้อหาทั่วไป</p>
            <div class="code-block">
                <span class="property">line-height</span>: <span class="value">1.6</span>; <span class="comment">/* ไม่ต้องใส่หน่วย */</span><br>
                <span class="property">letter-spacing</span>: <span class="value">1px</span>; <span class="comment">/* ระยะห่างตัวอักษร */</span>
            </div>
            <p>ฟอนต์ภาษาไทยมักจะมีสระบน-ล่างเยอะ การปรับ <code>line-height</code> ให้กว้างกว่าภาษาอังกฤษเล็กน้อยจะช่วยให้อ่านง่ายขึ้นมากครับ</p>
        `,
        right: `
            <h4>การจัดตำแหน่ง (Text Align)</h4>
            <p>การวางตำแหน่งข้อความส่งผลต่อพฤติกรรมการกวาดสายตา:</p>
            <div class="code-block">
                <span class="property">text-align</span>: <span class="value">left</span>; <span class="comment">/* มาตรฐาน */</span><br>
                <span class="property">text-align</span>: <span class="value">center</span>; <span class="comment">/* สำหรับหัวข้อ */</span><br>
                <span class="property">text-align</span>: <span class="value">justify</span>; <span class="comment">/* ขอบเรียบทั้งสองข้าง */</span>
            </div>
            <div class="tip-box">
                <i class="bi bi-exclamation-triangle-fill"></i> <b>Caution:</b> <code>text-align: justify</code> ในภาษาไทยอาจทำให้เกิดช่องว่างที่ดูแปลกๆ ได้ ควรใช้ระวังเป็นพิเศษ
            </div>
            <p><b>Text Indent:</b> การย่อหน้าบรรทัดแรก:</p>
            <div class="code-block">
                <span class="property">text-indent</span>: <span class="value">40px</span>;
            </div>
        `
    },
    {
        left: `
            <h2>4. การใช้ Web Fonts (Google Fonts)</h2>
            <p>เราไม่ได้ถูกจำกัดอยู่แค่ฟอนต์ในเครื่องอีกต่อไป นายสามารถดึงฟอนต์สวยๆ จากทั่วโลกมาใช้ได้ฟรีผ่าน Google Fonts</p>
            <h4>ขั้นตอนการใช้งาน:</h4>
            <ol>
                <li>ไปที่ <code>fonts.google.com</code></li>
                <li>เลือกฟอนต์และ Weight ที่ต้องการ</li>
                <li>Copy โค้ด <code>&lt;link&gt;</code> ไปแปะใน <code>&lt;head&gt;</code> ของ HTML</li>
                <li>เรียกใช้ใน CSS ผ่าน <code>font-family</code></li>
            </ol>
            <div class="tip-box" style="background:#fff3cd;">
                <i class="bi bi-lightning-fill"></i> <b>Performance:</b> ยิ่งโหลดฟอนต์หลายแบบ เว็บยิ่งโหลดช้า เลือกเฉพาะที่จำเป็นจริงๆ เท่านั้นนะเพื่อน!
            </div>
        `,
        right: `
            <h4>การใช้ @font-face</h4>
            <p>ถ้ามีไฟล์ฟอนต์เอง (เช่น .woff2) นายสามารถอัปโหลดขึ้น Server และสั่งงานได้แบบนี้:</p>
            <div class="code-block">
                <span class="property">@font-face</span> {<br>
                &nbsp;&nbsp;<span class="property">font-family</span>: <span class="value">'MyCustomFont'</span>;<br>
                &nbsp;&nbsp;<span class="property">src</span>: <span class="value">url('fonts/myfont.woff2')</span> format('woff2');<br>
                }
            </div>
            <p><b>ข้อดีของ WOFF2:</b> เป็นรูปแบบไฟล์ฟอนต์ที่บีบอัดมาดีที่สุดสำหรับยุคปัจจุบัน โหลดไวและรองรับเบราว์เซอร์หลักๆ ครบถ้วน</p>
            <p>อย่าลืมเรื่องลิขสิทธิ์ฟอนต์ด้วยล่ะ! ถ้าไม่ใช่ Google Fonts ต้องเช็คดีๆ ว่าเขาให้นำมาใช้บนเว็บได้ไหม</p>
        `
    },
    {
        left: `
            <h2>5. ลูกเล่น Text Effects</h2>
            <p>เพิ่มความลึกและมิติให้ตัวอักษรด้วยเงา (Shadow) และการขีดเขียน</p>
            <h4>Text Shadow</h4>
            <p>โครงสร้าง: <code>x-offset | y-offset | blur-radius | color</code></p>
            <div class="code-block">
                <span class="property">text-shadow</span>: <span class="value">2px 2px 4px rgba(0,0,0,0.3)</span>;
            </div>
            <h4>Text Decoration</h4>
            <p>ใช้สำหรับขีดเส้นใต้ หรือลบเส้นใต้จากลิงก์:</p>
            <div class="code-block">
                <span class="property">text-decoration</span>: <span class="value">none</span>; <span class="comment">/* ลบเส้นใต้ลิงก์ */</span><br>
                <span class="property">text-decoration</span>: <span class="value">underline wavy red</span>; <span class="comment">/* เส้นหยักสีแดง */</span>
            </div>
        `,
        right: `
            <h4>การจัดการข้อความล้น (Overflow)</h4>
            <p>ถ้านายมีข้อความยาวเกินพื้นที่ นายสามารถสั่งให้มันกลายเป็นจุดไข่ปลา (...) ได้:</p>
            <div class="code-block">
                <span class="property">white-space</span>: <span class="value">nowrap</span>;<br>
                <span class="property">overflow</span>: <span class="value">hidden</span>;<br>
                <span class="property">text-overflow</span>: <span class="value">ellipsis</span>;
            </div>
            <div class="font-demo">
                <p style="width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid #ccc; margin:0;">
                    นี่คือข้อความที่ยาวมากๆ จนต้องถูกตัดออกเป็นจุดไข่ปลา
                </p>
            </div>
            <p>เหมาะมากสำหรับการทำหัวข้อข่าวในหน้า Dashboard ที่มีพื้นที่จำกัด</p>
        `
    },
    {
        left: `
            <h2>6. การจัดช่องว่างขั้นสูง</h2>
            <p>นักออกแบบระดับโลกให้ความสำคัญกับ "Vertical Rhythm" หรือจังหวะการอ่านในแนวตั้ง</p>
            <h4>Word Spacing</h4>
            <p>ห่างระหว่างคำ (มักใช้กับภาษาอังกฤษ):</p>
            <div class="code-block">
                <span class="property">word-spacing</span>: <span class="value">5px</span>;
            </div>
            <h4>Text Rendering</h4>
            <p>สั่งให้เบราว์เซอร์วาดตัวอักษรให้คมชัดที่สุด:</p>
            <div class="code-block">
                <span class="property">text-rendering</span>: <span class="value">optimizeLegibility</span>;
            </div>

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

            if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'css 5.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            preview.innerHTML = code;
        }
    }
</script>
