<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 8 - PHP Sessions & Cookies Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #2d3436;
            --php-purple: #777bb4;
            --dark-purple: #4f5b93;
            --cookie-gold: #d35400;
            --desk: #bdc3c7;
            --preview-bg: #ffffff;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        /* Animation for floating cookies */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 800px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: var(--php-purple); left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid var(--dark-purple); box-shadow: 15px 0 50px rgba(0,0,0,0.3);
            cursor: pointer; backface-visibility: hidden;
            background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.1) 0%, transparent 20%);
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 40px 60px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--dark-purple); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; font-weight: 700; font-size: 1.6rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 20px; font-weight: 700; border-left: 4px solid var(--php-purple); padding-left: 10px; font-size: 1.1rem; }
        p { line-height: 1.6; font-size: 0.95rem; color: #333; margin-bottom: 1rem; }

        .code-block { 
            background: #2d3436; color: #dfe6e9; padding: 15px; 
            border-radius: 10px; font-family: 'Consolas', monospace; 
            font-size: 0.8rem; margin-top: 15px; border-left: 5px solid var(--php-purple);
            line-height: 1.4;
        }

        .tip-box { background: #f0f3ff; border-radius: 8px; padding: 12px; border-left: 5px solid var(--php-purple); margin: 15px 0; font-size: 0.85rem; }
        .tag-badge { background: #dfe6e9; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; color: var(--dark-purple); font-size: 0.85rem; }

        #editor { width: 100%; height: 180px; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: #fff; }
        #live-preview { width: 100%; height: 220px; background: white; border: 2px dashed #bbb; border-radius: 8px; padding: 10px; overflow: auto; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--dark-purple); color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .btn-nav:hover:not(:disabled) { background: var(--php-purple); transform: translateY(-2px); }
        .btn-next-chapter { background: #27ae60; }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
        <div style="position:relative; margin-bottom:20px;">
            <i class="bi bi-cookie" style="font-size:5rem; color:#f39c12; animation: float 3s ease-in-out infinite;"></i>
            <i class="bi bi-shield-lock-fill" style="position:absolute; bottom:0; right:0; font-size:2.5rem; color:white;"></i>
        </div>
        <h1 class="display-4 fw-bold" style="font-family: 'Chakra Petch';">PHP 8</h1>
        <p class="lead fw-bold">SESSIONS & COOKIES</p>
        <div style="width: 100px; height: 4px; background: #f39c12; margin: 15px 0; border-radius: 2px;"></div>
        <h5 class="fw-bold">UNIT 08: STATE MANAGEMENT</h5>
        <p class="small opacity-75">การจัดการสถานะและข้อมูลความปลอดภัยของผู้ใช้</p>
        <div class="mt-4 small opacity-75"><i class="bi bi-hand-index-thumb"></i> คลิกเพื่อเริ่มเจาะลึกระบบหลังบ้าน</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_php.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            <div class="fw-bold text-muted">หน้า <span id="pageNum">1</span> / <span id="totalPage">8</span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. ความเข้าใจเรื่อง State</h2>
            <p>โดยปกติแล้ว <b>HTTP Protocol</b> เป็นระบบที่เรียกว่า "Stateless" หมายความว่า Server จะจำไม่ได้เลยว่าใครเป็นใครหลังจากส่งหน้าเว็บเสร็จแล้ว</p>
            <h4>ทำไมต้องมี Sessions & Cookies?</h4>
            <p>ลองนึกภาพนายกำลังซื้อของใน Shopee แล้วทุกครั้งที่กดเปลี่ยนหน้า สินค้าในตะกร้าหายไปหมด เพราะ Server จำไม่ได้ว่านายคือคนเดิม นั่นคือสาเหตุที่เราต้องมีตัวช่วยจำ</p>
            <div class="tip-box">
                <i class="bi bi-info-circle"></i> <b>สรุปสั้นๆ:</b> Cookies เก็บไว้ที่เครื่อง <b>User</b> ส่วน Sessions เก็บไว้ที่เครื่อง <b>Server</b>
            </div>
        `,
        right: `
            <h4>เปรียบเทียบให้เห็นภาพ</h4>
            <p><b>Cookies:</b> เหมือนบัตรสมาชิกที่นายพกไว้ในกระเป๋าตังค์ตัวเอง นายต้องเอามาโชว์ให้ร้านดูทุกครั้ง (เครื่องเราเก็บเอง)</p>
            <p><b>Sessions:</b> เหมือนฝากของไว้ใน Locker ที่ร้าน ร้านจะให้แค่ "ลูกกุญแจ" (Session ID) มาถือนิดเดียว ข้อมูลจริงๆ อยู่ที่ร้าน (Server เก็บให้)</p>
            <div class="code-block">
                // ตัวอย่างความต่าง<br>
                $_COOKIE['user_theme']; // อ่านจากเครื่องนาย<br>
                $_SESSION['user_id'];   // อ่านจากฐานข้อมูล Server
            </div>
        `
    },
    {
        left: `
            <h2>2. การสร้าง Cookie</h2>
            <p>ใน PHP เราใช้ฟังก์ชัน <code>setcookie()</code> ซึ่งต้องเรียก <b>ก่อน</b> ที่จะมีการส่ง HTML ใดๆ ออกไป (ห้าม echo อะไรก่อนเด็ดขาด!)</p>
            <div class="code-block">
                setcookie(name, value, expire, path);
            </div>
            <h4>พารามิเตอร์ที่สำคัญ:</h4>
            <ul>
                <li><b>Name:</b> ชื่อของคุกกี้</li>
                <li><b>Value:</b> ข้อมูลที่จะเก็บ (แนะนำให้เข้ารหัส)</li>
                <li><b>Expire:</b> เวลาหมดอายุ (Unix Timestamp)</li>
            </ul>
        `,
        right: `
            <h4>ตัวอย่างการตั้งค่า 1 วัน</h4>
            <div class="code-block">
                $time = time() + (86400 * 1);<br>
                setcookie("user_login", "Somchai", $time, "/");
            </div>
            <p>ถ้าไม่ตั้งเวลาหมดอายุ คุกกี้จะหายไปทันทีที่นายปิด Browser (Session Cookie)</p>
            <div class="tip-box" style="border-color: #e67e22;">
                <i class="bi bi-exclamation-triangle"></i> <b>คำเตือน:</b> อย่าเก็บรหัสผ่านไว้ใน Cookie ตรงๆ เพราะใครก็แอบดูในเครื่องเราได้!
            </div>
        `
    },
    {
        left: `
            <h2>3. การอ่านและการลบคุกกี้</h2>
            <p>เมื่อคุกกี้ถูกสร้างแล้ว เราสามารถดึงมาใช้งานได้ง่ายๆ ผ่าน Global Variable <code>$_COOKIE</code></p>
            <div class="code-block">
                if(isset($_COOKIE['user_login'])) {<br>
                &nbsp;&nbsp;echo "ยินดีต้อนรับ " . $_COOKIE['user_login'];<br>
                }
            </div>
            <h4>วิธีกำจัดคุกกี้ (Logout)</h4>
            <p>ตลกดีที่ PHP ไม่มีฟังก์ชัน <code>removeCookie</code> แต่นายต้องใช้การ "สั่งให้มันหมดอายุย้อนหลัง" แทน</p>
        `,
        right: `
            <h4>Code สำหรับลบทิ้ง:</h4>
            <div class="code-block">
                // ตั้งเวลาให้ติดลบ (ย้อนอดีต)<br>
                setcookie("user_login", "", time() - 3600, "/");
            </div>
            <p>การลบคุกกี้สำคัญมากในระบบจำพวก "จดจำการเข้าสู่ระบบ" (Remember Me) เพื่อความปลอดภัยเมื่อผู้ใช้ต้องการออกจากระบบจริงจัง</p>
        `
    },
    {
        left: `
            <h2>4. จุดเริ่มต้นของ Session</h2>
            <p>Session ปลอดภัยกว่า Cookie มากเพราะข้อมูลจะถูกเก็บไว้ที่ฝั่ง Server ทั้งหมด โดย Server จะสร้าง <b>Session ID</b> ส่งไปเก็บไว้ใน Cookie เครื่อง User เพื่อใช้เป็นกุญแจยืนยันตัวตน</p>
            <h4>การเริ่มต้นใช้งาน</h4>
            <p>ทุกหน้าของ PHP ที่ต้องการใช้ Session นายต้องเปิดประตูด้วยคำสั่งนี้ที่บรรทัดบนสุดเสมอ:</p>
            <div class="code-block">
                &lt;?php<br>
                session_start();<br>
                // เริ่มทำงานต่อได้...
            </div>
        `,
        right: `
            <div class="tip-box">
                <i class="bi bi-lightbulb"></i> <b>Pro Tip:</b> ถ้านายขี้เกียจเขียน <code>session_start()</code> ทุกหน้า นายสามารถตั้งค่าใน <code>php.ini</code> ให้เป็น <code>session.auto_start = 1</code> ได้ แต่นักพัฒนาส่วนใหญ่ไม่ค่อยทำกันเพราะมันเปลืองทรัพยากรโดยไม่จำเป็น
            </div>
            <p>เมื่อสั่งเริ่มแล้ว PHP จะไปหาดูว่าในเครื่อง User มี Session ID ไหม ถ้าไม่มีมันจะสร้างให้ใหม่เอี่ยมทันที!</p>
        `
    },
    {
        left: `
            <h2>5. การจัดการข้อมูล Session (จัดเต็ม)</h2>
            <p>นี่คือหัวใจของการทำระบบ Login และระบบตะกร้าสินค้า ข้อมูลใน Session จะอยู่ในรูปแบบ <b>Associative Array</b> ซึ่งนายสามารถยัดข้อมูลอะไรลงไปก็ได้ ไม่ว่าจะเป็นข้อความ ตัวเลข หรือแม้แต่ Array ซ้อน Array</p>
            
            <h4>การเก็บและแก้ไขข้อมูล</h4>
            <div class="code-block">
                $_SESSION['role'] = 'admin';<br>
                $_SESSION['cart'] = ['item1', 'item2'];<br>
                $_SESSION['last_login'] = date('H:i:s');
            </div>

            <h4>การตรวจสอบความปลอดภัยเบื้องต้น</h4>
            <p>ก่อนใช้งานข้อมูล นายควรเช็คก่อนเสมอว่ามีการตั้งค่าไว้หรือยัง เพื่อป้องกัน Error (Notice: Undefined index)</p>
            <div class="code-block">
                if (!isset($_SESSION['user_id'])) {<br>
                &nbsp;&nbsp;header("Location: login.php");<br>
                &nbsp;&nbsp;exit();<br>
                }
            </div>
        `,
        right: `
            <h4>วงจรชีวิตของ Session (Lifecycle)</h4>
            <p>Session จะมีอายุขัยที่ยาวนานกว่าปกติ แต่อาจตายลงได้ใน 3 กรณี:</p>
            <ul>
                <li><b>1. ผู้ใช้ปิด Browser:</b> (ขึ้นอยู่กับการตั้งค่าคุกกี้ Session ID)</li>
                <li><b>2. ขาดการติดต่อเกินเวลา:</b> ปกติ Server จะตั้งไว้ที่ 24 นาที (1440 วินาที) ถ้าไม่มีการ Refresh หน้าเว็บ Session จะถูก Garbage Collector กวาดทิ้ง</li>
                <li><b>3. สั่งทำลายด้วยโค้ด:</b> เป็นวิธีที่ถูกต้องที่สุด</li>
            </ul>

            <h4>การทำลาย Session แบบถอนรากถอนโคน</h4>
            <div class="code-block">
                session_unset(); // ล้างตัวแปรทั้งหมดในหน้า<br>
                session_destroy(); // ลบไฟล์ Session ใน Server
            </div>
            
            <div class="tip-box" style="background:#fff3cd">
                <b>ข้อควรระวัง:</b> การใช้ <code>session_destroy()</code> จะไม่ลบตัวแปร <code>$_SESSION</code> ในหน่วยความจำทันทีจนกว่าจะ Refresh หน้าใหม่ ดังนั้นควรใช้คู่กับ <code>session_unset()</code> เสมอเพื่อความชัวร์ 100%
            </div>
        `
    },
    {
        left: `
            <h2>6. Security: Session Hijacking</h2>
            <p>ภัยที่น่ากลัวที่สุดคือการโดน "ขโมยกุญแจ" (Session ID) ถ้าแฮกเกอร์ก๊อปปี้ค่า Session ID จากเครื่องนายไปใส่เครื่องเขา เขาจะเข้าเว็บในชื่อนายได้ทันทีโดยไม่ต้องใส่รหัสผ่าน!</p>
            <h4>วิธีป้องกัน:</h4>
            <p>1. <b>session_regenerate_id():</b> เปลี่ยนเลขกุญแจใหม่ทุกครั้งที่มีการเปลี่ยนสถานะสำคัญ (เช่น ตอน Login สำเร็จ)</p>
            <div class="code-block">
                session_start();<br>
                // หลังเช็ครหัสผ่านผ่านแล้ว<br>
                session_regenerate_id(true);<br>
                $_SESSION['user'] = 'active';
            </div>
        `,
        right: `
            <h4>2. ตั้งค่าคุกกี้ให้ปลอดภัย</h4>
            <p>ใส่ Option เสริมใน <code>session_start</code> เพื่อป้องกัน Script แอบอ่านคุกกี้ (XSS)</p>
            <div class="code-block">
                session_start([<br>
                &nbsp;&nbsp;'cookie_httponly' => true,<br>
                &nbsp;&nbsp;'cookie_secure' => true,<br>
                &nbsp;&nbsp;'samesite' => 'Strict'<br>
                ]);
            </div>
            <p><b>HttpOnly:</b> ป้องกัน JavaScript เข้าถึงคุกกี้<br>
            <b>Secure:</b> ส่งคุกกี้ผ่าน HTTPS เท่านั้น</p>
        `
    },
    {
        left: `
            <h2>7. สรุป Session vs Cookie</h2>
            <div class="table-responsive">
                <table class="table table-sm table-bordered mt-2" style="font-size: 0.8rem;">
                    <thead class="table-dark">
                        <tr><th>คุณสมบัติ</th><th>Cookie</th><th>Session</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>เก็บไว้ที่ไหน</td><td>Client (Browser)</td><td>Server</td></tr>
                        <tr><td>ความปลอดภัย</td><td>ต่ำ (แก้ไขได้)</td><td>สูงกว่ามาก</td></tr>
                        <tr><td>ความจุ</td><td>4 KB</td><td>ไม่จำกัด (เท่า HDD)</td></tr>
                        <tr><td>ความเร็ว</td><td>เร็วกว่า</td><td>ช้ากว่านิดหน่อย</td></tr>
                        <tr><td>การเข้าถึง</td><td>Script อ่านได้</td><td>Script อ่านไม่ได้</td></tr>
                    </tbody>
                </table>
            </div>
        `,
        right: `
            <h4>ควรเลือกใช้อันไหน?</h4>
            <p><b>ใช้ Cookies เมื่อ:</b> ต้องการเก็บความชอบส่วนตัวที่ไม่เป็นอันดับ เช่น ธีมสี (มืด/สว่าง), ภาษาที่ชอบ, หรือระบบ "จดจำฉัน" ระยะยาว</p>
            <p><b>ใช้ Sessions เมื่อ:</b> เก็บข้อมูลสำคัญมาก เช่น ID ผู้ใช้, ยอดเงิน, ตะกร้าสินค้า หรือข้อมูลที่นายไม่อยากให้ User แอบแก้เองได้</p>
            <div class="tip-box">
                <i class="bi bi-shield-check"></i> <b>Rule of Thumb:</b> "ถ้าหายแล้วไม่ตาย ใช้ Cookie ถ้าหายแล้ววอดวาย ใช้ Session"
            </div>
        `

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

              if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'php 9.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            // จำลองการรัน PHP ด้วยการลบ Tag ออกเพื่อให้แสดงผลในเครื่อง User ได้
            let cleanCode = code.replace(/<\?php/g, '').replace(/\?>/g, '').replace(/<\?=/g, '');
            // จำลองการหาตัวแปร
            cleanCode = cleanCode.replace(/\$_SESSION\['user'\]/g, '"Developer นายเทพมาก"');
            cleanCode = cleanCode.replace(/session_id\(\)/g, '"sess_5902kd92kkd02193"');
            preview.innerHTML = cleanCode;
        }
    }
