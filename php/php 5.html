        .book-wrapper.is-open .notebook { opacity: 1; }

        .page-left, .page-right { 
            flex: 1; padding: 40px 50px;

            scrollbar-width: thin;

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--dark-purple); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; font-weight: 700; font-size: 1.6rem; }

<script>
const content = [
    {
        left: `
            <h2>1. พลังของ PHP Arrays</h2>
            <p>ในโลกของ PHP <b>Array</b> ไม่ใช่แค่ที่เก็บข้อมูลเรียงต่อกัน แต่มันคือโครงสร้างข้อมูลที่ทรงพลังที่สุดชนิดหนึ่ง นายสามารถเก็บตัวแปรหลายตัวไว้ในชื่อเดียวได้ ไม่ว่าจะเป็นตัวเลข ข้อความ หรือแม้แต่ Array ซ้อน Array</p>
            <h4>ทำไมต้องใช้ Array?</h4>
            <p>ลองจินตนาการว่านายต้องเก็บชื่อสินค้า 100 ชิ้น ถ้าไม่มี Array นายต้องสร้างตัวแปร $p1, $p2... ไปเรื่อยๆ ซึ่งมันคือนรกของคนเขียนโค้ดชัดๆ Array จึงเข้ามาช่วยบริหารจัดการข้อมูลจำนวนมากให้เป็นระเบียบและวนลูปใช้งานได้ง่าย</p>
            <div class="tip-box">
                <i class="bi bi-info-circle"></i> <b>Did you know?</b> ใน PHP 8 นายสามารถเขียน Array แบบสั้นด้วย <code>[]</code> แทนคำว่า <code>array()</code> ได้แล้วนะ ซึ่งเป็นมาตรฐานที่ดูทันสมัยกว่ามาก
            </div>
            <p>กฎเหล็กที่ต้องจำคือ <b>Index ของ Array เริ่มต้นที่ 0 เสมอ</b> หากนายมีข้อมูล 3 ตัว ตัวสุดท้ายจะมีเลขตำแหน่งคือ 2 ไม่ใช่ 3 จำจุดนี้ไว้ให้ดีเพราะบั๊กส่วนใหญ่เกิดจากตรงนี้แหละ</p>
        `,
        right: `
            <h4>การประกาศใช้งาน (Indexed Array)</h4>
            <p>นี่คือรูปแบบที่เบสิกที่สุด คือการเก็บข้อมูลเรียงต่อกันไปตามลำดับตัวเลข</p>
            <div class="code-block">
                <span class="php-var">$colors</span> = [<span class="php-str">"Red"</span>, <span class="php-str">"Green"</span>, <span class="php-str">"Blue"</span>];<br>
                <span class="php-tag">echo</span> <span class="php-var">$colors</span>[0]; <span class="text-muted">// ผลลัพธ์: Red</span>
            </div>
            <h4>การนับจำนวนข้อมูล</h4>
            <p>เรามักจะใช้ฟังก์ชัน <code>count()</code> เพื่อตรวจสอบว่าใน Array ของเรามีข้อมูลอยู่ทั้งหมดกี่ตัว เพื่อนำไปใช้ต่อในคำสั่ง for หรือ while loop</p>
            <div class="code-block">
                <span class="php-tag">echo</span> <span class="php-func">count</span>(<span class="php-var">$colors</span>); <span class="text-muted">// ผลลัพธ์: 3</span>
            </div>
            <p>นอกจากนี้ PHP ยังใจดีเตรียมฟังก์ชันอำนวยความสะดวกมาให้เพียบ เช่น <code>sort()</code> เพื่อเรียงข้อมูล หรือ <code>array_push()</code> เพื่อเพิ่มข้อมูลต่อท้ายแบบง่ายๆ โดยที่เราไม่ต้องระบุ Index เองเลย</p>
        `
    },
    {
        left: `
            <h2>2. Associative Arrays</h2>
            <p>นี่คือจุดที่ PHP โดดเด่น! <b>Associative Array</b> คือการที่เราสามารถกำหนดชื่อ (Key) ให้กับข้อมูลแต่ละตัวได้ แทนที่จะใช้ตัวเลข 0, 1, 2 แบบเดิม</p>
            <h4>โครงสร้างแบบ Key => Value</h4>
            <p>ให้นายมองว่ามันคือ "พจนานุกรม" ที่เราเอาคำค้น (Key) ไปแลกกับคำอธิบาย (Value) ซึ่งทำให้โค้ดของเราอ่านง่ายขึ้นมาก เพราะเรารู้ทันทีว่าข้อมูลนั้นคืออะไร</p>
            <div class="code-block">
                <span class="php-var">$student</span> = [<br>
                &nbsp;&nbsp;<span class="php-str">"name"</span> => <span class="php-str">"Somchai"</span>,<br>
                &nbsp;&nbsp;<span class="php-str">"age"</span> => 25,<br>
                &nbsp;&nbsp;<span class="php-str">"grade"</span> => <span class="php-str">"A"</span><br>
                ];
            </div>
            <p>การเข้าถึงข้อมูลก็แค่ระบุ Key ในเครื่องหมาย bracket เช่น <code>$student["name"]</code> นายก็จะได้ค่า "Somchai" ออกมาทันที</p>
        `,
        right: `
            <h4>การวนลูปด้วย Foreach</h4>
            <p>เมื่อใช้ Associative Array คู่หูที่ขาดไม่ได้เลยคือ <code>foreach</code> ซึ่งออกแบบมาเพื่อกวาดข้อมูลใน Array โดยเฉพาะ</p>
            <div class="code-block">
                <span class="php-tag">foreach</span> (<span class="php-var">$student</span> <span class="php-tag">as</span> <span class="php-var">$key</span> => <span class="php-var">$value</span>) {<br>
                &nbsp;&nbsp;<span class="php-tag">echo</span> <span class="php-var">$key</span> . <span class="php-str">": "</span> . <span class="php-var">$value</span>;<br>
                }
            </div>
            <p>วิธีนี้จะช่วยให้นายดึงทั้ง "ชื่อหัวข้อ" และ "ข้อมูล" ออกมาแสดงผลพร้อมกันได้ภายในคำสั่งเดียว เหมาะมากสำหรับการสร้างตารางข้อมูลหรือการดึงค่าจาก Database</p>
            <div class="tip-box">
                <b>Pro Tip:</b> ชื่อ Key ใน PHP นั้น Case-sensitive นะครับ <code>$arr["Name"]</code> กับ <code>$arr["name"]</code> ถือว่าเป็นคนละตัวกัน ระวังพิมพ์ผิดล่ะ!
            </div>
        `
    },
    {
        left: `
            <h2>3. Multi-dimensional Arrays</h2>
            <p>ถ้า Array ชั้นเดียวมันยังเก็บข้อมูลได้ไม่จุใจ PHP ให้เราสร้าง <b>Array ซ้อน Array</b> ได้ไม่จำกัดชั้น ซึ่งเราเรียกมันว่า Array หลายมิติ</p>
            <h4>การประยุกต์ใช้งานจริง</h4>
            <p>นึกถึงตาราง Excel ที่มีทั้งแถวและคอลัมน์ หรือรายการสินค้าที่มีรายละเอียดซับซ้อน มิติแรกอาจจะเป็นลำดับสินค้า ส่วนมิติที่สองคือคุณสมบัติของสินค้านั้นๆ</p>
            <div class="code-block">
                <span class="php-var">$cars</span> = [<br>
                &nbsp;&nbsp;[<span class="php-str">"Volvo"</span>, 22, 18],<br>
                &nbsp;&nbsp;[<span class="php-str">"BMW"</span>, 15, 13],<br>
                &nbsp;&nbsp;[<span class="php-str">"Saab"</span>, 5, 2]<br>
                ];
            </div>
            <p>การดึงข้อมูลต้องระบุพิกัดสองชั้น เช่น <code>$cars[0][0]</code> จะหมายถึงแถวแรก คอลัมน์แรก (นั่นคือ Volvo)</p>
        `,
        right: `
            <h4>ซ้อนกันให้สุดทาง</h4>
            <p>เราสามารถผสมผสาน Indexed และ Associative เข้าด้วยกันได้ เพื่อสร้างโครงสร้างข้อมูลที่ซับซ้อนแต่ทรงพลัง</p>
            <div class="code-block">
                <span class="php-var">$inventory</span> = [<br>
                &nbsp;&nbsp;<span class="php-str">"Fruit"</span> => [<span class="php-str">"Apple"</span>, <span class="php-str">"Banana"</span>],<br>
                &nbsp;&nbsp;<span class="php-str">"Drink"</span> => [<span class="php-str">"Coke"</span>, <span class="php-str">"Water"</span>]<br>
                ];
            </div>
            <p>ในการเขียนโปรแกรมระดับสูง (เช่น การรับค่า API แบบ JSON) นายจะเจอข้อมูลหน้าตาแบบนี้ตลอดเวลา ดังนั้นฝึกไล่ลำดับ Array ให้คล่องเข้าไว้</p>
            <div class="tip-box" style="background: #fff3cd;">
                <i class="bi bi-exclamation-triangle"></i> <b>Warning:</b> อย่าซ้อน Array เยอะเกินความจำเป็น (เกิน 3-4 ชั้น) เพราะจะทำให้โค้ดอ่านยากและจัดการหน่วยความจำได้แย่ลง
            </div>
        `
    },
    {
        left: `
            <h2>4. พื้นฐานการสร้าง Function</h2>
            <p><b>Function</b> คือกลุ่มของคำสั่งที่เราตั้งชื่อไว้ เพื่อให้สามารถเรียกใช้งานซ้ำๆ ได้ทุกที่ในโปรแกรมโดยไม่ต้องเขียนโค้ดเดิมซ้ำใหม่ (Don't Repeat Yourself - DRY)</p>
            <h4>โครงสร้างของฟังก์ชัน</h4>
            <p>เราเริ่มด้วยคีย์เวิร์ด <code>function</code> ตามด้วยชื่อที่สื่อความหมาย และวงเล็บ <code>()</code> สำหรับรับค่า</p>
            <div class="code-block">
                <span class="php-tag">function</span> <span class="php-func">sayHello</span>() {<br>
                &nbsp;&nbsp;<span class="php-tag">echo</span> <span class="php-str">"สวัสดีชาวโลก!"</span>;<br>
                }
            </div>
            <p>ฟังก์ชันจะไม่ทำงานจนกว่าเราจะ "เรียกชื่อ" มัน เช่น <code>sayHello();</code> การทำแบบนี้ช่วยให้โค้ดของเราสะอาดและแบ่งสัดส่วนการทำงานได้ชัดเจนเหมือนการต่อเลโก้</p>
        `,
        right: `
            <h4>กฎการตั้งชื่อฟังก์ชัน</h4>
            <ul>
                <li>ต้องเริ่มต้นด้วยตัวอักษรหรือ underscore (_) เท่านั้น</li>
                <li><b>ห้าม</b> ขึ้นต้นด้วยตัวเลข</li>
                <li>ห้ามซ้ำกับชื่อฟังก์ชันมาตรฐานของ PHP (เช่น count, echo)</li>
                <li>ควรตั้งชื่อแบบ camelCase เช่น <code>calculateTotalAmount()</code></li>
            </ul>
            <div class="tip-box">
                <i class="bi bi-lightbulb"></i> <b>Logic:</b> ลองแบ่งหน้าที่ของเว็บออกเป็นฟังก์ชันย่อยๆ เช่น <code>checkLogin()</code>, <code>uploadImage()</code> จะทำให้ชีวิตการเขียนโค้ดง่ายขึ้นเยอะ!
            </div>
            <p>ข้อดีอีกอย่างคือถ้ามีจุดที่ต้องแก้ไข นายแค่ไปแก้ที่ตัวฟังก์ชันที่เดียว ทุกที่ที่เรียกใช้ก็จะอัปเดตตามทันที ประหยัดเวลาไปได้มหาศาล</p>
        `
    },
    {
        left: `
            <h2>5. Arguments & Parameters</h2>
            <p>ฟังก์ชันจะฉลาดขึ้นมากถ้านายสามารถส่ง "วัตถุดิบ" เข้าไปประมวลผลได้ เราเรียกสิ่งที่ส่งเข้าไปนี้ว่า <b>Arguments</b></p>
            <h4>การรับส่งค่า</h4>
            <p>นายสามารถระบุตัวแปรไว้ในวงเล็บตอนสร้างฟังก์ชัน เพื่อเตรียมรอรับค่าจากภายนอกเข้ามาใช้งาน</p>
            <div class="code-block">
                <span class="php-tag">function</span> <span class="php-func">greet</span>(<span class="php-var">$name</span>) {<br>
                &nbsp;&nbsp;<span class="php-tag">echo</span> <span class="php-str">"สวัสดีคุณ "</span> . <span class="php-var">$name</span>;<br>
                }<br>
                <span class="php-func">greet</span>(<span class="php-str">"สมปอง"</span>);
            </div>

                }

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

              if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'php 6.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }
</script>
