<script>
const content = [
    {
        left: `
            <h2>1. ความเข้าใจเรื่อง Loops</h2>
            <p>ในการเขียนโปรแกรม <b>Loops (การวนซ้ำ)</b> คือหัวใจสำคัญที่ช่วยให้นายไม่ต้องเขียนโค้ดซ้ำๆ เดิมๆ นายเคยไหมที่ต้องแสดงรายชื่อคน 1,000 คน? ถ้าไม่มี Loop นายคงต้องเขียน <code>echo</code> พันครั้ง!</p>
            <h4>ทำไมต้อง Loop ใน PHP?</h4>
            <p>PHP เป็นภาษาฝั่ง Server ที่มักจะต้องจัดการกับข้อมูลจำนวนมากจาก Database เช่น การดึงโพสต์จาก Facebook หรือสินค้าใน Shopee มาแสดงผล ตัวแปรที่เป็น Array จะทำงานร่วมกับ Loop ได้อย่างทรงพลังที่สุด</p>
            <div class="tip-box">
                <i class="bi bi-cpu"></i> <b>Algorithm Thinking:</b> การวนซ้ำช่วยลดขนาดไฟล์โค้ด (Dry Principle: Don't Repeat Yourself) และทำให้การแก้ไขโค้ดภายหลังทำได้ง่ายขึ้นเพียงจุดเดียว
            </div>
            <p>ในบทนี้เราจะเจาะลึก 4 ทหารเสือ: <b>While, Do-While, For และ Foreach</b> ซึ่งแต่ละตัวมีความเหมาะสมในสถานการณ์ที่ต่างกันออกไปตามเงื่อนไขที่นายเจอ</p>
        `,
        right: `
            <h2>2. While Loop: เช็คก่อนลุย</h2>
            <p>เป็น Loop ที่พื้นฐานที่สุด มันจะตรวจสอบ <b>"เงื่อนไข"</b> ก่อนเสมอ ถ้าเงื่อนไขเป็นจริง (True) มันจะทำงานข้างใน และจะทำไปเรื่อยๆ จนกว่าเงื่อนไขจะเป็นเท็จ</p>
            <div class="code-block">
                <span class="code-keyword">while</span> ($condition) {<br>
                &nbsp;&nbsp;<span class="code-comment">// โค้ดที่ต้องการให้ทำงานซ้ำ</span><br>
                &nbsp;&nbsp;<span class="code-variable">$i</span>++; <span class="code-comment">// อย่าลืมเพิ่มค่า ไม่งั้น Loop จะค้าง (Infinite Loop)</span><br>
                }
            </div>
            <div class="preview-label">ตัวอย่างการใช้งานจริง:</div>
            <div class="code-block" style="background:#2d2d2d;">
                <span class="code-variable">$num</span> = 1;<br>
                <span class="code-keyword">while</span>(<span class="code-variable">$num</span> <= 3) {<br>
                &nbsp;&nbsp;<span class="code-keyword">echo</span> <span class="code-string">"รอบที่: "</span> . <span class="code-variable">$num</span> . <span class="code-string">"&lt;br&gt;"</span>;<br>
                &nbsp;&nbsp;<span class="code-variable">$num</span>++;<br>
                }
            </div>
            <p><b>ระวัง!</b> หากนายลืมเปลี่ยนค่าตัวแปรที่เป็นเงื่อนไข คอมพิวเตอร์ของนายจะทำงานจน RAM เต็ม เพราะมันหาทางออกจาก Loop ไม่เจอครับเพื่อน!</p>
        `
    },
    {
        left: `
            <h2>3. Do-While: ทำก่อนค่อยถาม</h2>
            <p>ความต่างของ <b>Do-While</b> กับ While ปกติคือ มันจะ "กัดไม่ปล่อย" อย่างน้อย 1 ครั้งเสมอ แม้ว่าเงื่อนไขในตอนแรกจะเป็นเท็จก็ตาม</p>
            <div class="code-block">
                <span class="code-keyword">do</span> {<br>
                &nbsp;&nbsp;<span class="code-keyword">echo</span> <span class="code-string">"อย่างน้อยต้องเห็นข้อความนี้ 1 ครั้ง"</span>;<br>
                } <span class="code-keyword">while</span> (<span class="code-variable">$x</span> > 100);
            </div>
            <h4>เหมาะกับงานประเภทไหน?</h4>
            <p>เรามักใช้ Do-While ในกรณีที่ต้องการให้โปรแกรมทำงานก่อน แล้วค่อยถามผู้ใช้ว่า "จะเอาอีกรอบไหม?" เช่น เกมที่ถามว่า Play Again? (Y/N) หรือการสุ่มค่าบางอย่างจนกว่าจะได้ค่าที่พอใจ</p>
            <div class="tip-box">
                <b>ข้อสังเกต:</b> ใน Do-While ต้องมีเครื่องหมาย Semi-colon (<code>;</code>) ปิดท้ายบรรทัด While เสมอ ซึ่งต่างจาก While ปกติ นายต้องระวังตรงนี้ให้ดีนะ
            </div>
        `,
        right: `
            <h2>4. For Loop: ราชาแห่งจำนวนรอบ</h2>
            <p>ถ้าถายนรู้จำนวนรอบที่แน่นอน เช่น "วน 10 รอบนะ" <b>For Loop</b> คือทางเลือกที่ดีที่สุด เพราะมันเขียนสั้น กระชับ และรวมทุกอย่างไว้ในบรรทัดเดียว</p>
            <div class="code-block">
                <span class="code-keyword">for</span> (<span class="code-variable">$i</span>=0; <span class="code-variable">$i</span><10; <span class="code-variable">$i</span>++) {<br>
                &nbsp;&nbsp;<span class="code-keyword">echo</span> <span class="code-variable">$i</span>;<br>
                }
            </div>
            <p><b>โครงสร้าง 3 ส่วนของ For:</b></p>
            <ul>
                <li><b>Init:</b> กำหนดจุดเริ่มต้น (เช่น <code>$i = 0</code>)</li>
                <li><b>Condition:</b> เงื่อนไขสิ้นสุด (เช่น <code>$i < 10</code>)</li>
                <li><b>Increment:</b> การปรับค่า (เช่น <code>$i++</code>)</li>
            </ul>
            <p>นายสามารถใช้ For Loop สร้างตาราง หรือวนค่าดึงลำดับเลขหน้าเว็บได้อย่างแม่นยำ เป็น Loop ที่เหล่า Developer นิยมใช้มากที่สุดตัวหนึ่งเลยละ!</p>
        `
    },
    {
        left: `
            <h2>5. Foreach: อาวุธหนักจัดการ Array</h2>
            <p>นี่คือ Loop ที่เกิดมาเพื่อจัดการกับข้อมูลแบบชุด (Array) โดยเฉพาะ นายไม่ต้องมานั่งนับ <code>count($array)</code> เอง PHP จะจัดการให้ครบทุกตัว</p>
            <div class="code-block">
                <span class="code-variable">$colors</span> = [<span class="code-string">"Red"</span>, <span class="code-string">"Green"</span>, <span class="code-string">"Blue"</span>];<br><br>
                <span class="code-keyword">foreach</span> (<span class="code-variable">$colors</span> <span class="code-keyword">as</span> <span class="code-variable">$value</span>) {<br>
                &nbsp;&nbsp;<span class="code-keyword">echo</span> <span class="code-string">"Color: "</span> . <span class="code-variable">$value</span>;<br>
                }
            </div>
            <h4>การเข้าถึง Key และ Value</h4>
            <p>หาก Array ของนายมีชื่อเล่น (Associative Array) นายสามารถดึงมาได้ทั้งคู่พร้อมกัน:</p>
            <div class="code-block">
                <span class="code-keyword">foreach</span> (<span class="code-variable">$user</span> <span class="code-keyword">as</span> <span class="code-variable">$key</span> => <span class="code-variable">$val</span>) {<br>
                &nbsp;&nbsp;<span class="code-keyword">echo</span> <span class="code-variable">$key</span> . <span class="code-string">": "</span> . <span class="code-variable">$val</span>;<br>
                }
            </div>
        `,
        right: `
            <h2>6. Break & Continue: การควบคุมฉุกเฉิน</h2>
            <p>บางครั้งเราต้องการสั่งหยุด Loop ทันที หรือข้ามรอบบางรอบไป เราจะใช้คำสั่งพิเศษ 2 ตัวนี้ครับ:</p>
            <ul>
                <li><b>Break:</b> "หยุดเดี๋ยวนี้!" ใช้เมื่อเจอเงื่อนไขที่ต้องการแล้ว และต้องการออกจาก Loop ทันที</li>
                <li><b>Continue:</b> "ข้ามอันนี้ไปก่อน!" ใช้เมื่อต้องการข้ามโค้ดที่เหลือในรอบปัจจุบัน แล้วไปเริ่มรอบถัดไปทันที</li>
            </ul>
            <div class="code-block">
                <span class="code-keyword">for</span> (<span class="code-variable">$i</span>=1; <span class="code-variable">$i</span><=10; <span class="code-variable">$i</span>++) {<br>
                &nbsp;&nbsp;<span class="code-keyword">if</span> (<span class="code-variable">$i</span> == 5) <span class="code-keyword">continue</span>; <span class="code-comment">// เลข 5 จะไม่ถูกพิมพ์</span><br>
                &nbsp;&nbsp;<span class="code-keyword">if</span> (<span class="code-variable">$i</span> == 8) <span class="code-keyword">break</span>; <span class="code-comment">// หยุดที่เลข 7</span><br>
                &nbsp;&nbsp;<span class="code-keyword">echo</span> <span class="code-variable">$i</span>;<br>
                }
            </div>
            <p>การใช้ Break มีประโยชน์มากในการค้นหาข้อมูล (Search) เมื่อเจอสิ่งที่หาแล้วก็ไม่จำเป็นต้องวนรอบที่เหลือให้เสียพลังงาน CPU</p>
        `
    },
    {
        left: `
            <h2>7. เทคนิค Nested Loops (Loop ซ้อน Loop)</h2>
            <p>นายจะเจอสิ่งนี้บ่อยมากเมื่อต้องจัดการข้อมูลที่มีมิติ เช่น ตารางหมากรุก, สูตรคูณ หรือข้อมูลระดับซับซ้อน มันคือการเอา Loop ไปซ้อนไว้ใน Loop อีกที</p>
            <div class="code-block">
                <span class="code-keyword">for</span> (<span class="code-variable">$i</span>=1; <span class="code-variable">$i</span><=2; <span class="code-variable">$i</span>++) {<br>
                &nbsp;&nbsp;<span class="code-keyword">for</span> (<span class="code-variable">$j</span>=1; <span class="code-variable">$j</span><=3; <span class="code-variable">$j</span>++) {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="code-keyword">echo</span> <span class="code-string">"($i,$j) "</span>;<br>
                &nbsp;&nbsp;}<br>
                }
            </div>
            <p><b>คำแนะนำ:</b> อย่าซ้อนกันเกิน 3 ชั้นนะเพื่อน! เพราะประสิทธิภาพจะลดลงอย่างรวดเร็ว (Time Complexity: $O(n^2)$ หรือมากกว่า) ถ้าต้องซ้อนเยอะขนาดนั้น นายอาจจะต้องลองหาวิธีเขียนแบบใหม่ดู</p>
        `,

];

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

              if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'php 5.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            // จำลองการทำงานของ PHP แบบง่าย
            let output = code.replace(/<\?php|<\?>/g, '');
            output = output.replace(/echo\s+"(.*?)";/g, '$1');
            output = output.replace(/echo\s+\$i;/g, ' (Loop Variable) ');
            // หมายเหตุ: นี่คือการจำลองการแสดงผลเบื้องต้นเพื่อให้เห็นภาพ
            preview.innerHTML = "<b>[System Output]:</b><br>" + output.replace(/\n/g, '<br>');
        }
    }
</script>
