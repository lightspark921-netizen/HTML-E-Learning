<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 7 - MySQL Mastery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fcfcfc;
            --ink: #1e293b;
            --mysql-blue: #00758f;
            --mysql-orange: #f29111;
            --dark-bg: #0f172a;
            --desk: #334155;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 850px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1250px; }

        /* หน้าปกใหม่: ธีม Database */
        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e293b 100%); left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 25px 25px 5px;
            border-left: 20px solid #000; box-shadow: 20px 0 50px rgba(0,0,0,0.4);
            cursor: pointer; backface-visibility: hidden; overflow: hidden;
        }
        .book-cover::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,117,143,0.2) 0%, transparent 70%);
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1250px; height: 100%;
            background: var(--paper); border-radius: 5px 25px 25px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.1); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 50px 55px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--mysql-blue); border-bottom: 3px solid var(--mysql-orange); padding-bottom: 12px; margin-bottom: 20px; font-weight: 700; font-size: 1.8rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 25px; font-weight: 700; border-left: 5px solid var(--mysql-blue); padding-left: 15px; }
        p { line-height: 1.8; font-size: 1rem; color: #334155; margin-bottom: 1.2rem; text-align: justify; }

        .code-block { 
            background: #0f172a; color: #38bdf8; padding: 20px; 
            border-radius: 8px; font-family: 'JetBrains Mono', monospace; 
            font-size: 0.85rem; margin: 20px 0; border-right: 5px solid var(--mysql-orange);
            line-height: 1.6; position: relative; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }
        .sql-key { color: #f472b6; font-weight: bold; }
        .sql-str { color: #fbbf24; }

        .tip-box { background: #f0f9ff; border-radius: 12px; padding: 20px; border: 1px solid #bae6fd; border-left: 6px solid var(--mysql-blue); margin: 20px 0; font-size: 0.95rem; }
        
        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 65px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-top: 1px solid #e2e8f0; border-radius: 0 0 25px 5px; z-index: 10;
        }

        .btn-nav { background: var(--dark-bg); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        .btn-nav:hover:not(:disabled) { background: var(--mysql-blue); transform: translateY(-2px); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
        <div style="z-index: 1;">
            <div style="width:160px; height:160px; background:rgba(255,255,255,0.05); border: 2px solid var(--mysql-blue); border-radius:30px; display:flex; align-items:center; justify-content:center; margin: 0 auto 30px; transform: rotate(45deg);">
                <i class="bi bi-database-fill-lock" style="font-size:5rem; color:var(--mysql-orange); transform: rotate(-45deg);"></i>
            </div>
            <h1 class="display-5 fw-bold" style="font-family: 'Chakra Petch'; letter-spacing: 3px;">MYSQL</h1>
            <div style="width: 120px; height: 4px; background: var(--mysql-orange); margin: 20px auto; border-radius: 10px;"></div>
            <h5 class="fw-bold">UNIT 07: DATABASE CONNECTIVITY</h5>
            <p class="small opacity-75 px-5">การจัดการฐานข้อมูลเชิงสัมพันธ์และการเขียนโปรแกรมฝั่งเซิร์ฟเวอร์แบบมืออาชีพ</p>
            <div class="mt-5 small animate-bounce"><i class="bi bi-key-fill"></i> CLICK TO CONNECT DATABASE</div>
        </div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_php.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            <div class="fw-bold text-muted">หน้า <span id="pageNum">1</span> / <span id="totalPage">8</span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>
<script>
const content = [
    {
        left: `
            <h2>1. บทนำสู่ MySQL RDBMS</h2>
            <p>ในโลกของการพัฒนาเว็บแอปพลิเคชัน ข้อมูลถือเป็นหัวใจสำคัญ <b>MySQL</b> คือระบบจัดการฐานข้อมูลเชิงสัมพันธ์ (Relational Database Management System) ที่ได้รับความนิยมสูงสุด เนื่องจากมีความรวดเร็ว เสถียร และเปิดใช้งานแบบ Open Source ซึ่งทำงานร่วมกับภาษา PHP ได้ดีเยี่ยม</p>
            
            <h4>แนวคิดของตาราง (Tables & Rows)</h4>
            <p>ฐานข้อมูล MySQL จะเก็บข้อมูลในรูปแบบของตาราง (Tables) ซึ่งประกอบด้วยคอลัมน์ (Columns) ที่นิยามประเภทข้อมูล เช่น INT, VARCHAR หรือ DATETIME และแถว (Rows) ที่เก็บข้อมูลจริงแต่ละรายการ การออกแบบที่ดีต้องคำนึงถึงความสัมพันธ์ระหว่างตาราง (Primary Key & Foreign Key) เพื่อสร้างความถูกต้องของข้อมูล (Data Integrity)</p>
            <p>เหตุผลที่นักพัฒนาทั่วโลกเลือกใช้ MySQL คือการรองรับระบบขนาดใหญ่ได้ดี และมีเครื่องมือสนับสนุนมากมายเช่น phpMyAdmin ที่ช่วยให้เราจัดการฐานข้อมูลผ่านหน้าเว็บได้อย่างง่ายดาย</p>
        `,
        right: `
            <h4>2. การเชื่อมต่อ PHP กับ MySQL (MySQLi)</h4>
            <p>ในการเริ่มใช้งาน นายต้องสร้างจุดเชื่อมต่อระหว่างสคริปต์ PHP กับเซิร์ฟเวอร์ฐานข้อมูลก่อน ในปัจจุบันแนะนำให้ใช้ MySQLi (Object-Oriented) หรือ PDO เพื่อความปลอดภัยและประสิทธิภาพ</p>
            <div class="code-block">
                <span class="sql-key">// 1. กำหนดค่าเริ่มต้น</span><br>
                $host = <span class="sql-str">"localhost"</span>;<br>
                $user = <span class="sql-str">"root"</span>;<br>
                $pass = <span class="sql-str">""</span>;<br>
                $db   = <span class="sql-str">"my_workshop"</span>;<br><br>
                <span class="sql-key">// 2. สร้างการเชื่อมต่อ</span><br>
                $conn = new mysqli($host, $user, $pass, $db);<br><br>
                <span class="sql-key">// 3. ตรวจสอบความผิดพลาด</span><br>
                if ($conn->connect_error) {<br>
                &nbsp;&nbsp;die(<span class="sql-str">"Connection failed: "</span> . $conn->connect_error);<br>
                }<br>
                echo <span class="sql-str">"เชื่อมต่อฐานข้อมูลสำเร็จ!"</span>;
            </div>
            <div class="tip-box">
                <i class="bi bi-shield-check"></i> <b>Pro Tip:</b> การระบุ Character Set เป็น <code>utf8mb4</code> ทันทีหลังเชื่อมต่อ จะช่วยแก้ปัญหา "ภาษาไทยอ่านไม่ออก" หรือ "ภาษาต่างดาว" ได้ 100% ครับ
            </div>
            <p>จำไว้ว่าเมื่อทำงานเสร็จสิ้น การปิดการเชื่อมต่อด้วย <code>$conn->close();</code> เป็นมารยาทที่ดีในการเขียนโปรแกรมเพื่อคืนทรัพยากรให้กับเซิร์ฟเวอร์</p>
        `
    },
    {
        left: `
            <h2>3. การดึงข้อมูลด้วยคำสั่ง SELECT</h2>
            <p>การดึงข้อมูล (Query) คือส่วนที่ใช้งานบ่อยที่สุด คำสั่ง <b>SELECT</b> ใช้เพื่อเลือกคอลัมน์ที่ต้องการจากตาราง นายสามารถกรองข้อมูลที่ต้องการได้ด้วยคำสั่ง WHERE และจัดลำดับด้วย ORDER BY</p>
            <div class="code-block">
                <span class="sql-key">SELECT</span> name, price, stock <br>
                <span class="sql-key">FROM</span> products <br>
                <span class="sql-key">WHERE</span> category = <span class="sql-str">'Electronics'</span> <br>
                <span class="sql-key">AND</span> price > 500 <br>
                <span class="sql-key">ORDER BY</span> price <span class="sql-key">DESC</span>;
            </div>
            <h4>4. การแสดงผลข้อมูลใน PHP</h4>
            <p>เมื่อรัน Query แล้ว ข้อมูลจะอยู่ในรูปแบบ Object Result นายต้องใช้คำสั่งวนลูปเพื่อดึงข้อมูลทีละแถวออกมาแสดงผลบนหน้าจอผ่านคำสั่ง <code>fetch_assoc()</code></p>
            <div class="code-block">
                $sql = <span class="sql-str">"SELECT * FROM users"</span>;<br>
                $result = $conn->query($sql);<br><br>
                if ($result->num_rows > 0) {<br>
                &nbsp;&nbsp;while($row = $result->fetch_assoc()) {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;echo <span class="sql-str">"User: "</span> . $row[<span class="sql-str">"username"</span>] . <span class="sql-str">"&lt;br&gt;"</span>;<br>
                &nbsp;&nbsp;}<br>
                }
            </div>
        `,
        right: `
            <h4>5. การเพิ่มข้อมูลด้วย INSERT INTO</h4>
            <p>การเพิ่มข้อมูลจากฟอร์มลงสู่ฐานข้อมูลเป็นขั้นตอนสำคัญของแอปพลิเคชันทุกชนิด นายต้องระบุชื่อคอลัมน์และค่าที่ต้องการใส่ให้ตรงกันอย่างแม่นยำ</p>
            
            <div class="code-block">
                $name = <span class="sql-str">"สมชาย ใจดี"</span>;<br>
                $email = <span class="sql-str">"somchai@mail.com"</span>;<br><br>
                $sql = <span class="sql-key">"INSERT INTO</span> customers (name, email) <br>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="sql-key">VALUES</span> ('$name', '$email')";<br><br>
                if ($conn->query($sql) === TRUE) {<br>
                &nbsp;&nbsp;echo <span class="sql-str">"บันทึกข้อมูลเรียบร้อยแล้ว!"</span>;<br>
                }
            </div>
            <p><b>ข้อควรระวัง:</b> การใส่ตัวแปรลงในคำสั่ง SQL โดยตรงแบบตัวอย่างข้างต้น เสี่ยงต่อการถูกโจมตีแบบ <b>SQL Injection</b> อย่างมาก นายควรศึกษาการใช้ Prepared Statements ในหัวข้อถัดๆ ไปเพื่อป้องกันระบบของนายให้ปลอดภัย</p>
        `
    },
    {
        left: `
            <h2>6. การแก้ไขข้อมูลด้วย UPDATE</h2>
            <p>คำสั่ง <b>UPDATE</b> ใช้เพื่อเปลี่ยนแปลงข้อมูลที่มีอยู่แล้วในฐานข้อมูล นายสามารถแก้ไขข้อมูลได้หลายคอลัมน์พร้อมกันในคำสั่งเดียว โดยคั่นด้วยเครื่องหมายจุลภาค (Comma)</p>
            <div class="code-block">
                <span class="sql-key">UPDATE</span> users <br>
                <span class="sql-key">SET</span> password = <span class="sql-str">'new_secure_pass'</span>, <br>
                &nbsp;&nbsp;&nbsp;&nbsp;updated_at = <span class="sql-key">NOW()</span> <br>
                <span class="sql-key">WHERE</span> user_id = 42;
            </div>
            <div class="tip-box" style="border-left-color: #ef4444;">
                <i class="bi bi-exclamation-triangle-fill" style="color:#ef4444"></i> <b>กฎเหล็ก:</b> ห้ามลืมเขียน <code>WHERE</code> clause ในคำสั่ง UPDATE เด็ดขาด! เพราะถ้าลืม ข้อมูลทั้งตารางจะถูกเปลี่ยนเป็นค่าเดียวกันทั้งหมด และนายอาจจะโดนไล่ออกได้เลยทีเดียว!
            </div>
            <h4>7. การลบข้อมูลด้วย DELETE</h4>
            <p>เมื่อข้อมูลไม่จำเป็นอีกต่อไป เราจะใช้คำสั่ง DELETE ในการลบแถวข้อมูลนั้นออกจากตารางถาวร</p>
            <div class="code-block">
                <span class="sql-key">DELETE FROM</span> orders <br>
                <span class="sql-key">WHERE</span> order_id = 1001 <br>
                <span class="sql-key">AND</span> status = <span class="sql-str">'cancelled'</span>;
            </div>
        `,
        right: `
            <h4>8. ความปลอดภัยและการใช้ Prepared Statements</h4>
            <p>นี่คือหัวข้อที่สำคัญที่สุดในการเป็น Back-end Developer แทนที่จะส่ง SQL string ไปรันตรงๆ เราจะใช้การ "จองที่ว่าง" (?) และส่งค่าตามไปทีหลังเพื่อป้องกันแฮกเกอร์</p>
            <div class="code-block">
                <span class="sql-key">// 1. เตรียมคำสั่ง SQL</span><br>
                $stmt = $conn->prepare(<span class="sql-str">"INSERT INTO logs (user, action) VALUES (?, ?)"</span>);<br><br>
                <span class="sql-key">// 2. ผูกตัวแปร (s = string, i = integer)</span><br>
                $stmt->bind_param(<span class="sql-str">"ss"</span>, $user, $action);<br><br>
                <span class="sql-key">// 3. กำหนดค่าและรัน</span><br>
                $user = <span class="sql-str">"Admin"</span>; <br>
                $action = <span class="sql-str">"Login Success"</span>;<br>
                $stmt->execute();
            </div>
            <p>การทำแบบนี้ ระบบจะแยกส่วนของ "คำสั่ง" และ "ข้อมูล" ออกจากกัน ทำให้แฮกเกอร์ไม่สามารถแอบใส่คำสั่งอันตรายเข้ามาในฟอร์มของนายได้</p>
            <div class="tip-box" style="background:#ecfdf5; border-color:#10b981;">
                <i class="bi bi-trophy-fill" style="color:#10b981"></i> <b>ยินดีด้วย!</b> นายเรียนรู้พื้นฐาน CRUD (Create, Read, Update, Delete) ของ MySQL จบแล้ว ตอนนี้นายพร้อมที่จะสร้างระบบหลังบ้านที่ทรงพลังแล้วครับ!
            </div>
        `
    }
];

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

              if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'php 8.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }
</script>
</body>
</html>
