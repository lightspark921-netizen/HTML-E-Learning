<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 3 - PHP Conditionals Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #2b2d42;
            --php-purple: #777bb4;
            --dark-purple: #474a8a;
            --desk: #cbd5e1;
            --preview-bg: #ffffff;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 800px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: var(--php-purple); left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid var(--dark-purple); box-shadow: 15px 0 50px rgba(0,0,0,0.3);
            cursor: pointer; backface-visibility: hidden;
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 40px 50px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--dark-purple); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; font-weight: 700; font-size: 1.6rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 20px; font-weight: 700; border-left: 4px solid var(--php-purple); padding-left: 10px; font-size: 1.1rem; }
        p { line-height: 1.6; font-size: 0.95rem; color: #333; margin-bottom: 1rem; }

        .code-block { 
            background: #282c34; color: #abb2bf; padding: 15px; 
            border-radius: 10px; font-family: 'Consolas', monospace; 
            font-size: 0.8rem; margin: 15px 0; border-left: 5px solid #61afef;
            line-height: 1.4; position: relative;
        }
        
        .php-tag { color: #c678dd; font-weight: bold; }
        .php-keyword { color: #c678dd; }
        .php-var { color: #e06c75; }
        .php-string { color: #98c379; }
        .php-comment { color: #5c6370; font-style: italic; }

        .tip-box { background: #f0f4ff; border-radius: 8px; padding: 15px; border-left: 5px solid var(--php-purple); margin: 15px 0; font-size: 0.85rem; }
        .tag-badge { background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; color: var(--dark-purple); font-size: 0.85rem; }

        #editor { width: 100%; height: 180px; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: #fff; }
        #live-preview { width: 100%; height: 220px; background: #f8f9fa; border: 2px dashed #bbb; border-radius: 8px; padding: 15px; overflow: auto; font-family: monospace; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--ink); color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        .btn-nav:hover:not(:disabled) { background: var(--php-purple); transform: translateY(-2px); }
        .btn-next-chapter { background: #27ae60; }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
         <div style="width:140px; height:140px; background:rgba(255,255,255,0.2); border: 4px solid white; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; transform: rotate(-10deg);">
            <i class="bi bi-code-slash" style="font-size:5rem; color:white"></i>
        </div>
        <h1 class="display-4 fw-bold" style="font-family: 'Chakra Petch';">PHP</h1>
        <p class="lead">LOGIC & CONTROL FLOW</p>
        <div style="width: 100px; height: 4px; background: white; margin: 20px 0; border-radius: 2px;"></div>
        <h5 class="fw-bold">UNIT 03: CONDITIONALS</h5>
        <p class="small opacity-75">การตัดสินใจและการควบคุมทิศทางของโปรแกรม</p>
        <div class="mt-4 small opacity-75 animate-bounce"><i class="bi bi-book-half"></i> เปิดบทเรียนเพื่อเริ่มเขียน Logic</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_php.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            <div class="fw-bold text-muted">หน้า <span id="pageNum">1</span> / <span id="totalPage">8</span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. พื้นฐานของ If Statement</h2>
            <p>ในการเขียนโปรแกรม <b>Conditionals</b> คือการสั่งให้คอมพิวเตอร์ "ตัดสินใจ" เลือกทำงานบางอย่างตามเงื่อนไขที่เป็นจริง (Boolean)</p>
            <h4>โครงสร้างการเขียน</h4>
            <p>เราใช้คีย์เวิร์ด <code>if</code> ตามด้วยวงเล็บ <code>( )</code> ซึ่งภายในคือเงื่อนไขที่เราต้องการตรวจสอบ</p>
            <div class="code-block">
                <span class="php-tag">&lt;?php</span><br>
                <span class="php-var">$score</span> = 85;<br><br>
                <span class="php-keyword">if</span> (<span class="php-var">$score</span> >= 80) {<br>
                &nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"ยินดีด้วย! คุณได้เกรด A"</span>;<br>
                }<br>
                <span class="php-tag">?&gt;</span>
            </div>
            <p>ถ้าเงื่อนไขในวงเล็บเป็น <b>True</b> โค้ดในเครื่องหมายปีกกา <code>{ }</code> จะทำงานทันที แต่ถ้าเป็น <b>False</b> โปรแกรมจะข้ามส่วนนี้ไปทำคำสั่งถัดไปที่อยู่ข้างล่างแทน</p>
        `,
        right: `
            <h4>Operators ที่ต้องรู้จัก</h4>
            <p>หัวใจของการทำเงื่อนไขคือการเปรียบเทียบ (Comparison Operators):</p>
            <ul>
                <li><code>==</code> : เท่ากับ (ตรวจสอบแค่ค่า)</li>
                <li><code>===</code> : เท่ากับ (ตรวจสอบทั้งค่าและชนิดข้อมูล)</li>
                <li><code>!=</code> : ไม่เท่ากับ</li>
                <li><code>> , < , >= , <=</code> : มากกว่า, น้อยกว่า...</li>
            </ul>
            <div class="tip-box">
                <i class="bi bi-exclamation-circle"></i> <b>ระวัง:</b> อย่าใช้ <code>=</code> (ตัวเดียว) ใน if เพราะนั่นคือการ "กำหนดค่า" ไม่ใช่การเปรียบเทียบ!
            </div>
            <p><b>ตัวอย่างเพิ่มเติม:</b><br>
            ถ้าเรามีระบบล็อกอิน เราจะใช้ <code>if ($is_logged_in == true)</code> เพื่อเช็คว่าควรแสดงปุ่มออกจากระบบหรือไม่</p>
        `
    },
    {
        left: `
            <h2>2. เมื่อต้องเลือกทางแยก (Else)</h2>
            <p>ในโลกความจริงไม่ได้มีแค่ "ถ้าเป็นจริงให้ทำ" แต่เรายังมี "ถ้าไม่ใช่...ให้ทำอีกอย่าง" ซึ่งเราจะใช้ <b>else</b> เข้ามาช่วย</p>
            <div class="code-block">
                <span class="php-keyword">if</span> (<span class="php-var">$age</span> >= 18) {<br>
                &nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"เข้าชมเว็บไซต์ได้"</span>;<br>
                } <span class="php-keyword">else</span> {<br>
                &nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"เนื้อหาจำกัดสำหรับผู้ใหญ่"</span>;<br>
                }
            </div>
            <p>โครงสร้างแบบ <code>if...else</code> จะการันตีว่า <b>ต้องมีโค้ดส่วนใดส่วนหนึ่งทำงานเสมอ</b> ไม่ฝั่ง if ก็ฝั่ง else เป็นการจัดการทางเลือกสองทางที่ชัดเจนที่สุด</p>
        `,
        right: `
            <h4>เทคนิคการเขียนให้สะอาด</h4>
            <p>หากโค้ดในปีกกามีเพียงบรรทัดเดียว เราสามารถละปีกกาออกได้ แต่ไม่แนะนำสำหรับมือใหม่เพราะอาจทำให้สับสนเวลามาแก้โค้ดภายหลัง</p>
            <div class="tip-box">
                <i class="bi bi-lightning-charge"></i> <b>Boolean Tip:</b><br>
                ค่าเหล่านี้ใน PHP จะถูกมองว่าเป็น <b>False</b> อัตโนมัติเมื่ออยู่ใน if:<br>
                - ตัวเลข <code>0</code> หรือ <code>0.0</code><br>
                - สตริงว่าง <code>""</code><br>
                - อาร์เรย์ว่าง <code>[]</code><br>
                - ค่า <code>null</code>
            </div>
            <p>ดังนั้น <code>if ($name)</code> จะเป็นเท็จทันทีถ้า <code>$name</code> เป็นสตริงว่าง</p>
        `
    },
    {
        left: `
            <h2>3. ทางเลือกหลายชั้น (Elseif)</h2>
            <p>เมื่อเงื่อนไขมีความซับซ้อนมากกว่า 2 ทางเลือก เช่น การตัดเกรด หรือการแยกประเภทสมาชิก เราจะใช้ <b>elseif</b></p>
            <div class="code-block">
                <span class="php-keyword">if</span> (<span class="php-var">$hour</span> < 12) {<br>
                &nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"Good Morning"</span>;<br>
                } <span class="php-keyword">elseif</span> (<span class="php-var">$hour</span> < 18) {<br>
                &nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"Good Afternoon"</span>;<br>
                } <span class="php-keyword">else</span> {<br>
                &nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"Good Evening"</span>;<br>
                }
            </div>
            <p><b>หลักการทำงาน:</b> PHP จะเช็คจากบนลงล่าง พอเจอเงื่อนไขไหนที่เป็น True ปุ๊บ มันจะรันโค้ดนั้นแล้ว "กระโดดข้าม" เงื่อนไขที่เหลือทั้งหมดทันที</p>
        `,
        right: `
            <h4>การจัดลำดับเงื่อนไขเป็นเรื่องสำคัญ</h4>
            <p>นายต้องวางเงื่อนไขที่ "เฉพาะเจาะจงที่สุด" ไว้ข้างบนสุดเสมอ ถ้าสลับลำดับผิด Logic อาจจะพังได้</p>
            <div class="code-block">
                <span class="php-comment">// แบบนี้ผิด! เพราะทุกคนที่ได้ 90 ย่อมได้ > 50</span><br>
                <span class="php-keyword">if</span> (<span class="php-var">$score</span> > 50) { <span class="php-keyword">echo</span> <span class="php-string">"Pass"</span>; }<br>
                <span class="php-keyword">elseif</span> (<span class="php-var">$score</span> > 80) { <span class="php-keyword">echo</span> <span class="php-string">"Excellent"</span>; }
            </div>
            <p>ในตัวอย่างข้างบน คนที่ได้คะแนน 90 จะได้ข้อความ "Pass" เพราะเงื่อนไขแรกถูกดักไปก่อนแล้ว ดังนั้นควรเอาคะแนนสูงๆ ไว้ข้างบนครับ</p>
        `
    },
    {
        left: `
            <h2>4. Logical Operators (ตัวเชื่อม)</h2>
            <p>บางครั้งหนึ่งเงื่อนไขอาจเกิดจากการรวมกันของหลายปัจจัย เราใช้ตัวเชื่อมทางตรรกศาสตร์มาช่วย:</p>
            <ul>
                <li><span class="tag-badge">&&</span> (AND) : ต้องจริง <b>ทั้งคู่</b> ถึงจะทำงาน</li>
                <li><span class="tag-badge">||</span> (OR) : จริงแค่ <b>อย่างใดอย่างหนึ่ง</b> ก็ทำงานแล้ว</li>
                <li><span class="tag-badge">!</span> (NOT) : กลับค่าจากจริงเป็นเท็จ (และตรงข้าม)</li>
            </ul>
            <div class="code-block">
                <span class="php-comment">// เช็คว่ามีสิทธิ์รับโปรโมชั่นไหม</span><br>
                <span class="php-keyword">if</span> (<span class="php-var">$is_member</span> && <span class="php-var">$points</span> >= 100) {<br>
                &nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"แลกรับส่วนลดได้!"</span>;<br>
                }
            </div>
        `,
        right: `
            <h4>การใช้เครื่องหมาย ! (NOT)</h4>
            <p>นักพัฒนามือโปรชอบใช้ <code>!</code> เพื่อเช็คสิ่งที่ "ไม่เกิดขึ้น" เพื่อเขียนโค้ดสไตล์ <b>Early Return</b> (ลดการซ้อนปีกกา)</p>
            <div class="code-block">
                <span class="php-keyword">if</span> (!<span class="php-var">$is_logged_in</span>) {<br>
                &nbsp;&nbsp;<span class="php-keyword">die</span>(<span class="php-string">"กรุณาเข้าสู่ระบบก่อน"</span>);<br>
                }<br>
                <span class="php-comment">// โค้ดที่เหลือจะทำงานต่อได้หายห่วง</span>
            </div>
            <div class="tip-box" style="background: #fff3cd;">
                <i class="bi bi-exclamation-triangle"></i> <b>ข้อควรระวัง:</b> การใช้ <code>&&</code> และ <code>||</code> ปนกันในบรรทัดเดียวควรใส่ปีกกาครอบกลุ่มเงื่อนไขให้ชัดเจนเพื่อป้องกันความสับสนของลำดับการคำนวณ
            </div>
        `
    },
    {
        left: `
            <h2>5. Switch Case: เมื่อตัวเลือกเยอะ</h2>
            <p>ถ้าต้องเขียน <code>elseif</code> ยาวเป็น 10 บรรทัดเพื่อเช็คตัวแปรเดิมซ้ำๆ การใช้ <b>Switch</b> จะทำให้อ่านง่ายกว่ามาก</p>
            <div class="code-block">
                <span class="php-keyword">switch</span> (<span class="php-var">$day</span>) {<br>
                &nbsp;&nbsp;<span class="php-keyword">case</span> <span class="php-string">"Monday"</span>:<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"สีเหลือง"</span>; <span class="php-keyword">break</span>;<br>
                &nbsp;&nbsp;<span class="php-keyword">case</span> <span class="php-string">"Tuesday"</span>:<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"สีชมพู"</span>; <span class="php-keyword">break</span>;<br>
                &nbsp;&nbsp;<span class="php-keyword">default</span>:<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="php-keyword">echo</span> <span class="php-string">"ระบุวันไม่ถูกต้อง"</span>;<br>
                }
            </div>
        `,
        right: `
            <h4>Break & Default คือกุญแจสำคัญ</h4>
            <p>1. <b>Break:</b> สั่งให้หยุดทำ และออกจาก switch ทันที ถ้าลืมใส่ PHP จะรัน case ต่อไปเรื่อยๆ จนจบ (เรียกว่า Fall-through)</p>
            <p>2. <b>Default:</b> เหมือน <code>else</code> สุดท้าย คือถ้าไม่เข้าเคสไหนเลย ให้มาตกที่นี่</p>
            <div class="tip-box">
                <i class="bi bi-info-circle"></i> <b>เหมาะสำหรับ:</b> การเช็คค่าคงที่ (Constants) หรือค่าสตริงที่แน่นอน ไม่เหมาะกับการเช็คช่วงตัวเลข เช่น <code>$score > 80</code>
            </div>
            <p>ใน PHP รุ่นใหม่ๆ (8.0+) เริ่มนิยมใช้ <code>match</code> แทน Switch มากขึ้นเพราะเขียนสั้นกว่าและปลอดภัยกว่า</p>
        `
    },
    {
        left: `
            <h2>6. Ternary Operator (ทางลัด)</h2>
            <p>ถ้าเงื่อนไขนายสั้นๆ แค่เลือกค่ามาใส่ตัวแปร การเขียน 5 บรรทัดอาจจะเกินไป นายสามารถใช้ <b>Ternary</b> ที่จบในบรรทัดเดียวได้</p>
            <p><b>รูปแบบ:</b> <code>(เงื่อนไข) ? จริง : เท็จ;</code></p>
            <div class="code-block">
                <span class="php-comment">// แบบปกติ</span><br>
                <span class="php-keyword">if</span> (<span class="php-var">$status</span> == 1) { <span class="php-var">$text</span> = <span class="php-string">"เปิด"</span>; }<br>

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

              if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'php 4.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            // จำลองการรัน PHP แบบ Text-based
            let output = code.replace(/<\?php|\?>/g, '').trim();
            // นี่เป็นการจำลองหน้าตาเฉยๆ เพื่อให้เห็นภาพในบทเรียน
            preview.innerHTML = "<pre style='color: #2b2d42'>" + output + "</pre>";
        }
    }
