<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 6 - PHP GET & POST Mastery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #1e293b;
            --php-indigo: #4F5B93;
            --php-dark: #232733;
            --accent-green: #2ecc71;
            --desk: #cbd5e1;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 850px; /* เพิ่มความสูงนิดหน่อยให้จุเนื้อหา */
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1250px; }

        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: var(--php-dark); left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 20px solid #1a1d26; box-shadow: 15px 0 50px rgba(0,0,0,0.4);
            cursor: pointer; backface-visibility: hidden;
            background-image: linear-gradient(135deg, #232733 0%, #4F5B93 100%);
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1250px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 50px 70px; 
            overflow-y: auto; 
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--php-indigo); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; font-weight: 700; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 25px; font-weight: 700; border-left: 5px solid var(--accent-green); padding-left: 12px; }
        p { line-height: 1.8; font-size: 1rem; color: #2d3436; margin-bottom: 1.2rem; }

        .code-block { 
            background: #282c34; color: #abb2bf; padding: 20px; 
            border-radius: 10px; font-family: 'Consolas', monospace; 
            font-size: 0.85rem; margin: 20px 0; border-left: 5px solid var(--accent-green);
            line-height: 1.5; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .tip-box { background: #f0f4ff; border-radius: 10px; padding: 20px; border-left: 5px solid var(--php-indigo); margin: 20px 0; font-size: 0.9rem; }
        .tag-badge { background: #dfe6e9; padding: 3px 8px; border-radius: 5px; font-family: monospace; color: #2d3436; font-weight: bold; }
        
        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--php-indigo); color: white; border: none; padding: 8px 25px; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-nav:hover:not(:disabled) { background: var(--accent-green); transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
         <div style="width:150px; height:150px; background:rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:30px;">
            <i class="bi bi-database-fill-gear" style="font-size:5rem; color:white"></i>
        </div>
        <h1 class="display-4 fw-bold" style="font-family: 'Chakra Petch'; letter-spacing: 2px;">PHP MASTER</h1>
        <p class="lead" style="letter-spacing: 5px; opacity: 0.9;">BACKEND DEVELOPMENT</p>
        <div style="width: 100px; height: 4px; background: var(--accent-green); margin: 25px 0; border-radius: 2px;"></div>
        <h5 class="fw-bold">UNIT 06: GET & POST METHODS</h5>
        <p class="small opacity-75">การรับ-ส่งข้อมูลระหว่าง Client และ Server</p>
        <div class="mt-4 small opacity-50"><i class="bi bi-unlock-fill"></i> CLICK TO START SESSION</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_php.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            <div class="fw-bold text-muted">หน้า <span id="pageNum">1</span> / <span id="totalPage">8</span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. ความเข้าใจพื้นฐานเรื่อง HTTP Methods</h2>
            <p>ในการเขียนโปรแกรมเว็บฝั่ง Server-side อย่าง PHP หัวใจสำคัญคือการ <b>"สื่อสาร"</b> ระหว่างหน้าเว็บที่ผู้ใช้กรอกข้อมูล (Client) กับโปรแกรมที่ประมวลผลหลังบ้าน (Server)</p>
            <p>การส่งข้อมูลนี้ทำงานผ่านโปรโตคอล HTTP ซึ่งมี 2 วิธีที่นิยมใช้มากที่สุดคือ <b>GET</b> และ <b>POST</b> ซึ่งทำหน้าที่ต่างกันอย่างสิ้นเชิงในเชิงเทคนิคและความปลอดภัย</p>
            <div class="tip-box">
                <i class="bi bi-info-circle-fill"></i> <b>ทำไมต้องเรียน?</b><br>
                ถ้าคุณส่งรหัสผ่านผ่าน GET ข้อมูลจะหลุดไปโชว์ที่ URL ทันที! การเลือกใช้วิธีที่ถูกต้องจึงไม่ใช่แค่เรื่องของฟังก์ชัน แต่เป็นเรื่องของ <b>Cyber Security</b>
            </div>
            <p>ในหน้านี้เราจะมาเจาะลึกพฤติกรรมของข้อมูลเมื่อมันถูกส่งออกจากฟอร์ม HTML ไปยังไฟล์ .php ของเราครับ</p>
        `,
        right: `
            <h4>การทำงานของ GET vs POST</h4>
            <p>ลองจินตนาการว่าการส่งข้อมูลคือการส่งจดหมาย:</p>
            <ul>
                <li><b>GET:</b> เหมือนการส่ง "ไปรษณียบัตร" ใครๆ ก็มองเห็นข้อความบนหน้าบัตรได้ ข้อมูลจะแนบไปกับที่อยู่ (URL)</li>
                <li><b>POST:</b> เหมือนการส่ง "จดหมายในซอง" ข้อมูลจะถูกซ่อนไว้ข้างในซอง (Request Body) ปลอดภัยกว่าและจุข้อมูลได้มากกว่า</li>
            </ul>
            <div class="code-block">
                // รูปแบบข้อมูลที่ Server ได้รับ (ตัวอย่าง)<br>
                <span style="color:#e06c75">GET:</span> search.php?keyword=iphone&limit=10<br><br>
                <span style="color:#e06c75">POST:</span> ข้อมูลจะถูกส่งแยกส่วนกับ URL
            </div>
            <p>ในบทนี้เราจะใช้ Superglobals Variable ของ PHP คือ <span class="tag-badge">$_GET</span> และ <span class="tag-badge">$_POST</span> ในการดึงค่าเหล่านั้นออกมาใช้งานครับ</p>
        `
    },
    {
        left: `
            <h2>2. เจาะลึก $_GET Method</h2>
            <p><b>GET</b> จะส่งข้อมูลผ่าน URL ในรูปแบบของ "Query String" เหมาะสำหรับการส่งข้อมูลที่ไม่เป็นความลับ เช่น การค้นหา หรือการระบุเลขหน้า</p>
            <h4>จุดเด่นของ GET:</h4>
            <ul>
                <li>ข้อมูลปรากฏบน URL (ทำให้ทำ Bookmark ได้)</li>
                <li>จำกัดขนาดข้อมูล (ประมาณ 2,000 ตัวอักษร)</li>
                <li>สามารถส่งค่าผ่านลิงก์ <code>&lt;a href="..."&gt;</code> ได้โดยตรง</li>
            </ul>
            <div class="code-block">
                <span style="color:#98c379">// ตัวอย่างลิงก์ส่ง ID สินค้า</span><br>
                &lt;a href="product.php?id=101"&gt;ดูสินค้า&lt;/a&gt;
            </div>
        `,
        right: `
            <h4>การรับค่าด้วย PHP:</h4>
            <p>เมื่อเราส่งค่ามาแล้ว ไฟล์ปลายทางจะใช้ตัวแปรแบบ Array พิเศษในการรับข้อมูล</p>
            <div class="code-block">
                <span style="color:#c678dd">&lt;?php</span><br>
                &nbsp;&nbsp;<span style="color:#d19a66">$product_id</span> = <span style="color:#e06c75">$_GET</span>['id'];<br>
                &nbsp;&nbsp;echo "คุณกำลังดูสินค้าชิ้นที่: " . <span style="color:#d19a66">$product_id</span>;<br>
                <span style="color:#c678dd">?&gt;</span>
            </div>
            <div class="tip-box" style="background:#fff3cd; border-color:#ffeeba">
                <i class="bi bi-exclamation-triangle-fill"></i> <b>ข้อควรระวัง:</b><br>
                ห้ามใช้ GET ในการส่ง <b>Password, เลขบัตรประชาชน</b> หรือข้อมูลส่วนตัวเด็ดขาด เพราะข้อมูลจะถูกบันทึกไว้ใน Browser History
            </div>
        `
    },
    {
        left: `
            <h2>3. เจาะลึก $_POST Method</h2>
            <p><b>POST</b> คือพระเอกสำหรับการทำระบบสมาชิก การเก็บข้อมูลลง Database หรือการอัปโหลดไฟล์ ข้อมูลจะถูกส่งผ่าน HTTP Body ไม่โชว์บน URL</p>
            <h4>ทำไมต้องใช้ POST?</h4>
            <p>1. <b>Security:</b> ปลอดภัยกว่าเพราะข้อมูลไม่โชว์หราบนแถบ Address Bar</p>
            <p>2. <b>Capacity:</b> ไม่จำกัดขนาดข้อมูล (ขึ้นอยู่กับการตั้งค่า Server) ส่งรูปภาพหรือวิดีโอได้</p>
            <p>3. <b>Reliability:</b> ข้อมูลจะไม่ถูกเก็บไว้ใน Cache ของเบราว์เซอร์</p>
        `,
        right: `
            <h4>ตัวอย่างการใช้งานจริง:</h4>
            <div class="code-block">
                <span style="color:#98c379">// หน้า login.html</span><br>
                &lt;form action="auth.php" method="POST"&gt;<br>
                &nbsp;&nbsp;&lt;input type="password" name="pass"&gt;<br>
                &nbsp;&nbsp;&lt;button type="submit"&gt;ตกลง&lt;/button&gt;<br>
                &lt;/form&gt;
            </div>
            <div class="code-block">
                <span style="color:#c678dd">// หน้า auth.php</span><br>
                <span style="color:#d19a66">$mypass</span> = <span style="color:#e06c75">$_POST</span>['pass'];<br>
                echo "ตรวจสอบรหัสผ่าน...";
            </div>
            <p>สังเกตว่าชื่อใน <code>['pass']</code> ต้องตรงกับ <code>name="pass"</code> ใน HTML เสมอ!</p>
        `
    },
    {
        left: `
            <h2>4. โครงสร้างฟอร์ม HTML สำหรับ PHP</h2>
            <p>การจะส่งข้อมูลให้ PHP ประมวลผลได้ ฟอร์ม HTML ต้องมี Attribute ครบ 3 อย่างนี้เสมอ:</p>
            <ol>
                <li><b>Action:</b> ไฟล์ปลายทางที่จะรับข้อมูล (เช่น <code>save.php</code>)</li>
                <li><b>Method:</b> ระบุว่าจะส่งแบบ <code>GET</code> หรือ <code>POST</code></li>
                <li><b>Name:</b> (สำคัญมาก) input ทุกตัวต้องมีชื่อ เพื่อให้ PHP ดึงค่าไปใช้ได้</li>
            </ol>
            <div class="tip-box">
                <i class="bi bi-lightbulb-fill"></i> <b>Pro Tip:</b><br>
                ถ้าไม่ใส่ <code>action</code> ฟอร์มจะส่งข้อมูลกลับมาที่หน้าเดิม (Self-submit)
            </div>
        `,
        right: `
            <h4>Template ฟอร์มมาตรฐาน:</h4>
            <div class="code-block" style="font-size:0.8rem">
                &lt;form action="process.php" method="POST"&gt;<br>
                &nbsp;&nbsp;&lt;label&gt;ชื่อผู้ใช้:&lt;/label&gt;<br>
                &nbsp;&nbsp;&lt;input type="text" name="username"&gt;<br><br>
                &nbsp;&nbsp;&lt;label&gt;อีเมล:&lt;/label&gt;<br>
                &nbsp;&nbsp;&lt;input type="email" name="user_email"&gt;<br><br>
                &nbsp;&nbsp;&lt;button type="submit"&gt;ส่งข้อมูล&lt;/button&gt;<br>
                &lt;/form&gt;
            </div>
            <p>เมื่อกดปุ่มส่ง ข้อมูลจะวิ่งไปที่ <code>process.php</code> โดยอัตโนมัติ นายเตรียมตัวเขียน PHP รอรับได้เลย!</p>
        `
    },
    {
        left: `
            <h2>5. การตรวจสอบความถูกต้อง (Validation)</h2>
            <p>กฎเหล็กของโปรแกรมเมอร์คือ <b>"Never trust user input"</b> (อย่าไว้ใจสิ่งที่ผู้ใช้กรอก) เพราะเขาอาจจะแฮกเราได้!</p>
            <p>เราต้องตรวจสอบก่อนว่ามีการส่งข้อมูลมาจริงไหมด้วยฟังก์ชัน <span class="tag-badge">isset()</span> หรือ <span class="tag-badge">empty()</span></p>
            <div class="code-block">
                <span style="color:#c678dd">if</span> ( <span style="color:#e06c75">isset</span>(<span style="color:#e06c75">$_POST</span>['user']) ) {<br>
                &nbsp;&nbsp;<span style="color:#98c379">// ทำงานเมื่อมีการกดปุ่มส่งมาจริงๆ</span><br>
                } <span style="color:#c678dd">else</span> {<br>
                &nbsp;&nbsp;<span style="color:#98c379">// ป้องกันคนแอบเข้าหน้า process.php ตรงๆ</span><br>
                &nbsp;&nbsp;die("กรุณาส่งข้อมูลผ่านฟอร์ม");<br>
                }
            </div>
        `,
        right: `
            <h4>การทำความสะอาดข้อมูล (Sanitization)</h4>
            <p>เพื่อป้องกันการโจมตีแบบ <b>XSS (Cross-Site Scripting)</b> เราควรกรองเครื่องหมายพิเศษทิ้งก่อนแสดงผล</p>
            <div class="code-block">
                <span style="color:#d19a66">$name</span> = <span style="color:#e06c75">htmlspecialchars</span>(<span style="color:#e06c75">$_POST</span>['name']);<br>
                echo "สวัสดีคุณ " . <span style="color:#d19a66">$name</span>;
            </div>
            <p>ฟังก์ชัน <code>htmlspecialchars()</code> จะเปลี่ยนเครื่องหมายอย่าง &lt; ให้กลายเป็นข้อความธรรมดา ทำให้แฮกเกอร์รันสคริปต์ในเว็บเราไม่ได้</p>
            <div class="tip-box" style="background:#d1f2eb">
                <i class="bi bi-shield-lock-fill"></i> <b>Security Check:</b><br>
                การกรองข้อมูลเป็นสิ่งที่แยก "มือสมัครเล่น" ออกจาก "มืออาชีพ" ครับเพื่อน!
            </div>
        `
    },
    {
        left: `
            <h2>6. การส่งค่า Array และ Multiple Selection</h2>
            <p>บางครั้งเราต้องการให้ผู้ใช้เลือกได้หลายค่า เช่น "งานอดิเรก" (Checkbox) PHP มีวิธีรับค่าเหล่านี้เป็น Array ได้ง่ายๆ</p>
            <h4>วิธีส่งค่าเป็นชุด:</h4>
            <p>ใน HTML ให้เติมเครื่องหมาย <span class="tag-badge">[]</span> ไว้หลังชื่อ name</p>
            <div class="code-block">
                &lt;input type="checkbox" name="hobby[]" value="Read"&gt; อ่านหนังสือ<br>
                &lt;input type="checkbox" name="hobby[]" value="Code"&gt; เขียนโค้ด<br>
                &lt;input type="checkbox" name="hobby[]" value="Game"&gt; เล่นเกม
            </div>
        `,
        right: `
            <h4>วิธีประมวลผลใน PHP:</h4>
            <p>เราจะใช้ Loop เพื่อดึงข้อมูลที่ถูกเลือกออกมาทั้งหมด</p>
            <div class="code-block">
                <span style="color:#d19a66">$hobbies</span> = <span style="color:#e06c75">$_POST</span>['hobby']; <span style="color:#98c379">// จะได้เป็น Array</span><br><br>
                <span style="color:#c678dd">foreach</span> (<span style="color:#d19a66">$hobbies</span> <span style="color:#c678dd">as</span> <span style="color:#d19a66">$item</span>) {<br>
                &nbsp;&nbsp;echo "คุณชอบ: " . <span style="color:#d19a66">$item</span> . "&lt;br&gt;";<br>
                }
            </div>
            <p>วิธีนี้ยืดหยุ่นมาก ไม่ว่าผู้ใช้จะเลือกมากี่อย่าง PHP ก็จัดการได้หมดในครั้งเดียว!</p>
        `
    },
    {
        left: `
            <h2>7. ข้อดีและข้อเสีย (Comparison Table)</h2>
            <p>เพื่อให้นายเลือกใช้งานได้ถูกต้องที่สุด มาดูตารางเปรียบเทียบหมัดต่อหมัดกันครับ:</p>

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

              if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'php 7.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }
</script>
