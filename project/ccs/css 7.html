<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 7 - Responsive Design Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #1e293b;
            --css-blue: #2965f1;
            --dark-blue: #1b47b4;
            --accent-purple: #8b5cf6;
            --desk: #cbd5e1;
            --preview-bg: #ffffff;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 800px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        /* --- ใหม่: ดีไซน์หน้าปก Responsive --- */
        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: linear-gradient(135deg, var(--css-blue), var(--accent-purple)); 
            left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid rgba(0,0,0,0.2); box-shadow: 15px 0 50px rgba(0,0,0,0.3);
            cursor: pointer; backface-visibility: hidden;
        }

        .device-icons {
            display: flex; gap: 15px; margin-bottom: 25px; align-items: flex-end;
        }
        .device-icons i:nth-child(1) { font-size: 4rem; }
        .device-icons i:nth-child(2) { font-size: 2.5rem; opacity: 0.8; }
        .device-icons i:nth-child(3) { font-size: 1.5rem; opacity: 0.6; }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 50px 60px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--css-blue); border-bottom: 3px solid var(--css-blue); display: inline-block; padding-bottom: 5px; margin-bottom: 25px; font-weight: 700; font-size: 1.8rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 25px; font-weight: 700; border-left: 5px solid var(--accent-purple); padding-left: 15px; font-size: 1.2rem; }
        p { line-height: 1.8; font-size: 1rem; color: #334155; margin-bottom: 1.2rem; text-align: justify; }

        /* Code & Preview Styling */
        .code-block { 
            background: #1e1e1e; color: #d4d4d4; padding: 20px; 
            border-radius: 10px; font-family: 'JetBrains Mono', monospace; 
            font-size: 0.85rem; margin: 20px 0; border-left: 5px solid var(--css-blue);
            line-height: 1.5; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .preview-label { background: #334155; color: white; font-size: 0.8rem; padding: 5px 15px; border-radius: 5px 5px 0 0; display: inline-block; }
        .code-preview { background: var(--preview-bg); border: 2px solid #e2e8f0; padding: 20px; border-radius: 0 10px 10px 10px; margin-bottom: 25px; }

        .tag { color: #569cd6; } .attr { color: #9cdcfe; } .val { color: #ce9178; } .comment { color: #6a9955; } .prop { color: #b5cea8; }

        .tip-box { background: #f0f9ff; border-radius: 10px; padding: 20px; border-left: 5px solid var(--css-blue); margin: 20px 0; font-size: 0.95rem; color: #0369a1; }
        .tag-badge { background: #e0e7ff; padding: 3px 8px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; color: var(--css-blue); font-size: 0.9rem; }

        #editor { width: 100%; height: 180px; font-family: 'JetBrains Mono', monospace; padding: 15px; border-radius: 10px; border: 1px solid #cbd5e1; background: #fff; margin-bottom: 15px; }
        #live-preview { width: 100%; height: 220px; background: white; border: 2px dashed #cbd5e1; border-radius: 10px; padding: 15px; overflow: auto; transition: 0.3s; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--ink); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-nav:hover:not(:disabled) { background: var(--css-blue); transform: translateY(-2px); }
        .btn-next-chapter { background: #059669; }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
        <div class="device-icons">
            <i class="bi bi-laptop"></i>
            <i class="bi bi-tablet-landscape"></i>
            <i class="bi bi-phone"></i>
        </div>
        <h1 class="display-4 fw-bold" style="font-family: 'Chakra Petch'; letter-spacing: 2px;">CSS3</h1>
        <p class="lead" style="letter-spacing: 5px; font-weight: 300;">RESPONSIVE DESIGN</p>
        <div style="width: 100px; height: 5px; background: rgba(255,255,255,0.3); margin: 25px 0; border-radius: 10px;"></div>
        <h5 class="fw-bold">UNIT 07: MASTERING LAYOUTS</h5>
        <p class="small opacity-75">เขียนโค้ดครั้งเดียว แสดงผลสวยงามทุกอุปกรณ์</p>
        <div class="mt-4 small opacity-75"><i class="bi bi-mouse-fill"></i> คลิกเพื่อเปิดบทเรียน</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_css.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            <div class="fw-bold text-muted">หน้า <span id="pageNum">1</span> / <span id="totalPage">8</span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. แนวคิด Responsive</h2>
            <p>ในยุคปัจจุบัน ผู้ใช้งานเข้าถึงเว็บไซต์ผ่านอุปกรณ์ที่หลากหลาย ตั้งแต่หน้าจอสมาร์ทโฟนขนาดเล็ก ไปจนถึงจอ Monitor 4K ขนาดใหญ่ <b>Responsive Web Design (RWD)</b> คือเทคนิคการสร้างเว็บที่สามารถปรับเปลี่ยนหน้าตา (Layout) ให้เหมาะสมกับขนาดหน้าจอโดยอัตโนมัติ</p>
            <h4>ทำไมต้องทำ Responsive?</h4>
            <p>1. <b>User Experience:</b> มอบประสบการณ์ที่ดีที่สุด ไม่ว่าลูกค้าจะใช้อะไรเปิดเว็บ<br>
               2. <b>SEO Friendly:</b> Google ให้คะแนนเว็บที่เป็น Mobile-friendly สูงกว่า<br>
               3. <b>Cost Effective:</b> ดูแลโค้ดชุดเดียว แทนที่จะต้องทำแยกเวอร์ชัน Mobile และ Desktop</p>
            <div class="tip-box">
                <i class="bi bi-info-circle-fill"></i> หัวใจของ Responsive คือ <b>"Fluidity"</b> หรือการทำให้เนื้อหาไหลไปตามขนาดหน้าจอเหมือนน้ำในภาชนะ
            </div>
        `,
        right: `
            <h4>Viewport Meta Tag</h4>
            <p>ก้าวแรกของการทำ Responsive คือการบอกเบราว์เซอร์ให้รู้จักขนาดหน้าจอที่แท้จริง โดยการใส่ Tag นี้ใน <code>&lt;head&gt;</code></p>
            <div class="code-block">
                <span class="tag">&lt;meta</span> <span class="attr">name=</span><span class="val">"viewport"</span> <span class="attr">content=</span><span class="val">"width=device-width, initial-scale=1.0"</span><span class="tag">&gt;</span>
            </div>
            <p><b>width=device-width:</b> ตั้งค่าความกว้างหน้าเว็บให้เท่ากับความกว้างของอุปกรณ์<br>
            <b>initial-scale=1.0:</b> กำหนดระดับการซูมเริ่มต้นเมื่อโหลดหน้าเว็บครั้งแรก</p>
            <p>หากขาดแท็กนี้ไป เบราว์เซอร์บนมือถือจะพยายาม "ย่อ" หน้าเว็บ Desktop ลงมาให้พอดีจอ ทำให้ตัวหนังสือเล็กจนอ่านไม่ออกครับ</p>
        `
    },
    {
        left: `
            <h2>2. Media Queries</h2>
            <p>นี่คืออาวุธลับของ CSS3! <b>Media Queries</b> ช่วยให้เราเขียนเงื่อนไขเพื่อสั่งให้ CSS ทำงานเฉพาะในขนาดหน้าจอที่เรากำหนดเท่านั้น</p>
            <h4>โครงสร้างการเขียน:</h4>
            <div class="code-block">
                <span class="comment">/* เมื่อหน้าจอมีความกว้างไม่เกิน 600px */</span><br>
                <span class="tag">@media</span> (max-width: 600px) {<br>
                &nbsp;&nbsp;<span class="tag">body</span> {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="attr">background-color</span>: <span class="val">lightblue</span>;<br>
                &nbsp;&nbsp;}<br>
                }
            </div>
            <p>นายสามารถเปลี่ยนสี ฟอนต์ หรือแม้แต่ซ่อนองค์ประกอบที่ไม่จำเป็นบนมือถือได้ผ่านคำสั่งนี้</p>
        `,
        right: `
            <h4>Breakpoints ที่นิยมใช้</h4>
            <p>การเลือก "จุดเปลี่ยน" ของหน้าจอควรพิจารณาจากเนื้อหาเป็นหลัก แต่มาตรฐานทั่วไปมีดังนี้:</p>
            <ul>
                <li><b>576px:</b> สำหรับสมาร์ทโฟนแนวตั้ง</li>
                <li><b>768px:</b> สำหรับแท็บเล็ต (Tablets)</li>
                <li><b>992px:</b> สำหรับ Laptop หรือหน้าจอขนาดกลาง</li>
                <li><b>1200px:</b> สำหรับ Desktop จอใหญ่</li>
            </ul>
            <div class="tip-box" style="background: #fff7ed; border-color: #f97316; color: #9a3412;">
                <b>Mobile First Strategy:</b> แนะนำให้เขียน CSS สำหรับมือถือเป็นหลักก่อน แล้วค่อยใช้ Media Queries เพิ่มคำสั่งสำหรับจอที่ใหญ่ขึ้น วิธีนี้จะทำให้โค้ดสะอาดกว่ามากครับ
            </div>
        `
    },
    {
        left: `
            <h2>3. Flexible Grid (CSS Grid)</h2>
            <p>การจัด Layout สมัยใหม่นิยมใช้ <b>CSS Grid</b> เพราะควบคุมได้ทั้งแถว (Rows) และคอลัมน์ (Columns) อย่างอิสระ</p>
            <div class="code-block">
                <span class="tag">.container</span> {<br>
                &nbsp;&nbsp;<span class="attr">display</span>: <span class="val">grid</span>;<br>
                &nbsp;&nbsp;<span class="attr">grid-template-columns</span>: <span class="val">repeat(auto-fit, minmax(200px, 1fr))</span>;<br>
                &nbsp;&nbsp;<span class="attr">gap</span>: <span class="val">20px</span>;<br>
                }
            </div>
            <p>คำสั่ง <code>auto-fit</code> และ <code>minmax</code> คือเวทมนตร์ที่ทำให้คอลัมน์ปรับจำนวนเองตามความกว้างหน้าจอ โดยที่เราไม่ต้องเขียน Media Queries แม้แต่บรรทัดเดียว!</p>
        `,
        right: `
            <h4>ตัวอย่างการทำงานของ Grid</h4>
            <p>ลองดูผลลัพธ์ของการจัดวางแบบยืดหยุ่น:</p>
            <div class="preview-label">Grid Layout Demo:</div>
            <div class="code-preview">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <div style="background:var(--css-blue); color:white; padding:10px; text-align:center;">Box 1</div>
                    <div style="background:var(--css-blue); color:white; padding:10px; text-align:center;">Box 2</div>
                    <div style="background:var(--css-blue); color:white; padding:10px; text-align:center;">Box 3</div>
                </div>
            </div>
            <p>บนจอ Desktop จะเห็นเป็น 3 คอลัมน์ แต่ถ้าเราเขียน CSS ให้ดี เมื่อเปิดบนมือถือ มันจะกลายเป็น 1 คอลัมน์เรียงกันลงมาให้อัตโนมัติ</p>
        `
    },
    {
        left: `
            <h2>4. Flexbox: ความยืดหยุ่นขั้นสุด</h2>
            <p><b>Flexbox</b> เหมาะสำหรับการจัดวาง Item ภายในแถวเดียว (1D Layout) เช่น เมนูบาร์ หรือการวางรูปภาพคู่กับข้อความ</p>
            <h4>Property ที่ต้องรู้:</h4>
            <ul>
                <li><span class="tag-badge">flex-wrap: wrap</span> : สั่งให้ Item ตกไปบรรทัดใหม่เมื่อพื้นที่ไม่พอ</li>
                <li><span class="tag-badge">justify-content</span> : จัดตำแหน่งแนวราบ (Center, Space-between)</li>
                <li><span class="tag-badge">align-items</span> : จัดตำแหน่งแนวตั้ง</li>
            </ul>
            <div class="code-block">
                <span class="tag">.navbar</span> {<br>
                &nbsp;&nbsp;<span class="attr">display</span>: <span class="val">flex</span>;<br>
                &nbsp;&nbsp;<span class="attr">flex-wrap</span>: <span class="val">wrap</span>;<br>
                &nbsp;&nbsp;<span class="attr">justify-content</span>: <span class="val">space-around</span>;<br>
                }
            </div>
        `,
        right: `
            <h4>Flex vs Grid ต่างกันยังไง?</h4>
            <p>แม้ทั้งคู่จะทำหน้าที่จัดวางเหมือนกัน แต่มีจุดเด่นต่างกัน:</p>
            <table class="table table-bordered small">
                <tr class="bg-light"><th>หัวข้อ</th><th>Flexbox</th><th>CSS Grid</th></tr>
                <tr><td>มิติ</td><td>1 มิติ (แถวหรือคอลัมน์)</td><td>2 มิติ (ทั้งคู่)</td></tr>
                <tr><td>เหมาะสำหรับ</td><td>เมนู, กลุ่มปุ่ม, ส่วนประกอบย่อย</td><td>โครงสร้างหน้าเว็บทั้งหน้า</td></tr>
                <tr><td>การจัดวาง</td><td>เน้นเนื้อหาภายใน (Content)</td><td>เน้นโครงสร้าง (Layout)</td></tr>
            </table>
            <p>นักพัฒนาที่ดีจะใช้ทั้งสองอย่างร่วมกัน เช่น ใช้ Grid วางโครงหน้า และใช้ Flexbox วางเมนูใน Header ครับ</p>
        `
    },
    {
        left: `
            <h2>5. Responsive Images & Typography</h2>
            <p>นอกจาก Layout แล้ว สิ่งที่มักจะ "พัง" เมื่อหน้าจอเปลี่ยนขนาดคือ <b>รูปภาพ</b> และ <b>ขนาดตัวอักษร</b></p>
            <h4>Fluid Images:</h4>
            <p>กฎเหล็กคือการไม่ระบุความกว้างเป็น px ตายตัว แต่ให้ใช้ % แทน:</p>
            <div class="code-block">
                <span class="tag">img</span> {<br>
                &nbsp;&nbsp;<span class="attr">max-width</span>: <span class="val">100%</span>;<br>
                &nbsp;&nbsp;<span class="attr">height</span>: <span class="val">auto</span>;<br>
                }
            </div>
            <p>คำสั่งนี้จะช่วยให้รูปภาพไม่กว้างไปกว่าภาชนะที่หุ้มมันอยู่ และปรับความสูงตามสัดส่วนเดิมเสมอ</p>
        `,
        right: `
            <h4>Responsive Typography:</h4>
            <p>เลิกใช้ <code>px</code> สำหรับฟอนต์ และเปลี่ยนมาใช้หน่วยที่สัมพันธ์กับหน้าจอแทน:</p>
            <ul>
                <li><b>rem:</b> อ้างอิงขนาดฟอนต์หลักของเว็บ (แนะนำที่สุด)</li>
                <li><b>vw (Viewport Width):</b> ขนาดจะเปลี่ยนตามความกว้างหน้าจอ</li>
            </ul>
            <div class="code-block">
                <span class="tag">h1</span> {<br>
                &nbsp;&nbsp;<span class="attr">font-size</span>: <span class="val">calc(1.5rem + 1vw)</span>;<br>
                }
            </div>
            <p>การใช้ <code>calc()</code> ผสมหน่วย rem กับ vw จะช่วยให้ฟอนต์ค่อยๆ ใหญ่ขึ้นตามจอได้อย่างนุ่มนวล ไม่กระโดดครับ</p>
        `
    },
    {
        left: `
            <h2>6. การซ่อน/แสดงตามอุปกรณ์</h2>
            <p>บางครั้งเนื้อหาบางอย่างบน Desktop ก็ไม่จำเป็นต้องมีบน Mobile (เช่น วิดีโอพื้นหลังขนาดใหญ่) เราใช้ <b>display property</b> ในการควบคุม</p>
            <div class="code-block">
                <span class="comment">/* ซ่อนบนมือถือ */</span><br>
                <span class="tag">.desktop-only</span> { <span class="attr">display</span>: <span class="val">none</span>; }<br><br>
                <span class="tag">@media</span> (min-width: 992px) {<br>
                &nbsp;&nbsp;<span class="tag">.desktop-only</span> { <span class="attr">display</span>: <span class="val">block</span>; }<br>
                }
            </div>
            <p>วิธีนี้ช่วยประหยัดพื้นที่หน้าจอและช่วยให้ผู้ใช้มือถือโฟกัสกับเนื้อหาสำคัญได้ดีขึ้น</p>
        `,

    let currentPage = 0;
    let isOpen = false;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

             if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'css 8.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            preview.innerHTML = code;
        }
    }
</script>
