<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 8 - CSS3 Transitions & Animations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #2b2d42;
            --css-blue: #2965f1;
            --css-purple: #663399;
            --desk: #d1d5db;
            --preview-bg: #ffffff;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 850px; /* ขยายความสูงเพิ่ม */
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: linear-gradient(135deg, var(--css-blue), var(--css-purple)); left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid rgba(0,0,0,0.3); box-shadow: 15px 0 50px rgba(0,0,0,0.3);
            cursor: pointer; backface-visibility: hidden; overflow: hidden;
        }

        /* ตกแต่งหน้าปกให้มี Animation */
        .cover-circle {
            position: absolute; width: 300px; height: 300px;
            border: 2px dashed rgba(255,255,255,0.2); border-radius: 50%;
            animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 40px 50px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--css-purple); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; font-weight: 700; font-size: 1.6rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 20px; font-weight: 700; border-left: 4px solid var(--css-blue); padding-left: 10px; font-size: 1.1rem; }
        p { line-height: 1.7; font-size: 0.95rem; color: #333; margin-bottom: 1rem; }

        .code-block { 
            background: #282c34; color: #abb2bf; padding: 15px; 
            border-radius: 10px 10px 0 0; font-family: 'Consolas', monospace; 
            font-size: 0.8rem; margin-top: 15px; border-left: 5px solid var(--css-blue);
            line-height: 1.4; position: relative;
        }
        .preview-label { background: #e9ecef; color: #495057; font-size: 0.75rem; padding: 4px 12px; font-weight: bold; border-left: 5px solid #adb5bd; }
        .code-preview { background: var(--preview-bg); border: 1px solid #ddd; padding: 25px; border-radius: 0 0 10px 10px; margin-bottom: 20px; }

        .tag { color: #e06c75; } .attr { color: #d19a66; } .val { color: #98c379; } .prop { color: #56b6c2; }

        .tip-box { background: #f0f7ff; border-radius: 8px; padding: 15px; border-left: 5px solid var(--css-blue); margin: 15px 0; font-size: 0.9rem; }
        .tag-badge { background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; color: var(--css-purple); font-size: 0.85rem; }

        #editor { width: 100%; height: 180px; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: #fff; margin-bottom: 10px; }
        #live-preview { width: 100%; height: 250px; background: white; border: 2px dashed #bbb; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--ink); color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .btn-nav:hover:not(:disabled) { background: var(--css-blue); transform: translateY(-2px); }
        
        /* Demo Box */
        .box-demo { width: 80px; height: 80px; background: var(--css-blue); border-radius: 10px; transition: all 0.5s ease; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7rem; text-align: center; }
        .box-demo:hover { transform: scale(1.2) rotate(15deg); background: var(--css-purple); }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
        <div class="cover-circle"></div>
        <div style="width:130px; height:130px; background:white; border-radius:30%; display:flex; align-items:center; justify-content:center; margin-bottom:20px; z-index: 2; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
            <i class="bi bi-magic" style="font-size:4.5rem; color:var(--css-purple)"></i>
        </div>
        <h1 class="display-4 fw-bold" style="font-family: 'Chakra Petch'; z-index: 2;">CSS3</h1>
        <p class="lead" style="z-index: 2; letter-spacing: 3px;">ANIMATION MASTERCLASS</p>
        <div style="width: 70px; height: 4px; background: white; margin: 20px 0; border-radius: 2px; z-index: 2;"></div>
        <h5 class="fw-bold" style="z-index: 2;">UNIT 08: TRANSITIONS & ANIMATIONS</h5>
        <p class="small opacity-75" style="z-index: 2; padding: 0 40px;">เปลี่ยนเว็บธรรมดาให้มีชีวิตด้วยศาสตร์แห่งความเคลื่อนไหว</p>
        <div class="mt-4 small opacity-75 animate-bounce" style="z-index: 2;"><i class="bi bi-hand-index-thumb"></i> คลิกเพื่อเปิดบทเรียนสุดท้าย</div>
    </div>

     <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_css.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            <div class="fw-bold text-muted">หน้า <span id="pageNum">1</span> / <span id="totalPage">8</span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. พลังของความเคลื่อนไหว</h2>
            <p>ในบทนี้เราจะขยับจากหน้าเว็บนิ่งๆ สู่การสร้างประสบการณ์ที่โต้ตอบกับผู้ใช้ได้ <b>Transitions</b> และ <b>Animations</b> ไม่ได้มีไว้เพื่อความสวยงามเท่านั้น แต่ยังช่วยบอกสถานะ (Feedback) ให้ผู้ใช้รู้ว่ากำลังเกิดอะไรขึ้น</p>
            <h4>Transition vs Animation</h4>
            <p><b>Transitions:</b> คือการเปลี่ยนค่าคุณสมบัติจาก A ไป B เมื่อมีเหตุการณ์มากระตุ้น เช่น การเอาเมาส์ไปชี้ (Hover)</p>
            <p><b>Animations:</b> คือการสร้างลำดับการเคลื่อนไหวที่ซับซ้อนกว่า สามารถรันได้เองโดยไม่ต้องรอการ Hover และคุมจังหวะได้ละเอียดผ่าน Keyframes</p>
            <div class="tip-box">
                <i class="bi bi-info-circle"></i> <b>ทำไมต้องใช้ CSS?</b> เพราะประหยัดทรัพยากรกว่าการใช้ JavaScript และให้ความลื่นไหลระดับ 60fps บนเบราว์เซอร์สมัยใหม่
            </div>
            <p>การเคลื่อนที่ที่ดีควรจะ "นุ่มนวล" ไม่ใช่แค่การเปลี่ยนปุบปับ ซึ่งคุณสมบัติ <code>transition</code> คือหัวใจหลักที่เราจะเริ่มเรียนกันในหน้านี้ครับ</p>
        `,
        right: `
            <h2>2. พื้นฐาน Transition</h2>
            <p>การเขียนแบบย่อที่นิยมที่สุดคือใช้คำสั่งเดียวที่รวมเอา 4 อย่างเข้าด้วยกัน:</p>
            <div class="code-block">
                <span class="prop">transition:</span> [property] [duration] [timing] [delay];
            </div>
            <ul class="mt-3">
                <li><b>Property:</b> ชื่อ CSS ที่ต้องการให้ขยับ เช่น <code>all</code>, <code>background</code></li>
                <li><b>Duration:</b> ระยะเวลา (เช่น 0.3s, 500ms)</li>
                <li><b>Timing:</b> จังหวะการเคลื่อนที่ (<code>ease</code>, <code>linear</code>, <code>ease-in-out</code>)</li>
            </ul>
            <div class="preview-label">ทดลอง Hover ที่กล่อง:</div>
            <div class="code-preview d-flex justify-content-center">
                <div class="box-demo">Hover Me!</div>
            </div>
            <p>สังเกตว่าเมื่อเมาส์ชี้ สีและขนาดจะค่อยๆ เปลี่ยนไปตามเวลาที่กำหนด นี่คือพื้นฐานที่ทำให้เว็บดูพรีเมียมขึ้นทันตาเห็น</p>
        `
    },
    {
        left: `
            <h2>3. เจาะลึก Timing Functions</h2>
            <p>จังหวะการเคลื่อนไหว (Timing) คือสิ่งที่กำหนด "อารมณ์" ของ Animation มาดูกันว่าแต่ละแบบให้ความรู้สึกต่างกันยังไง:</p>
            <ul>
                <li><b>Ease:</b> (ค่าเริ่มต้น) เริ่มช้า เร็วกลาง แล้วจบช้า ดูเป็นธรรมชาติ</li>
                <li><b>Linear:</b> ความเร็วคงที่ตลอดทาง ดูเป็นหุ่นยนต์</li>
                <li><b>Ease-In:</b> เริ่มช้าแล้วไปเร็วตอนจบ เหมาะกับของที่พุ่งออกไป</li>
                <li><b>Ease-Out:</b> เริ่มเร็วแล้วค่อยๆ เบรกตอนจบ เหมาะกับของที่วิ่งเข้ามาหยุด</li>
            </ul>
            <div class="tip-box" style="background: #fff3cd;">
                <i class="bi bi-magic"></i> <b>Cubic-Bezier:</b> สำหรับมือโปร นายสามารถกำหนดความชันของกราฟความเร็วเองได้ เพื่อสร้างการเคลื่อนที่แบบ "เด้ง" (Bounce) ที่ไม่เหมือนใคร
            </div>
        `,
        right: `
            <h2>4. การระบุหลาย Property</h2>
            <p>นายไม่จำเป็นต้องใช้ <code>all</code> เสมอไป เพราะอาจทำให้เครื่องทำงานหนัก นายสามารถเลือกเฉพาะจุดได้:</p>
            <div class="code-block">
                <span class="prop">transition:</span> 
                background <span class="val">0.5s</span>, 
                transform <span class="val">0.2s</span>;
            </div>
            <p>การกำหนดแยกกันแบบนี้ ช่วยให้เราสร้างลำดับเลเยอร์ความเร็วที่ต่างกันใน Element เดียวได้</p>
            <h4>5. Transition Delay</h4>
            <p>คือการสั่งให้ "รอก่อน" แล้วค่อยเริ่มขยับ มีประโยชน์มากเวลาทำเมนูที่ค่อยๆ โผล่ขึ้นมาทีละอันแบบ Cascade</p>
            <div class="code-block">
                <span class="prop">transition-delay:</span> <span class="val">0.1s</span>;
            </div>
            <p>จำไว้ว่า: <i>"ความลื่นไหลคือหัวใจของ User Experience"</i></p>
        `
    },
    {
        left: `
            <h2>6. เริ่มต้นกับ @keyframes</h2>
            <p>ถ้า Transition คือการเปลี่ยนจากจุดหนึ่งไปอีกจุดหนึ่ง <b>Keyframes</b> คือการเขียน "บทละคร" ว่าในแต่ละวินาที Element ต้องทำอะไรบ้าง</p>
            <div class="code-block">
                <span class="tag">@keyframes</span> <span class="val">slideIn</span> {<br>
                &nbsp;&nbsp;0% { transform: translateX(-100%); }<br>
                &nbsp;&nbsp;50% { transform: rotate(10deg); }<br>
                &nbsp;&nbsp;100% { transform: translateX(0); }<br>
                }
            </div>
            <p>เราสามารถแบ่งช่วงเวลาเป็นเปอร์เซ็นต์ได้ละเอียดเท่าที่ต้องการ ตั้งแต่ 0% จนถึง 100%</p>
        `,
        right: `
            <h2>7. การเรียกใช้ Animation</h2>
            <p>เมื่อสร้างบท (Keyframes) เสร็จแล้ว ต้องสั่งให้ตัวละครเริ่มเล่นด้วยคำสั่งนี้:</p>
            <div class="code-block">
                <span class="prop">animation-name:</span> <span class="val">slideIn</span>;<br>
                <span class="prop">animation-duration:</span> <span class="val">2s</span>;<br>
                <span class="prop">animation-iteration-count:</span> <span class="val">infinite</span>;
            </div>
            <p><b>Iteration Count:</b> กำหนดรอบการเล่น เช่น 1 รอบ, 5 รอบ หรือ <code>infinite</code> เพื่อให้วนลูปตลอดไป</p>
            <p><b>Direction:</b> สามารถสั่งให้เล่นถอยหลังได้ด้วย <code>alternate</code> ซึ่งจะทำให้การเคลื่อนไหวดูต่อเนื่องไม่กระตุกตอนเริ่มลูปใหม่</p>
        `
    },
    {
        left: `
            <h2>8. สรุปบทเรียนและการประยุกต์</h2>
            <p>ยินดีด้วยเพื่อน! นายเดินทางมาถึงบทสุดท้ายของซีรีส์นี้แล้ว การใช้ Animation ที่ดีคือ <b>"ใช้แต่พอดี"</b> อย่าทำให้ผู้ใช้มึนหัว</p>
            <h4>โจทย์ส่งท้าย:</h4>
            <ul class="small">
                <li>สร้างกล่องสี่เหลี่ยม</li>
                <li>ทำให้มันหมุน (rotate) ตลอดเวลา</li>
                <li>เมื่อ Hover ให้เปลี่ยนสีและขยายขนาด</li>
                <li>ลองปรับค่า Timing ให้ดูเด้งน่าสนใจ</li>
            </ul>
            <textarea id="editor" spellcheck="false" oninput="updatePreview()">
<style>
  .ball {
    width: 60px; height: 60px;
    background: #663399;
    border-radius: 15px;
    margin: 20px auto;
    animation: myMove 2s infinite alternate ease-in-out;
    transition: all 0.3s;
    cursor: pointer;
  }
  .ball:hover {
    background: #2965f1;
    transform: scale(1.5) rotate(45deg);
  }
  @keyframes myMove {
    from { border-radius: 15px; transform: translateY(-20px); }
    to { border-radius: 50%; transform: translateY(20px); }
  }
</style>
<div class="ball"></div>
<p style="text-align:center">ลองเอาเมาส์จี้ผมสิ!</p></textarea>
        `,
        right: `
            <h4>Live Preview:</h4>
            <div id="live-preview"></div>
            <div class="tip-box" style="background: #d4edda; border-color: #c3e6cb; margin-top:20px;">
                <i class="bi bi-trophy-fill"></i> <b>COURSE COMPLETED!</b><br>
                นายเรียนรู้พื้นฐาน HTML5 & CSS3 ครบตามหลักสูตรแล้ว! ตอนนี้นายมีอาวุธครบมือที่จะไปสร้างเว็บไซต์จริงๆ แล้วนะ
            </div>
            <button class="btn btn-success w-100 fw-bold p-3" onclick="alert('ยินดีด้วย! นายคือ Web Developer เต็มตัวแล้ว')">
                รับประกาศนียบัตร (จบหลักสูตร)
            </button>
        `
    }
];

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

                     if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'css 9.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            preview.innerHTML = code;
        }
    }
</script>
</body>
</html>
