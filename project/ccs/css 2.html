<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 2 - CSS Colors & Backgrounds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #ffffff;
            --ink: #0f172a;
            --css-accent: #6366f1;
            --css-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --desk: #1e1e2e;
            --code-bg: #111827;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 850px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        /* --- หน้าปกใหม่: Colors & Backgrounds Edition --- */
        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: #000;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.4) 0%, transparent 50%);
            left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 25px 25px 5px;
            border-left: 15px solid #4338ca; box-shadow: 25px 0 60px rgba(0,0,0,0.8);
            cursor: pointer; backface-visibility: hidden; border-right: 1px solid rgba(255,255,255,0.1);
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 25px 25px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            background-image: linear-gradient(90deg, transparent 49%, #e2e8f0 50%, transparent 51%);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }

        .page-left, .page-right { 
            flex: 1; padding: 60px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: #4338ca; border-bottom: 4px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; font-weight: 800; font-size: 1.8rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 35px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        h4::before { content: ""; width: 6px; height: 24px; background: var(--css-gradient); border-radius: 10px; }
        
        p { line-height: 1.8; font-size: 1.05rem; color: #334155; margin-bottom: 1.5rem; text-align: justify; }

        .code-block { 
            background: var(--code-bg); color: #e2e8f0; padding: 25px; 
            border-radius: 12px; font-family: 'Fira Code', monospace; 
            font-size: 0.9rem; margin: 20px 0; border-left: 5px solid #6366f1;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .tag-name { color: #f472b6; } .prop { color: #38bdf8; } .val { color: #fbbf24; }

        .tip-box { 
            background: #f8fafc; border-radius: 15px; padding: 20px; 
            border: 1px solid #e2e8f0; border-left: 6px solid #a855f7; 
            margin: 25px 0; font-size: 0.95rem; color: #475569;
        }
        
        #editor { width: 100%; height: 280px; font-family: 'Fira Code', monospace; padding: 20px; border-radius: 12px; border: 2px solid #e2e8f0; background: #fff; font-size: 14px; }
        #live-preview { width: 100%; height: 350px; background: #f1f5f9; border: 3px dashed #cbd5e1; border-radius: 15px; padding: 30px; overflow: auto; display: flex; align-items: center; justify-content: center; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-top: 2px solid #f1f5f9; border-radius: 0 0 25px 5px; z-index: 10;
        }

        .btn-nav { background: #1e293b; color: white; border: none; padding: 10px 25px; border-radius: 12px; font-weight: 700; transition: 0.3s; }
        .btn-nav:hover:not(:disabled) { background: #6366f1; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99,102,241,0.4); }
        .btn-next-chapter { background: #059669; }

        .color-circle { width: 20px; height: 20px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 5px; border: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.2;"></div>
        <div style="width:150px; height:150px; background: var(--css-gradient); border-radius:35px; display:flex; align-items:center; justify-content:center; margin-bottom:30px; box-shadow: 0 0 40px rgba(99,102,241,0.6); transform: rotate(-5deg);">
            <i class="bi bi-palette-fill" style="font-size:5.5rem; color:white"></i>
        </div>
        <h1 class="display-4 fw-bold" style="font-family: 'Chakra Petch'; letter-spacing: 3px; text-shadow: 0 5px 15px rgba(0,0,0,0.5);">CSS COLORS</h1>
        <p class="lead fw-light" style="letter-spacing: 5px;">& BACKGROUNDS</p>
        <div style="width: 120px; height: 6px; background: white; margin: 30px 0; border-radius: 10px;"></div>
        <h5 class="fw-bold text-uppercase" style="color: #a855f7;">Unit 02: The Art of Styling</h5>
        <p class="small opacity-75 mt-2">ศาสตร์แห่งการใช้สีและศิลปะการวางพื้นหลัง</p>
        <div class="mt-5 animate-bounce"><i class="bi bi-chevron-double-down"></i> OPEN THE ARTBOOK</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-3">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_css.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">ย้อนกลับ</button>
            </div>
            <div class="fw-bold text-muted">Page <span id="pageNum">1</span> / <span id="totalPage"></span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">หน้าถัดไป</button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. จิตวิทยาและระบบสีใน CSS</h2>
            <p>สีไม่ได้มีไว้แค่ความสวยงาม แต่มันคือเครื่องมือสื่อสารความรู้สึก CSS ให้พลังเราในการควบคุมสีผ่าน 4 ระบบหลักที่นักพัฒนาต้องแม่นยำ:</p>
            <h4>ระบบสีพื้นฐาน (Color Models)</h4>
            <ul>
                <li><b>Color Names:</b> เช่น <code>red</code>, <code>skyblue</code>, <code>transparent</code> (มีให้เลือกกว่า 140 ชื่อ)</li>
                <li><b>HEX Codes:</b> ระบบฐาน 16 ยอดนิยม เช่น <code>#FF5733</code> (นิยมที่สุดในสายงานดีไซน์)</li>
                <li><b>RGB / RGBA:</b> กำหนดค่า Red, Green, Blue (0-255) และ A คือความโปร่งใส (0.0 - 1.0)</li>
                <li><b>HSL:</b> กำหนดผ่าน Hue (องศา), Saturation (%), Lightness (%) ซึ่งอ่านง่ายสำหรับมนุษย์</li>
            </ul>
            <div class="tip-box">
                <i class="bi bi-info-circle-fill"></i> <b>Pro Tip:</b> การใช้ <code>rgba()</code> แทนสีทึบปกติ จะช่วยให้ UI ของนายดูมีมิติและดูเป็น Modern Glassmorphism มากขึ้นครับ
            </div>
        `,
        right: `
            <h2>2. การใช้คุณสมบัติ Color</h2>
            <p>คุณสมบัติ <code>color</code> มีไว้สำหรับกำหนดสีของ "ตัวอักษร" เท่านั้น มันจะถูกสืบทอด (Inherit) ไปยังลูกหลานภายใน Element นั้นอัตโนมัติหากไม่มีการระบุใหม่</p>
            <div class="code-block">
                <span class="prop">h1</span> { <br>
                &nbsp;&nbsp;<span class="prop">color</span>: <span class="val">#6366f1</span>; <span class="comment">/* สีม่วง Indigo */</span><br>
                }<br>
                <span class="prop">p</span> { <br>
                &nbsp;&nbsp;<span class="prop">color</span>: <span class="val">rgba(30, 41, 59, 0.8)</span>; <span class="comment">/* เทาเข้มโปร่งแสง */</span><br>
                }
            </div>
            <h4>ความพิถีพิถันของสี:</h4>
            <p>นักพัฒนาที่ดีต้องระวังเรื่อง <b>Contrast Ratio</b> ระหว่างตัวอักษรและพื้นหลังเสมอ เพื่อให้มั่นใจว่าผู้ที่มีปัญหาทางสายตาก็ยังสามารถอ่านเนื้อหาของนายได้ (Accessibility)</p>
            <p>ลองใช้ค่าสีแบบตัวแปร (Variables) ในโปรเจกต์ใหญ่จะช่วยให้นายเปลี่ยนธีมสีทั้งเว็บได้ในพริบตาเดียว!</p>
        `
    },
    {
        left: `
            <h2>3. Background Color & Opacity</h2>
            <p>การใส่สีพื้นหลังเป็นพื้นฐานที่สำคัญที่สุดในการแบ่งสัดส่วนหน้าเว็บ (Layout Sectioning)</p>
            <div class="code-block">
                <span class="prop">.header</span> {<br>
                &nbsp;&nbsp;<span class="prop">background-color</span>: <span class="val">#1e1e2e</span>;<br>
                &nbsp;&nbsp;<span class="prop">opacity</span>: <span class="val">0.9</span>;<br>
                }
            </div>
            <h4>ความต่างระหว่าง Opacity และ RGBA</h4>
            <p>นี่คือจุดที่มือใหม่พลาดบ่อยที่สุด:</p>
            <ul>
                <li><b>Opacity:</b> จะทำให้ "ทุกอย่าง" ในกล่องจางลง (รวมถึงตัวอักษรและรูปข้างในด้วย)</li>
                <li><b>RGBA Background:</b> จะทำให้ "เฉพาะสีพื้นหลัง" เท่านั้นที่จางลง แต่เนื้อหายังชัดเจนเหมือนเดิม</li>
            </ul>
            <div class="tip-box">
                <b>แนะนำ:</b> ถ้าอยากได้พื้นหลังใสๆ แต่ตัวหนังสือยังอ่านชัด ให้ใช้ <code>background: rgba(...)</code> เสมอครับ!
            </div>
        `,
        right: `
            <h2>4. Background Image (ใส่ภาพพื้นหลัง)</h2>
            <p>รูปภาพพื้นหลังช่วยสร้างบรรยากาศให้เว็บไซต์ดูมีเรื่องราว แต่การคุมมันให้อยู่หมัดต้องใช้คุณสมบัติต่อไปนี้ร่วมกัน:</p>
            <div class="code-block">
                <span class="prop">section</span> {<br>
                &nbsp;&nbsp;<span class="prop">background-image</span>: <span class="val">url('hero.jpg')</span>;<br>
                &nbsp;&nbsp;<span class="prop">background-repeat</span>: <span class="val">no-repeat</span>;<br>
                &nbsp;&nbsp;<span class="prop">background-size</span>: <span class="val">cover</span>;<br>
                &nbsp;&nbsp;<span class="prop">background-position</span>: <span class="val">center</span>;<br>
                }
            </div>
            <h4>คำศัพท์สำคัญ:</h4>
            <ul>
                <li><b>Cover:</b> ยืดภาพให้เต็มกล่องพอดี (ตัดขอบทิ้งถ้าสัดส่วนไม่เท่ากัน)</li>
                <li><b>Contain:</b> แสดงภาพครบทั้งรูป (อาจเหลือที่ว่างข้างๆ)</li>
                <li><b>Fixed:</b> ภาพจะนิ่งสนิทแม้เราจะเลื่อนหน้าจอ (Parallax Effect)</li>
            </ul>
            <p>จำไว้ว่าการใช้ <code>background-size: cover</code> คือสูตรสำเร็จที่ทำให้ภาพพื้นหลังดูดีในทุกหน้าจอ</p>
        `
    },
    {
        left: `
            <h2>5. Linear Gradients (การไล่เฉดสี)</h2>
            <p>CSS สมัยใหม่ไม่จำเป็นต้องใช้รูปภาพเพื่อทำสีไล่เฉดอีกต่อไป เราสามารถเขียนโค้ดเพื่อสร้าง Gradient ที่คมชัดและโหลดไวสุดๆ</p>
            <div class="code-block">
                <span class="prop">.gradient-box</span> {<br>
                &nbsp;&nbsp;<span class="prop">background</span>: <span class="val">linear-gradient(45deg, #f06, #9f6)</span>;<br>
                }
            </div>
            <h4>ลูกเล่นที่ทำได้:</h4>
            <ul>
                <li><b>Direction:</b> กำหนดทิศทางได้ เช่น <code>to right</code>, <code>to bottom left</code> หรือกำหนดเป็นองศา <code>135deg</code></li>
                <li><b>Color Stops:</b> ใส่สีได้มากกว่า 2 สี และระบุตำแหน่งได้ว่าสีไหนจะเริ่มที่กี่เปอร์เซ็นต์</li>
            </ul>
            <p>การใช้ Gradient อ่อนๆ ในปุ่มกดจะช่วยให้เว็บดูมีระดับและมี "ความลึก" (Depth) มากกว่าการใช้สีเรียบๆ เพียงสีเดียว</p>
        `,
        right: `
            <h2>6. Radial Gradients & Shorthand</h2>
            <p>นอกจากแนวเส้นตรงแล้ว เรายังสร้างการไล่เฉดเป็น "วงกลม" ออกมาจากจุดศูนย์กลางได้ด้วย</p>
            <div class="code-block">
                <span class="prop">.circle-bg</span> {<br>
                &nbsp;&nbsp;<span class="prop">background</span>: <span class="val">radial-gradient(circle, #fff, #ccc)</span>;<br>
                }
            </div>
            <h4>The Power of Shorthand</h4>
            <p>นายสามารถเขียนรวมทุกอย่างเกี่ยวกับ Background ไว้ในบรรทัดเดียวเพื่อลดความรกของโค้ด:</p>
            <div class="code-block" style="background:#2d2d2d">
                <span class="prop">div</span> {<br>
                &nbsp;&nbsp;<span class="prop">background</span>: <span class="val">#000 url('img.png') no-repeat center/cover fixed;</span><br>
                }
            </div>
            <p>ลำดับคือ: สี -> รูป -> การซ้ำ -> ตำแหน่ง/ขนาด -> การเลื่อน</p>
            <div class="tip-box" style="background: #fffbeb; border-color: #f59e0b;">
                <i class="bi bi-lightbulb-fill"></i> <b>Trick:</b> การใส่ "สีพื้นหลังสำรอง" ไว้ก่อน URL รูปภาพ คือมารยาทที่ดี เผื่อกรณีที่รูปภาพโหลดไม่ขึ้นครับ
            </div>
        `
    },
    {
        left: `
            <h2>7. Multiple Backgrounds</h2>
            <p>รู้หรือไม่? CSS ยอมให้นายซ้อนภาพพื้นหลังได้หลายชั้นใน Element เดียวกัน โดยแยกด้วยเครื่องหมายจุลภาค (Comma)</p>
            <div class="code-block">
                <span class="prop">.complex-bg</span> {<br>
                &nbsp;&nbsp;<span class="prop">background</span>: <br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="val">url('overlay-pattern.png')</span>, <br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="val">linear-gradient(rgba(0,0,0,0.5), #000)</span>,<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="val">url('main-photo.jpg')</span>;<br>
                }
            </div>
            <h4>ลำดับการซ้อน:</h4>
            <p>สิ่งที่เขียน <b>"ก่อน"</b> จะถูกวางไว้ <b>"บนสุด"</b> (ใกล้ตาเราที่สุด) เราจึงนิยมวาง Gradient โปร่งแสงไว้ด้านบนสุดเพื่อทำเป็น Color Overlay ทับรูปภาพให้ตัวหนังสืออ่านง่ายขึ้นนั่นเอง</p>
            <p>เทคนิคนี้จะทำให้นายสร้าง UI ที่ซับซ้อนได้โดยไม่ต้องพึ่งโปรแกรมแต่งรูปเลย!</p>
        `,
        right: `
            <h2>8. Workshop: Color & Style</h2>
            <p>ถึงเวลาลองของจริง! ลองปรับแต่งกล่องด้านล่างให้กลายเป็นการ์ดที่สวยที่สุดด้วยระบบสีและ Gradient ที่เรียนมา</p>
            <textarea id="editor" spellcheck="false" oninput="updatePreview()">
<style>
  .art-card {
    width: 100%; height: 250px;
    border-radius: 25px;
    /* ลองแก้ Gradient ตรงนี้ดูสิ! */
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: white; text-align: center;
    transition: 0.5s; cursor: pointer;
    border: 5px solid rgba(255,255,255,0.2);
  }
  .art-card:hover {
    transform: scale(1.05) rotate(2deg);
    background: linear-gradient(135deg, #f43f5e 0%, #fb923c 100%);
  }
</style>

<div class="art-card">
  <i class="bi bi-magic" style="font-size: 3rem;"></i>
  <h2 style="color:white; border:0; margin:0;">CSS MAGIC</h2>
  <p style="color:white; margin:0;">Hover me to change colors!</p>
</div></textarea>
            <h4 class="mt-4">Live Preview:</h4>
            <div id="live-preview"></div>
        `
    }
];

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

            const nextBtn = document.getElementById('nextBtn');
            if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'css 3.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);;
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            preview.innerHTML = code;
        }
    }
</script>
</body>
</html>
