<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 6 - CSS Grid System Complete Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #1e293b;
            --css-blue: #2965f1;
            --grid-purple: #6366f1;
            --dark-purple: #4338ca;
            --desk: #cbd5e1;
            --preview-bg: #ffffff;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 850px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1300px; }

        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: linear-gradient(135deg, var(--grid-purple), var(--dark-purple)); 
            left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid rgba(0,0,0,0.2); box-shadow: 15px 0 50px rgba(0,0,0,0.4);
            cursor: pointer; backface-visibility: hidden;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.1) 1px, transparent 0);
            background-size: 30px 30px;
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1300px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 50px 70px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--dark-purple); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; font-weight: 700; font-size: 1.8rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 25px; font-weight: 700; border-left: 5px solid var(--grid-purple); padding-left: 12px; font-size: 1.2rem; }
        p { line-height: 1.7; font-size: 1rem; color: #334155; margin-bottom: 1.2rem; }

        .code-block { 
            background: #1e293b; color: #e2e8f0; padding: 20px; 
            border-radius: 10px; font-family: 'Fira Code', monospace; 
            font-size: 0.85rem; margin: 20px 0; border-right: 4px solid var(--grid-purple);
            line-height: 1.5; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .preview-label { background: #6366f1; color: white; font-size: 0.8rem; padding: 4px 15px; font-weight: bold; border-radius: 5px 5px 0 0; display: inline-block; }
        .code-preview { background: var(--preview-bg); border: 2px solid #6366f1; padding: 20px; border-radius: 0 10px 10px 10px; margin-bottom: 25px; }

        .css-prop { color: #818cf8; } .css-val { color: #34d399; } .css-sel { color: #fbbf24; }

        .tip-box { background: #f0f9ff; border-radius: 10px; padding: 18px; border-left: 6px solid #0ea5e9; margin: 20px 0; font-size: 0.95rem; line-height: 1.6; }
        .tag-badge { background: #e0e7ff; padding: 3px 8px; border-radius: 5px; font-family: 'Fira Code', monospace; color: var(--dark-purple); font-size: 0.9rem; font-weight: 600; }

        #editor { width: 100%; height: 250px; font-family: 'Fira Code', monospace; padding: 15px; border-radius: 10px; border: 2px solid #ddd; background: #f8fafc; font-size: 0.9rem; }
        #live-preview { width: 100%; height: 350px; background: white; border: 2px dashed #6366f1; border-radius: 10px; padding: 15px; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--ink); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-nav:hover:not(:disabled) { background: var(--grid-purple); transform: scale(1.05); }
        .btn-menu { background: #f1f5f9; color: var(--ink); }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
        <div style="width:140px; height:140px; background:rgba(255,255,255,0.1); border: 4px dashed white; border-radius:15px; display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; margin-bottom: 25px;">
            <div style="background:white; border-radius:4px;"></div>
            <div style="background:white; border-radius:4px;"></div>
            <div style="background:white; border-radius:4px;"></div>
            <div style="background:white; border-radius:4px;"></div>
        </div>
        <h1 class="display-3 fw-bold" style="font-family: 'Chakra Petch'; letter-spacing: 2px;">CSS GRID</h1>
        <p class="lead" style="letter-spacing: 5px;">MODERN LAYOUT SYSTEM</p>
        <div style="width: 100px; height: 5px; background: #fbbf24; margin: 20px 0; border-radius: 5px;"></div>
        <h5 class="fw-bold">UNIT 06: MASTERING THE GRID</h5>
        <p class="small opacity-75">เปลี่ยนการจัดเลย์เอาท์ที่ยุ่งเหยิงให้เป็นเรื่องง่ายและทรงพลัง</p>
        <div class="mt-4 small animate-bounce"><i class="bi bi-mouse-fill"></i> คลิกเพื่อเริ่มเรียนรู้ระบบ Grid</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_css.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            <div class="fw-bold text-muted">หน้า <span id="pageNum">1</span> / <span id="totalPage"></span></div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. ทำความรู้จัก CSS Grid</h2>
            <p><b>CSS Grid Layout</b> คือระบบการจัดเลย์เอาท์แบบ 2 มิติ (Two-dimensional) ที่ทรงพลังที่สุดในปัจจุบัน ต่างจาก Flexbox ที่เน้นจัดแถวหรือคอลัมน์เพียงอย่างเดียว แต่ Grid สามารถจัดการทั้ง <b>แนวนอน (Rows)</b> และ <b>แนวตั้ง (Columns)</b> ได้พร้อมกัน</p>
            <h4>ทำไมต้องใช้ Grid?</h4>
            <p>ในยุคก่อน เราต้องใช้การ Float หรือสร้าง Table ที่ซับซ้อนเพื่อทำเลย์เอาท์หน้าเว็บ แต่ Grid ช่วยให้เราสามารถกำหนดโครงสร้างหลักของเว็บไซต์ (Holy Grail Layout) ได้ภายในโค้ดไม่กี่บรรทัด</p>
            <div class="tip-box">
                <i class="bi bi-info-circle-fill"></i> <b>Concept:</b> Grid ประกอบด้วย Container (แม่) และ Items (ลูก) เมื่อเราสั่ง <code>display: grid;</code> ที่ตัวแม่ ลูกทุกคนจะกลายเป็น Grid Items ทันที
            </div>
            <p>เลย์เอาท์นี้เหมาะมากสำหรับหน้า Dashboard, Gallery หรือหน้าแรกของเว็บไซต์ข่าวที่มีการจัดวางองค์ประกอบซับซ้อนและต้องการความยืดหยุ่นสูงในทุกขนาดหน้าจอ</p>
        `,
        right: `
            <h4>การเริ่มต้นเปิดใช้งาน</h4>
            <p>เพียงแค่กำหนด Property พื้นฐานที่ Container ของคุณ:</p>
            <div class="code-block">
                <span class="css-sel">.container</span> {<br>
                &nbsp;&nbsp;<span class="css-prop">display</span>: <span class="css-val">grid</span>;<br>
                &nbsp;&nbsp;<span class="css-prop">grid-template-columns</span>: <span class="css-val">200px 1fr</span>;<br>
                &nbsp;&nbsp;<span class="css-prop">gap</span>: <span class="css-val">20px</span>;<br>
                }
            </div>
            <h4>ศัพท์เทคนิคที่ต้องรู้:</h4>
            <ul>
                <li><b>Grid Line:</b> เส้นแบ่งระหว่างช่อง</li>
                <li><b>Grid Track:</b> ช่องว่างระหว่างเส้นสองเส้น (คือแถวหรือคอลัมน์นั่นเอง)</li>
                <li><b>Grid Cell:</b> หน่วยย่อยที่สุดใน Grid (1 ช่อง)</li>
                <li><b>Grid Area:</b> พื้นที่ที่รวมหลายๆ Cell เข้าด้วยกัน</li>
            </ul>
            <p>การเข้าใจ Grid Line จะช่วยให้นายสามารถสั่งให้ Item ขยายร่างไปทับซ้อนช่องอื่นๆ ได้อย่างอิสระเหมือนวาดรูปบนกระดาษกราฟเลยล่ะ!</p>
        `
    },
    {
        left: `
            <h2>2. Columns & Rows Control</h2>
            <p>หัวใจสำคัญของ Grid คือการกำหนดขนาดช่อง นายสามารถใช้หน่วยพิกเซล (px), เปอร์เซ็นต์ (%) หรือหน่วยพิเศษที่เกิดมาเพื่อ Grid โดยเฉพาะอย่าง <b>fr (Fractional unit)</b></p>
            <div class="code-block">
                <span class="css-prop">grid-template-columns</span>: <span class="css-val">1fr 2fr 1fr</span>;
            </div>
            <p>โค้ดด้านบนจะแบ่งพื้นที่ออกเป็น 4 ส่วนเท่าๆ กัน โดยช่องกลางจะใหญ่กว่าเพื่อน 2 เท่า ซึ่งมันฉลาดมากเพราะมันจะคำนวณพื้นที่ที่เหลือให้เองอัตโนมัติ!</p>
            <h4>การใช้ฟังก์ชัน Repeat</h4>
            <p>ถ้านายต้องการ 12 คอลัมน์ ไม่ต้องพิมพ์ 1fr สิบสองครั้ง ให้ใช้แบบนี้แทน:</p>
            <div class="code-block">
                <span class="css-prop">grid-template-columns</span>: <span class="css-val">repeat(12, 1fr)</span>;
            </div>
        `,
        right: `
            <h4>Implicit vs Explicit Grid</h4>
            <p><b>Explicit Grid:</b> คือสิ่งที่เรากำหนดเองชัดเจน เช่นสั่งว่ามี 3 แถว</p>
            <p><b>Implicit Grid:</b> คือแถวที่เบราว์เซอร์สร้างขึ้นมาเองโดยอัตโนมัติเมื่อเนื้อหาของเราล้นออกมาเกินกว่าที่กำหนดไว้ในตอนแรก</p>
            <div class="preview-label">ตัวอย่างเลย์เอาท์ 3 คอลัมน์:</div>
            <div class="code-preview">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <div style="background:#6366f1; color:white; padding:10px; text-align:center; border-radius:5px;">1</div>
                    <div style="background:#6366f1; color:white; padding:10px; text-align:center; border-radius:5px;">2</div>
                    <div style="background:#6366f1; color:white; padding:10px; text-align:center; border-radius:5px;">3</div>
                </div>
            </div>
            <div class="tip-box">
                <i class="bi bi-lightning-charge"></i> <b>Pro Tip:</b> การใช้ <code>gap</code> จะช่วยเว้นระยะห่างระหว่างช่องโดยไม่ต้องไปยุ่งกับ <code>margin</code> ของตัวลูก ทำให้คำนวณขนาดได้แม่นยำขึ้นเยอะ!
            </div>
        `
    },
    {
        left: `
            <h2>3. การจัดวาง Grid Areas</h2>
            <p>นี่คือฟีเจอร์ที่ "เทพ" ที่สุดของ Grid นายสามารถตั้งชื่อให้แต่ละส่วนของหน้าเว็บแล้วสั่งวางตำแหน่งได้เหมือนการวาดแผนที่</p>
            <div class="code-block">
                <span class="css-prop">grid-template-areas</span>: <br>
                &nbsp;&nbsp;<span class="css-val">"header header"</span><br>
                &nbsp;&nbsp;<span class="css-val">"sidebar content"</span><br>
                &nbsp;&nbsp;<span class="css-val">"footer footer"</span>;
            </div>
            <p>การทำแบบนี้ทำให้โค้ดอ่านง่ายมาก นายจะมองเห็นโครงสร้างหน้าเว็บได้ตั้งแต่ใน CSS เลย ไม่ต้องไล่หาว่า Item ไหนอยู่ตรงไหน</p>
        `,
        right: `
            <h4>การสั่งงานตัวลูก (Grid Items)</h4>
            <p>หลังจากตั้งชื่อที่ตัวแม่แล้ว ตัวลูกก็แค่ระบุชื่อตัวเอง:</p>
            <div class="code-block">
                <span class="css-sel">.main-header</span> { <span class="css-prop">grid-area</span>: <span class="css-val">header</span>; }
            </div>
            <p>นอกจากนี้ยังสามารถระบุตำแหน่งด้วยตัวเลขเส้น (Line Numbers) ได้ด้วย:</p>
            <div class="code-block">
                <span class="css-prop">grid-column</span>: <span class="css-val">1 / 3</span>; <span class="text-muted">/* เริ่มเส้น 1 ไปจบเส้น 3 */</span>
            </div>
            <div class="tip-box" style="background:#fff7ed; border-color:#fb923c;">
                 <i class="bi bi-exclamation-triangle-fill"></i> <b>ข้อควรระวัง:</b> การนับ Grid Line จะเริ่มจาก 1 เสมอ (ไม่ใช่ 0 เหมือน Array ในโปรแกรมมิ่งนะจ๊ะ)
            </div>
        `
    },
    {
        left: `
            <h2>4. Responsive ด้วย Minmax</h2>
            <p>บอกลารีโมทคอนโทรลที่ต้องเขียน Media Query เยอะๆ ไปได้เลย ด้วยฟังก์ชัน <span class="tag-badge">minmax()</span>Grid จะจัดการขนาดให้เองตามความกว้างหน้าจอ</p>
            <div class="code-block">
                <span class="css-prop">grid-template-columns</span>: <br>
                <span class="css-val">repeat(auto-fit, minmax(200px, 1fr))</span>;
            </div>
            <p><b>ความหมายคือ:</b> ให้เบราว์เซอร์สร้างคอลัมน์ให้เยอะที่สุดเท่าที่จะทำได้ โดยแต่ละคอลัมน์ต้องกว้างอย่างน้อย 200px และถ้าเหลือที่ว่างให้ขยายจนเต็ม 1fr</p>
        `,
        right: `
            <h4>Auto-Fit vs Auto-Fill</h4>
            <ul>
                <li><b>Auto-Fill:</b> จะจองช่องว่างไว้แม้ไม่มีของมาวาง (รักษา Grid Track ไว้)</li>
                <li><b>Auto-Fit:</b> จะยุบช่องว่างทิ้งถ้าไม่มีของ ทำให้ Item ที่มีอยู่ขยายเต็มแถว</li>
            </ul>
            <div class="preview-label">ผลลัพธ์ของ Minmax:</div>
            <div class="code-preview">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px;">
                    <div style="background:#4338ca; color:white; padding:10px; font-size:12px; border-radius:4px;">ยืดหยุ่น 1</div>
                    <div style="background:#4338ca; color:white; padding:10px; font-size:12px; border-radius:4px;">ยืดหยุ่น 2</div>
                    <div style="background:#4338ca; color:white; padding:10px; font-size:12px; border-radius:4px;">ยืดหยุ่น 3</div>
                </div>
            </div>
            <p>เทคนิคนี้เหมาะมากสำหรับการทำหน้า List สินค้า หรือ Portfolio ที่ต้องรันบนทั้งมือถือและคอมพิวเตอร์</p>
        `
    },
    {
        left: `
            <h2>5. การจัดตำแหน่ง (Alignment)</h2>
            <p>Grid มีพลังในการจัดวาง Item ให้อยู่กึ่งกลางได้อย่างสมบูรณ์แบบ (สิ่งที่ Web Developer สมัยก่อนทรมานที่สุด)</p>
            <h4>จัดทั้งกลุ่ม (Container Alignment)</h4>
            <ul>
                <li><b>justify-content:</b> จัดแนวแกน X (แนวนอน)</li>
                <li><b>align-content:</b> จัดแนวแกน Y (แนวตั้ง)</li>
            </ul>
            <div class="code-block">
                <span class="css-prop">justify-content</span>: <span class="css-val">center</span>;<br>
                <span class="css-prop">align-content</span>: <span class="css-val">space-between</span>;
            </div>
        `,
        right: `
            <h4>จัดรายตัว (Items Alignment)</h4>
            <p>ถ้าอยากจัดเนื้อหาข้างในช่องแต่ละช่องให้เป๊ะ:</p>
            <div class="code-block">
                <span class="css-prop">place-items</span>: <span class="css-val">center</span>;
            </div>
            <p>คำสั่ง <code>place-items: center;</code> เพียงบรรทัดเดียว คือการย่อมาจาก <code>align-items</code> และ <code>justify-items</code> ซึ่งจะทำให้ของอยู่กลางช่องเป๊ะๆ ทั้งบน-ล่าง-ซ้าย-ขวา</p>
            <div class="tip-box">
                <b>ลองดูนี่:</b> การจัดกึ่งกลางหน้ากระดาษที่เคยยาก ตอนนี้เหลือแค่:<br>
                <code>display: grid; min-height: 100vh; place-items: center;</code>
            </div>
        `
    },
    {
        left: `
            <h2>6. Layering & Z-Index</h2>
            <p>Grid ไม่ได้แค่เรียงของต่อกัน แต่มันสามารถทำให้ของ <b>"ทับกัน"</b> ได้โดยไม่ต้องใช้ <code>position: absolute;</code> ให้ปวดหัว</p>
            <p>ถ้านายสั่งให้ Item สองตัวไปอยู่ที่พิกัด Grid เดียวกัน มันจะวางซ้อนกันทันที นายสามารถใช้ <code>z-index</code> เพื่อเลือกว่าจะให้ใครอยู่บนหรือล่าง</p>

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

            if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'css 7.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }
    

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            preview.innerHTML = code;
        }
    }
</script>
