<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 3 - CSS3 Box Model Masterclass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #1a1a2e;
            --css-blue: #2196f3;
            --css-dark: #0d47a1;
            --desk: #e5e7eb;
            --preview-bg: #ffffff;
            --accent-purple: #6366f1;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 800px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        /* หน้าปกใหม่ดีไซน์ CSS */
        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: linear-gradient(135deg, var(--css-blue), var(--css-dark)); left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid rgba(0,0,0,0.2); box-shadow: 15px 0 50px rgba(0,0,0,0.3);
            cursor: pointer; backface-visibility: hidden;
        }

        .book-cover::before {
            content: "{}"; position: absolute; top: 20px; right: 30px; font-size: 5rem; font-family: 'Chakra Petch'; opacity: 0.1;
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 45px 55px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--css-dark); border-bottom: 2px solid var(--css-blue); padding-bottom: 10px; margin-bottom: 20px; font-weight: 700; font-size: 1.8rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 25px; font-weight: 700; border-left: 5px solid var(--css-blue); padding-left: 15px; font-size: 1.2rem; }
        p { line-height: 1.7; font-size: 1rem; color: #333; margin-bottom: 1.2rem; }

        .code-block { 
            background: #23272e; color: #abb2bf; padding: 18px; 
            border-radius: 10px; font-family: 'Fira Code', monospace; 
            font-size: 0.85rem; margin: 20px 0; border-right: 4px solid var(--css-blue);
            line-height: 1.5; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .preview-label { background: #e0e7ff; color: #4338ca; font-size: 0.8rem; padding: 5px 15px; font-weight: bold; border-radius: 5px 5px 0 0; display: inline-block; }
        .code-preview { background: var(--preview-bg); border: 2px solid #e0e7ff; padding: 25px; border-radius: 0 10px 10px 10px; margin-bottom: 25px; }

        .property { color: #d19a66; } .value { color: #98c379; } .selector { color: #61afef; }

        .tip-box { background: #fffbeb; border-radius: 10px; padding: 18px; border-left: 6px solid #fbbf24; margin: 20px 0; font-size: 0.95rem; color: #92400e; }

        /* Box Model Demo */
        .box-demo {
            width: 100%; height: 180px; background: #eee; display: flex; align-items: center; justify-content: center; position: relative; border: 1px dashed #ccc;
        }
        .outer-box { background: #ffc107; padding: 20px; border: 5px solid #ff5722; }
        .inner-box { background: #2196f3; width: 80px; height: 40px; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }

        #editor { width: 100%; height: 220px; font-family: 'Fira Code', monospace; padding: 15px; border-radius: 10px; border: 2px solid #ddd; background: #fafafa; margin-bottom: 15px; }
        #live-preview { width: 100%; height: 280px; background: white; border: 2px solid #eee; border-radius: 10px; padding: 20px; overflow: auto; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 75px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--css-dark); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; transition: 0.3s; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .btn-nav:hover:not(:disabled) { background: var(--css-blue); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3); }
        .btn-menu { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-next-chapter { background: #8b5cf6; }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
         <div style="width:140px; height:140px; background:rgba(255,255,255,0.1); border: 4px solid white; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:25px; transform: rotate(10deg);">
            <i class="bi bi-box-seam" style="font-size:5rem; color:white"></i>
        </div>
        <h1 class="display-3 fw-bold" style="font-family: 'Chakra Petch'; letter-spacing: 2px;">CSS3</h1>
        <p class="lead fw-light">MODERN LAYOUT DESIGN</p>
        <div style="width: 100px; height: 6px; background: #ffeb3b; margin: 20px 0; border-radius: 3px;"></div>
        <h4 class="text-white border-0 p-0">UNIT 03: THE BOX MODEL</h4>
        <p class="small opacity-75 mt-2">ความลับเบื้องหลังการจัดตำแหน่งทุกอย่างบนหน้าเว็บ</p>
        <div class="mt-5 small animate-bounce" style="background: rgba(0,0,0,0.2); padding: 8px 20px; border-radius: 50px;">
            <i class="bi bi-mouse3"></i> Click to Open Journal
        </div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                <button class="btn-nav" style="background:#64748b" onclick="window.location.href='course_css.html'"><i class="bi bi-house">เลือกบทเรียน</i></button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-arrow-left"></i> ย้อนกลับ
                </button>
            </div>
            
            <div class="fw-bold text-muted">PAGE <span id="pageNum">1</span> / <span id="totalPage"></span></div>
            
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>Next</span> <i class="bi bi-arrow-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. Box Model คืออะไร?</h2>
            <p>ในโลกของ CSS ทุกอย่างคือ <b>"กล่อง" (Box)</b> ไม่ว่าจะเป็นข้อความ รูปภาพ หรือปุ่มกด ทุกอย่างถูกห่อหุ้มด้วยกล่องสี่เหลี่ยมที่มองไม่เห็น</p>
            <p>การเข้าใจ Box Model คือการเข้าใจพื้นฐานการจัด Layout ถ้าคุณไม่เข้าใจเรื่องนี้ คุณจะงงว่าทำไมรูปภาพถึงเบียดกัน หรือทำไมปุ่มถึงกว้างเกินหน้าจอ</p>
            <h4>โครงสร้างของกล่อง 4 ชั้น</h4>
            <ul>
                <li><b>Content:</b> เนื้อหาข้างใน (ตัวอักษร, ภาพ)</li>
                <li><b>Padding:</b> พื้นที่ว่างระหว่างเนื้อหากับเส้นขอบ</li>
                <li><b>Border:</b> เส้นขอบที่ล้อมรอบเนื้อหาและ Padding</li>
                <li><b>Margin:</b> พื้นที่ว่างด้านนอกสุดที่ใช้ดันกล่องอื่นออกไป</li>
            </ul>
            <div class="tip-box">
                <i class="bi bi-info-circle"></i> นึกถึง <b>"ของขวัญในกล่อง"</b> Content คือของขวัญ, Padding คือบับเบิ้ลกันกระแทก, Border คือตัวกล่องกระดาษ และ Margin คือระยะห่างระหว่างกล่องนี้กับกล่องอื่นๆ บนรถขนส่ง
            </div>
        `,
        right: `
            <h4>Visual Diagram</h4>
            
            <p>ลองดูภาพจำลองนี้: ระยะห่างข้างในคือ Padding ส่วนระยะห่างข้างนอกคือ Margin เส้นขอบคือ Border</p>
            <div class="code-block">
                <span class="selector">.my-box</span> {<br>
                &nbsp;&nbsp;<span class="property">width</span>: <span class="value">300px</span>;<br>
                &nbsp;&nbsp;<span class="property">padding</span>: <span class="value">20px</span>;<br>
                &nbsp;&nbsp;<span class="property">border</span>: <span class="value">5px solid black</span>;<br>
                &nbsp;&nbsp;<span class="property">margin</span>: <span class="value">10px</span>;<br>
                }
            </div>
            <p>ในตัวอย่างนี้ กล่องจะมีขนาดที่มองเห็นจริงกว้างเท่าไหร่? คำตอบคือไม่ใช่ 300px! แต่มันคือ $300 + 20(ซ้าย) + 20(ขวา) + 5(ซ้าย) + 5(ขวา) = 350px$ นั่นเองครับ</p>
        `
    },
    {
        left: `
            <h2>2. Padding: ระยะห่างภายใน</h2>
            <p>Padding ใช้เพื่อสร้าง "ลมหายใจ" ให้กับเนื้อหา ทำให้ข้อความไม่ไปแปะติดกับขอบกล่องจนเกินไป ช่วยให้เว็บดูสบายตาและเป็นมืออาชีพ</p>
            <h4>การเขียน Shorthand (แบบย่อ)</h4>
            <p>เราสามารถกำหนดความหนาของ Padding ได้หลายวิธี:</p>
            <ul>
                <li><code>padding: 20px;</code> (เท่ากันทุกด้าน)</li>
                <li><code>padding: 10px 20px;</code> (บน-ล่าง 10, ซ้าย-ขวา 20)</li>
                <li><code>padding: 5px 10px 15px 20px;</code> (วนตามเข็มนาฬิกา: บน ขวา ล่าง ซ้าย)</li>
            </ul>
            <div class="tip-box" style="background: #e0f2fe; border-color: #38bdf8; color: #0369a1;">
                <i class="bi bi-lightbulb"></i> <b>Trick:</b> จำง่ายๆ ว่า <b>"TRBL"</b> (Trouble) ย่อมาจาก Top, Right, Bottom, Left ครับ!
            </div>
        `,
        right: `
            <h4>เปรียบเทียบการมีและไม่มี Padding</h4>
            <div class="preview-label">แบบไม่มี Padding:</div>
            <div style="border: 2px solid #css-blue; padding: 0; background: white; margin-bottom: 15px;">
                เนื้อหาชิดขอบมาก อ่านยากและดูไม่สวย
            </div>
            <div class="preview-label">แบบมี Padding 20px:</div>
            <div style="border: 2px solid #css-blue; padding: 20px; background: white;">
                เนื้อหามีระยะห่าง ดูหรูหราและอ่านง่ายขึ้นเยอะ!
            </div>
            <p class="mt-3">Padding จะใช้สีพื้นหลังเดียวกับ Content เสมอ (Background-color จะขยายมาถึงขอบ Padding)</p>
        `
    },
    {
        left: `
            <h2>3. Border: เส้นขอบสุดเจ๋ง</h2>
            <p>Border ไม่ได้มีแค่เส้นตรงธรรมดา แต่มันช่วยกำหนดขอบเขตและสร้างสไตล์ให้ Elements ของเราได้หลากหลาย</p>
            <h4>คุณสมบัติหลัก 3 อย่าง</h4>
            <div class="code-block">
                <span class="property">border-width</span>: <span class="value">2px</span>;<br>
                <span class="property">border-style</span>: <span class="value">solid</span>;<br>
                <span class="property">border-color</span>: <span class="value">red</span>;
            </div>
            <p>หรือเขียนแบบย่อ: <code>border: 2px solid red;</code></p>
            <h4>สไตล์ที่น่าสนใจ:</h4>
            <ul>
                <li><b>solid:</b> เส้นทึบมาตรฐาน</li>
                <li><b>dashed:</b> เส้นประ</li>
                <li><b>dotted:</b> เส้นจุดไข่ปลา</li>
                <li><b>double:</b> เส้นคู่</li>
            </ul>
        `,
        right: `
            <h4>Border-Radius: เปลี่ยนเหลี่ยมเป็นมน</h4>
            <p>เทรนด์เว็บสมัยใหม่ชอบความโค้งมน เราใช้ <code>border-radius</code> เพื่อทำให้มุมกล่องดูนุ่มนวลขึ้น</p>
            <div class="preview-label">ตัวอย่างขอบแบบต่างๆ:</div>
            <div class="code-preview d-flex justify-content-around align-items:center flex-wrap gap-2">
                <div style="width:70px; height:70px; border:3px solid var(--css-blue); border-radius:0;">0px</div>
                <div style="width:70px; height:70px; border:3px dashed var(--css-blue); border-radius:10px;">10px</div>
                <div style="width:70px; height:70px; border:3px double var(--css-blue); border-radius:50%;">50%</div>
            </div>
            <p>ถ้าคุณตั้งค่า <code>border-radius: 50%</code> ในกล่องที่เป็นสี่เหลี่ยมจตุรัส คุณจะได้ <b>"วงกลม"</b> ทันที!</p>
            <div class="tip-box">
                <i class="bi bi-palette"></i> <b>Design Tip:</b> ปุ่มกดส่วนใหญ่มักใช้ <code>border-radius</code> ประมาณ 4px - 8px เพื่อความทันสมัย
            </div>
        `
    },
    {
        left: `
            <h2>4. Margin: ระยะห่างภายนอก</h2>
            <p>ถ้า Padding คือพื้นที่ในบ้าน Margin ก็คือรั้วบ้านที่เอาไว้เว้นระยะจากบ้านหลังข้างๆ เพื่อไม่ให้บ้านติดกันเกินไป</p>
            <p>Margin มีคุณสมบัติพิเศษคือ <b>"Transparent"</b> (โปร่งใสเสมอ) และไม่ได้รับอิทธิพลจาก Background-color ของกล่อง</p>
            <h4>การจัดกึ่งกลางด้วย Margin</h4>
            <p>เทคนิคยอดฮิตในการจัดกล่องให้อยู่ตรงกลางหน้าจอ (สำหรับ Block elements):</p>
            <div class="code-block">
                <span class="selector">.center-box</span> {<br>
                &nbsp;&nbsp;<span class="property">width</span>: <span class="value">50%</span>;<br>
                &nbsp;&nbsp;<span class="property">margin</span>: <span class="value">0 auto</span>;<br>
                }
            </div>
            <p><code>margin: 0 auto;</code> หมายถึง บน-ล่างเป็น 0 ส่วน ซ้าย-ขวาให้เบราว์เซอร์คำนวณให้เท่ากันอัตโนมัติ</p>
        `,
        right: `
            <h4>Margin Collapse (เรื่องน่าปวดหัว)</h4>
            <p>เป็นพฤติกรรมที่ Margin บนและล่างของกล่องสองกล่องที่ติดกันจะ "ยุบรวมกัน" แทนที่จะบวกกัน</p>
            <div class="preview-label">ตัวอย่าง:</div>
            <div style="margin-bottom: 30px; background: #ffeaa7; padding: 5px;">กล่อง 1 (Margin Bottom: 30px)</div>
            <div style="margin-top: 30px; background: #fab1a0; padding: 5px;">กล่อง 2 (Margin Top: 30px)</div>
            <p class="mt-2 small text-muted">ระยะห่างจริงจะเป็น 30px ไม่ใช่ 60px! นี่คือสิ่งที่มือใหม่มักจะพลาด</p>
            <div class="tip-box" style="background:#fef2f2; border-color:#f87171; color:#991b1b;">
                <i class="bi bi-exclamation-triangle"></i> <b>ข้อควรระวัง:</b> Margin สามารถติดลบได้ (Negative Margin) เพื่อดึงกล่องให้เกยกัน แต่ Padding ติดลบไม่ได้นะ!
            </div>
        `
    },
    {
        left: `
            <h2>5. Box-Sizing: จุดเปลี่ยนชีวิต</h2>
            <p>ตามมาตรฐานเดิมของ CSS เวลาเราเพิ่ม Padding หรือ Border ขนาดของกล่องจะขยายใหญ่ขึ้นเรื่อยๆ ทำให้คำนวณ Layout ยากมาก</p>
            <h4>Content-Box (ค่าเริ่มต้น)</h4>
            <p>ขนาดที่ตั้งไว้ ($Width$) คือขนาดของเนื้อหาเท่านั้น Padding และ Border จะบวกเพิ่มเข้าไปข้างนอก</p>
            <div class="code-block">
                <span class="property">box-sizing</span>: <span class="value">content-box</span>;
            </div>
            <h4>Border-Box (สวรรค์ของนักพัฒนา)</h4>
            <p>ขนาดที่ตั้งไว้คือขนาด "รวมทั้งหมด" แล้ว Padding และ Border จะถูกเบียดเข้าไปข้างในกล่องแทน</p>
             <div class="code-block">
                <span class="property">box-sizing</span>: <span class="value">border-box</span>;
            </div>
        `,
        right: `
            <h4>ทำไม Border-Box ถึงดีกว่า?</h4>
            <p>สมมติคุณอยากได้กล่องกว้าง 50% ของหน้าจอ 2 กล่องวางข้างกัน ถ้าใช้ <code>content-box</code> แล้วใส่ Padding กล่องจะระเบิดลงมาข้างล่างทันที!</p>
            <div class="tip-box" style="background:#ecfdf5; border-color:#10b981; color:#065f46;">
                <i class="bi bi-stars"></i> <b>Best Practice:</b> นักพัฒนาเว็บมือโปรจะใส่โค้ดนี้ไว้ที่บรรทัดแรกของ CSS เสมอ:
                <div class="code-block" style="margin: 10px 0; padding: 10px; font-size: 0.75rem;">
                    * { <span class="property">box-sizing</span>: <span class="value">border-box</span>; }
                </div>
                เพื่อให้ทุกอย่างในเว็บคำนวณง่ายเหมือนกันหมด
            </div>
            <p>การใช้ Border-box ทำให้คุณคุม Layout ได้แม่นยำ 100% โดยไม่ต้องกดเครื่องคิดเลขบ่อยๆ</p>
        `
    },
    {
        left: `
            <h2>6. Width & Height: ขอบเขตของกล่อง</h2>
            <p>การกำหนดขนาดมีหน่วยให้เลือกใช้มากมาย ซึ่งแบ่งเป็น 2 กลุ่มหลัก:</p>
            <h4>1. หน่วยคงที่ (Absolute)</h4>
            <ul>
                <li><b>px (Pixels):</b> แม่นยำที่สุด นิยมใช้กับ Border หรือขนาดที่ไม่อยากให้เปลี่ยน</li>
            </ul>
            <h4>2. หน่วยยืดหยุ่น (Relative)</h4>
            <ul>
                <li><b>% (Percentage):</b> เทียบกับขนาดของกล่องแม่ (Parent)</li>
                <li><b>vw / vh:</b> เทียบกับความกว้าง/สูงของหน้าจอเบราว์เซอร์</li>
                <li><b>em / rem:</b> เทียบกับขนาดตัวอักษร (ดีต่อการทำ Responsive)</li>
            </ul>
        `,
        right: `
            <h4>Max-width: ฮีโร่ของมือถือ</h4>
            <p>แทนที่จะใช้ <code>width: 500px;</code> ซึ่งจะล้นจอเวลาเปิดในมือถือ ให้ใช้ <code>max-width: 500px;</code> แทน</p>
            <div class="code-block">
                <span class="selector">.image-container</span> {<br>
                &nbsp;&nbsp;<span class="property">width</span>: <span class="value">100%</span>;<br>
                &nbsp;&nbsp;<span class="property">max-width</span>: <span class="value">800px</span>;<br>
                }
            </div>
            <p>กล่องจะกว้างเต็มจอ แต่จะไม่ใหญ่เกิน 800px ไม่ว่าจอจะใหญ่แค่ไหนก็ตาม</p>
            <div class="tip-box">
                <i class="bi bi-phone"></i> ยุคนี้คือ Mobile First การใช้หน่วยที่ยืดหยุ่นคือหัวใจสำคัญครับ
            </div>
        `
    },
    {
        left: `
            <h2>7. Outline vs Border</h2>
            <p>มือใหม่หลายคนสับสนระหว่าง <b>Outline</b> และ <b>Border</b> เพราะหน้าตามันเหมือนกันมาก แต่มันทำหน้าที่ต่างกันสิ้นเชิง</p>
            <h4>ความแตกต่างที่สำคัญ:</h4>
            <ol>
                <li><b>Space:</b> Border ใช้พื้นที่ใน Box Model (มีผลต่อขนาดกล่อง) แต่ Outline <b>ไม่ใช้พื้นที่เลย</b> (มันลอยอยู่ข้างบน)</li>
                <li><b>Position:</b> Outline มักจะอยู่นอก Border เสมอ</li>
                <li><b>Shape:</b> Border สามารถโค้งตาม <code>border-radius</code> ได้ (ในเบราว์เซอร์รุ่นเก่า Outline จะเป็นสี่เหลี่ยมเสมอ)</li>
            </ol>
            <div class="code-block">
                <span class="property">outline</span>: <span class="value">4px solid yellow</span>;
            </div>
        `,
        right: `
            <h4>เมื่อไหร่ควรใช้ Outline?</h4>
            <p>Outline นิยมใช้เพื่อ <b>"การเข้าถึง" (Accessibility)</b> เช่น เวลาเรากดปุ่ม Tab บนคีย์บอร์ด จะมีเส้นฟ้าๆ ล้อมรอบปุ่ม นั่นคือ Outline</p>
            <div class="preview-label">ตัวอย่าง Outline:</div>
            <div class="code-preview" style="text-align:center;">
                <button style="border: 3px solid #333; outline: 4px solid #3498db; padding: 10px 20px; background: white;">
                    ลองคลิกฉัน
                </button>
            </div>
            <p class="small text-muted text-center mt-2">เส้นสีดำคือ Border, เส้นสีฟ้าคือ Outline</p>
            <div class="tip-box" style="background:#fff7ed; border-color:#fdba74;">
                <i class="bi bi-slash-circle"></i> <b>อย่าหาทำ:</b> การตั้งค่า <code>outline: none;</code> โดยไม่ทำ Style อื่นทดแทน จะทำให้คนพิการที่ใช้คีย์บอร์ดใช้งานเว็บคุณไม่ได้เลย
            </div>
        `
    },
    {
        left: `
            <h2>8. สรุปและ Playground</h2>
            <p>คุณได้เรียนรู้ทุกอย่างเกี่ยวกับ Box Model แล้ว! ตั้งแต่ชั้นในสุด (Content) ไปจนถึงชั้นนอกสุด (Margin)</p>
            <h4>ภารกิจสุดท้าย:</h4>
            <p>ลองปรับแต่งกล่องใน Playground โดยใช้ความรู้ที่เรียนมา:</p>
            <ul class="small">
                <li>เปลี่ยนสี Border และเพิ่มความหนา</li>
                <li>ใช้ <code>border-radius</code> เพื่อทำให้กล่องมน</li>
                <li>ปรับ <code>padding</code> เพื่อให้ข้อความดูไม่แน่นเกินไป</li>
                <li>ลองสลับระหว่าง <code>content-box</code> และ <code>border-box</code> เพื่อดูความต่าง</li>
            </ul>
            <textarea id="editor" spellcheck="false" oninput="updatePreview()">
<div style="
  background-color: #6366f1;

">
  นี่คือกล่องของฉัน!
</div></textarea>
        `,
        right: `
            <h4>Live Preview:</h4>
            <div id="live-preview"></div>
            <div class="tip-box" style="background: #dcfce7; border-color: #4ade80; color: #166534; margin-top:20px;">

                ยินดีด้วยนายเก่งมาก! ตอนนี้พื้นฐาน Layout ของนายแน่นปึ้กแล้ว พร้อมจะไปลุยเรื่องต่อไปหรือยัง?
            </div>

                <small class="text-muted">จดบันทึกโดย: Gemini Masterclass 2026</small>
            </p>
        `
    }
];

    let currentPage = 0;
    let isOpen = false;

    // คำนวณหน้าทั้งหมด
    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

           if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'css 4.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            preview.innerHTML = code;
        }
    }
</script>
