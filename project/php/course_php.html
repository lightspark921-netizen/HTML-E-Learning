<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Roadmap - Backend Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --php-purple: #777bb4; /* สีเอกลักษณ์ของ PHP */
            --paper: #fdfcf0;
            --ink: #2b2d42;
        }

        body { 
            background: #cbd5e1; 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px;
            overflow: hidden;
        }

        /* --- หน้าปก --- */
        #book-cover {
            width: 420px; height: 580px;
            background: linear-gradient(135deg, #4F5B93 0%, #232733 100%);
            border-radius: 10px 30px 30px 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 40px; position: relative;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5);
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.5s;
            z-index: 10; cursor: pointer; border-left: 15px solid #333;
        }

        .book-opened { transform: rotateY(-110deg) translateX(-100%); opacity: 0; pointer-events: none; }

        /* --- ตัวสมุดข้างใน --- */
        #book-inside {
            display: none; width: 450px; min-height: 550px;
            background: var(--paper); position: absolute;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.1);
            border-radius: 5px 20px 20px 5px; padding: 50px 40px;
            transform-style: preserve-3d;
        }

        /* --- อนิเมชั่นการพลิกหน้า --- */
        .page-flip-next { animation: flipNext 0.6s ease-in-out; }
        .page-flip-prev { animation: flipPrev 0.6s ease-in-out; }

        @keyframes flipNext {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(-20deg) scale(0.95); opacity: 0.5; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        @keyframes flipPrev {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(20deg) scale(0.95); opacity: 0.5; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        .badge-step { background: var(--php-purple); color: white; padding: 5px 15px; border-radius: 50px; font-family: 'Chakra Petch', sans-serif; margin-bottom: 20px; }
        .lesson-title { font-family: 'Chakra Petch', sans-serif; font-size: 1.8rem; color: var(--ink); margin-bottom: 20px; }
        .lesson-desc { color: #555; font-size: 1.1rem; margin-bottom: 40px; min-height: 120px; }
        
        .btn-enter {
            background: var(--php-purple); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; text-decoration: none; display: inline-block;
            transition: 0.3s;
        }
        .btn-enter:hover { transform: scale(1.05); background: #5a5e9a; color: white; }

        .btn-nav {
            background: none; border: 1px solid #ddd; color: #888; border-radius: 50%; width: 45px; height: 45px; transition: 0.3s;
        }
        .btn-nav:hover:not(:disabled) { background: var(--ink); color: white; }
    </style>
</head>
<body>

    <div id="book-cover" onclick="openBook()">
        <div style="font-size: 6rem; color: var(--php-purple);"><i class="bi bi-code-slash"></i></div>
        <h1 style="font-family: 'Chakra Petch', sans-serif; font-size: 3.5rem;">PHP</h1>
        <p style="letter-spacing: 3px; opacity: 0.8;">BACKEND ROADMAP</p>
        <div style="margin-top: 30px; font-size: 0.9rem; color: #ccc;">
            <i class="bi bi-book"></i> คลิกเพื่อเริ่มเรียนรู้เซิร์ฟเวอร์
        </div>
    </div>

    <div id="book-inside" class="flex-column">
        <div id="page-wrapper">
            <div id="page-content"></div>
        </div>

        <div class="mt-auto d-flex justify-content-between align-items-center">
            <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                <i class="bi bi-chevron-left"></i>
            </button>
            <div class="small text-muted">หน้า <span id="pageNum">1</span> / 10</div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>

    <script>
        const lessons = [
            { id: 1, title: "PHP Syntax & Variables", desc: "เริ่มต้นก้าวแรกกับ PHP: การเขียน Tags, การประกาศตัวแปร และชนิดข้อมูลพื้นฐานที่ควรรู้", link: "php 1.html" },
            { id: 2, title: "Operators & Math", desc: "เรียนรู้การคำนวณทางคณิตศาสตร์ และตัวดำเนินการตรรกะ เพื่อใช้ในเงื่อนไขต่างๆ", link: "php 2.html" },
            { id: 3, title: "Conditionals (If-Else)", desc: "การควบคุมทิศทางของโปรแกรมด้วยเงื่อนไข และการใช้ Switch Case ในการตัดสินใจ", link: "php 3.html" },
            { id: 4, title: "Loops (While & For)", desc: "ประหยัดเวลาด้วยการทำงานซ้ำอัตโนมัติ การใช้ For, While และ foreach กับข้อมูลชุดใหญ่", link: "php 4.html" },
            { id: 5, title: "Arrays & Functions", desc: "การจัดการกลุ่มข้อมูลด้วย Array และการสร้าง Function ของตัวเองเพื่อการเขียนโค้ดที่สะอาด", link: "php 5.html" },
            { id: 6, title: "GET & POST Methods", desc: "หัวใจของเว็บ: การรับส่งข้อมูลจากฟอร์ม HTML เข้าสู่เซิร์ฟเวอร์เพื่อประมวลผล", link: "php 6.html" },
            { id: 7, title: "Working with MySQL", desc: "การเชื่อมต่อฐานข้อมูล CRUD (สร้าง, อ่าน, แก้ไข, ลบ) ข้อมูลในโลกแห่งความเป็นจริง", link: "php  7.html" },
            { id: 8, title: "Sessions & Cookies", desc: "การจดจำผู้ใช้ผ่านระบบ Login และการเก็บข้อมูลชั่วคราวบนเบราว์เซอร์และเซิร์ฟเวอร์", link: "php 8.html" },
            { id: 9, title: "File Handling & Upload", desc: "การจัดการไฟล์บนเซิร์ฟเวอร์: การเขียนไฟล์, การอ่านไฟล์ และระบบอัปโหลดรูปภาพ", link: "php 9.html" },
            { id: 10, title: "PHP Final Quiz", desc: "ทดสอบทักษะ Backend ของคุณด้วยแบบทดสอบรวม 30 ข้อ เพื่อจบหลักสูตร PHP พื้นฐาน", link: "quizphp.html" },
        ];

        let currentPage = 0;

        function openBook() {
            document.getElementById('book-cover').classList.add('book-opened');
            setTimeout(() => {
                document.getElementById('book-cover').style.display = 'none';
                document.getElementById('book-inside').style.display = 'flex';
                renderPage();
            }, 600);
        }

        function renderPage() {
            const lesson = lessons[currentPage];
            document.getElementById('page-content').innerHTML = `
                <div class="badge-step">Chapter ${lesson.id}</div>
                <h2 class="lesson-title">${lesson.title}</h2>
                <p class="lesson-desc">${lesson.desc}</p>
                <div class="text-center mb-4">
                    <a href="${lesson.link}" class="btn-enter w-100 py-3">เข้าสู่บทเรียน <i class="bi bi-terminal ms-2"></i></a>
                </div>
            `;
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === lessons.length - 1;
        }

        function changePage(step) {
            const book = document.getElementById('book-inside');
            const animClass = step === 1 ? 'page-flip-next' : 'page-flip-prev';
            book.classList.remove('page-flip-next', 'page-flip-prev');
            void book.offsetWidth; 
            book.classList.add(animClass);

            setTimeout(() => {
                currentPage += step;
                renderPage();
            }, 300);
        }
    </script>
</body>
</html>
