<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 9 - HTML Entities Masterclass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #2b2d42;
            --entity-purple: #6f42c1;
            --entity-dark: #4527a0;
            --desk: #d1d5db;
            --preview-bg: #ffffff;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 800px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: var(--entity-purple); left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid var(--entity-dark); box-shadow: 15px 0 50px rgba(0,0,0,0.3);
            cursor: pointer; backface-visibility: hidden;
            background-image: radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { 
            flex: 1; padding: 40px 50px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--entity-purple); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; font-weight: 700; font-size: 1.6rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 20px; font-weight: 700; border-left: 4px solid var(--entity-purple); padding-left: 10px; font-size: 1.1rem; }
        p { line-height: 1.7; font-size: 0.95rem; color: #333; margin-bottom: 1rem; text-align: justify; }

        .code-block { 
            background: #282c34; color: #abb2bf; padding: 15px; 
            border-radius: 10px; font-family: 'Fira Code', monospace; 
            font-size: 0.85rem; margin: 15px 0; border-left: 5px solid var(--entity-purple);
        }
        
        .entity-table { width: 100%; font-size: 0.85rem; margin: 10px 0; border-collapse: collapse; }
        .entity-table th, .entity-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .entity-table th { background: #f0f0f0; }
        .entity-preview { font-size: 1.2rem; font-weight: bold; color: var(--entity-purple); }

        .tip-box { background: #f3e5f5; border-radius: 8px; padding: 15px; border-left: 5px solid var(--entity-purple); margin: 15px 0; font-size: 0.85rem; }
        .tag-badge { background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code', monospace; color: var(--entity-purple); font-size: 0.85rem; }

        #editor { width: 100%; height: 180px; font-family: 'Fira Code', monospace; padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: #fff; }
        #live-preview { width: 100%; height: 220px; background: white; border: 2px dashed #bbb; border-radius: 8px; padding: 10px; overflow: auto; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--ink); color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        .btn-nav:hover:not(:disabled) { background: var(--entity-purple); transform: translateY(-2px); }
        .btn-next-chapter { background: #27ae60; }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
         <div style="width:140px; height:140px; background:rgba(255,255,255,0.2); border: 3px dashed white; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
            <span style="font-size:4rem; font-weight: bold;">&amp;#;</span>

        <p class="small opacity-75">แก้ปัญหาตัวอักษรซ้อนทับและการแสดงผลที่ถูกต้อง</p>
        <div class="mt-4 small opacity-75"><i class="bi bi-book"></i> คลิกเพื่อเปิดบทเรียน</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
               <button class="btn-nav btn-menu" onclick="window.location.href='lesson-html.html'">
                    <i class="bi bi-grid-fill"></i> เลือกบทเรียน
                </button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            
           <div class="fw-bold text-muted small">Unit 09 | หน้า <span id="pageNum">1</span> / <span id="totalPage">8</span></div>
            
            
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>
<script>
const content = [
    {
        left: `
            <h2>1. HTML Entity คืออะไร?</h2>
            <p>นายเคยสงสัยไหมว่าถ้าเราอยากพิมพ์เครื่องหมาย <b>"น้อยกว่า"</b> หรือ <b>"มากกว่า"</b> ลงในหน้าเว็บ เบราว์เซอร์จะสับสนไหมว่ามันคือ Tag หรือเปล่า? นั่นแหละคือที่มาของ <b>HTML Entities</b> ครับ</p>
            <p>Entities คือชุดรหัสที่ใช้แทนตัวอักษรพิเศษที่จองไว้ในระบบ (Reserved Characters) หรือตัวอักษรที่หาพิมพ์ยากบนคีย์บอร์ดปกติ</p>
            <h4>โครงสร้างของรหัสลับ</h4>
            <p>รหัส Entity จะขึ้นต้นด้วยเครื่องหมาย <span class="tag-badge">&amp;</span> (Ampersand) และปิดท้ายด้วย <span class="tag-badge">;</span> (Semicolon) เสมอ มี 2 รูปแบบ:</p>
            <ul>
                <li><b>Entity Name:</b> เช่น <code>&amp;nbsp;</code> (จำง่าย)</li>
                <li><b>Entity Number:</b> เช่น <code>&amp;#160;</code> (เบราว์เซอร์อ่านเร็ว)</li>
            </ul>
            <div class="tip-box">
                <i class="bi bi-info-circle"></i> <b>ทำไมต้องใช้?</b> เพราะถ้าเราพิมพ์ &lt; ตรงๆ เบราว์เซอร์จะนึกว่าเรากำลังเริ่มแท็กใหม่ และอาจทำให้โครงสร้างเว็บพังได้ทันที!
            </div>
        `,
        right: `
            <h4>ตัวอย่างปัญหาที่พบบ่อย</h4>
            <p>สมมติเราอยากแสดงโค้ด HTML บนหน้าจอแบบนี้:</p>
            <div class="code-block">
                &lt;p&gt; Hello World &lt;/p&gt;
            </div>
            <p>ถ้าเราพิมพ์ใน Code Editor ตรงๆ เบราว์เซอร์จะรันมันเป็น Paragraph และไม่แสดง Tag ออกมา นายต้องเขียนแบบนี้แทนครับ:</p>
            <div class="code-block">
                <span style="color:#e06c75">&amp;lt;</span>p<span style="color:#e06c75">&amp;gt;</span> Hello World <span style="color:#e06c75">&amp;lt;</span>/p<span style="color:#e06c75">&amp;gt;</span>
            </div>
            <p>การใช้ Entity ช่วยให้เราควบคุมการแสดงผลได้แม่นยำ 100% ไม่ว่าเบราว์เซอร์รุ่นไหนก็อ่านออกเหมือนกันหมด</p>
            <div class="tip-box" style="background: #e3f2fd; border-color: #2196f3;">
                <b>Professional Tip:</b> แนะนำให้ใช้ Entity Name (ชื่อ) เพราะอ่านโค้ดแล้วรู้ทันทีว่าเป็นตัวอะไร ไม่ต้องไปเปิดตารางค้นหาเบอร์รหัสบ่อยๆ
            </div>
        `
    },
    {
        left: `
            <h2>2. อาวุธลับ 5 ชิ้นที่ต้องจำ</h2>
            <p>มี Entity อยู่ 5 ตัวที่ Web Developer ทุกคนต้องจำให้แม่น เพราะมันคือตัวอักษร "ต้องห้าม" ที่ห้ามพิมพ์สดลงในเนื้อหาครับนาย</p>
            <table class="entity-table">
                <tr><th>สัญลักษณ์</th><th>ชื่อรหัส</th><th>ความหมาย</th></tr>
                <tr><td class="entity-preview">&lt;</td><td><code>&amp;lt;</code></td><td>Less Than (น้อยกว่า)</td></tr>
                <tr><td class="entity-preview">&gt;</td><td><code>&amp;gt;</code></td><td>Greater Than (มากกว่า)</td></tr>
                <tr><td class="entity-preview">&amp;</td><td><code>&amp;amp;</code></td><td>Ampersand (และ)</td></tr>
                <tr><td class="entity-preview">"</td><td><code>&amp;quot;</code></td><td>Double Quote (ฟันหนู)</td></tr>
                <tr><td class="entity-preview">'</td><td><code>&amp;apos;</code></td><td>Single Quote (ฝนทอง)</td></tr>
            </table>
            <p>โดยเฉพาะ <b>&amp;amp;</b> สำคัญมาก เพราะเครื่องหมาย &amp; มักถูกใช้ใน URL หรือการเขียนโค้ดโปรแกรมเมอร์บ่อยๆ</p>
        `,
        right: `
            <h4>ทำไม &amp;amp; ถึงอันตราย?</h4>
            <p>ถ้าในเนื้อหาเว็บมีคำว่า "AT&T" แล้วนายพิมพ์ตรงๆ บางเบราว์เซอร์จะพยายามหา Entity ที่ขึ้นต้นด้วย & และถ้ามันหาไม่เจอ มันจะแสดงผลเพี้ยนหรือส่งผลต่อ SEO ได้</p>
            <div class="code-block">
                &lt;!-- เขียนแบบที่ถูกต้อง --&gt;<br>
                &lt;p&gt;บริษัท AT&amp;amp;T ยินดีต้อนรับ&lt;/p&gt;
            </div>
            <div class="tip-box">
                <b>ข้อควรระวัง:</b> Entity names นั้น "Case Sensitive" นะครับ เช่น <code>&amp;LT;</code> กับ <code>&amp;lt;</code> อาจให้ผลไม่เหมือนกันในบางกรณี
            </div>
            <p>นอกจากนี้ยังมีสัญลักษณ์ทางคณิตศาสตร์และเครื่องหมายวรรคตอนอื่นๆ อีกนับร้อยที่เราสามารถเรียกใช้ได้ผ่านระบบนี้</p>
        `
    },
    {
        left: `
            <h2>3. พลังของช่องว่างที่ไม่ยอมแยก</h2>
            <p>หนึ่งใน Entity ที่ถูกใช้งานบ่อยที่สุดในโลกคือ <b>&amp;nbsp;</b> ย่อมาจาก "Non-Breaking Space" นายเคยเจอไหมที่พิมพ์เคาะ Spacebar 10 ครั้ง แต่หน้าเว็บขยับให้ครั้งเดียว?</p>
            <p>นั่นเป็นเพราะ HTML ยุบช่องว่างที่ติดกันให้เหลือเพียงหนึ่งเดียวเพื่อประหยัดพื้นที่ ถ้าอยากขยับเนื้อหาจริงๆ ต้องใช้รหัสนี้ครับ</p>
            <div class="code-block">
                ชื่อ: นายสมชาย&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;นามสกุล: ดีมาก
            </div>
            <p>นอกจากเพิ่มช่องว่างแล้ว มันยังมีหน้าที่สำคัญคือ <b>"การห้ามตัดบรรทัด"</b> ตัวอักษรที่คั่นด้วยรหัสนี้จะถูกมองว่าเป็นคำเดียวเสมอ และจะไม่แยกออกจากกันเวลาขึ้นบรรทัดใหม่</p>
        `,
        right: `
            <h4>ตัวอย่างการใช้งาน &amp;nbsp;</h4>
            <p>ใช้เมื่อต้องการให้หน่วยนับติดกับตัวเลข หรือชื่อติดกับนามสกุลเสมอ:</p>
            <ul>
                <li><code>10&amp;nbsp;กิโลกรัม</code> (เลข 10 กับหน่วยจะไม่แยกกัน)</li>
                <li><code>พระบาทสมเด็จ&amp;nbsp;ฯ</code></li>
            </ul>
            <div class="tip-box" style="background:#fff3e0; border-color:#ff9800;">
                <i class="bi bi-exclamation-triangle"></i> <b>ห้ามใช้มั่ว!</b> อย่าใช้ <code>&amp;nbsp;</code> เพื่อจัด Layout หน้าเว็บเป็นสิบๆ ตัวนะครับ นายควรใช้ CSS (Padding/Margin) ในการจัดช่องว่างจะดูเป็นมืออาชีพกว่าเยอะ
            </div>
            <p>จำไว้ว่ามันมีไว้เพื่อป้องกันการตัดคำที่ "ไม่เหมาะสม" เท่านั้น ไม่ใช่ไม้บรรทัดไว้จัดหน้ากระดาษครับ!</p>
        `
    },
    {
        left: `
            <h2>4. สัญลักษณ์ลิขสิทธิ์และการเงิน</h2>
            <p>ในหน้า Footer ของเว็บไซต์ นายมักจะเห็นเครื่องหมาย Copyright (&copy;) หรือสัญลักษณ์ค่าเงินต่าง ๆ ซึ่ง Entities เตรียมไว้ให้เราหมดแล้วโดยไม่ต้องหารูปมาแปะ</p>
            <table class="entity-table">
                <tr><th>สัญลักษณ์</th><th>รหัส Entity</th><th>ชื่อเรียก</th></tr>
                <tr><td class="entity-preview">&copy;</td><td><code>&amp;copy;</code></td><td>Copyright</td></tr>
                <tr><td class="entity-preview">&reg;</td><td><code>&amp;reg;</code></td><td>Registered</td></tr>
                <tr><td class="entity-preview">&trade;</td><td><code>&amp;trade;</code></td><td>Trademark</td></tr>
                <tr><td class="entity-preview">&euro;</td><td><code>&amp;euro;</code></td><td>Euro</td></tr>
                <tr><td class="entity-preview">&pound;</td><td><code>&amp;pound;</code></td><td>Pound</td></tr>

            </table>
        `,
        right: `
            <h4>การใช้สัญลักษณ์สกุลเงิน</h4>

            <div class="tip-box">

            </div>
        `
    },
    {
        left: `
            <h2>5. สัญลักษณ์ทางคณิตศาสตร์</h2>
            <p>ถ้าเว็บของนายต้องแสดงสูตรคำนวณ หรือเนื้อหาทางวิทยาศาสตร์ การใช้เครื่องหมายคูณ (x) หรือหาร (/) บนคีย์บอร์ดอาจจะดูไม่สวยงามเท่าไหร่</p>

                <tr><th>สัญลักษณ์</th><th>รหัส Entity</th><th>ชื่อเรียก</th></tr>

        right: `

            </div>
            <p>นอกเหนือจากคณิตศาสตร์ ยังมีกรีกอักษรที่ใช้บ่อยในฟิสิกส์:</p>

    let currentPage = 0;
    let isOpen = false;

    // คำนวณหน้าทั้งหมด
    document.getElementById('pageNum').innerText = currentPage + 1;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            prevBtn.disabled = currentPage === 0;

             if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>Quiz</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'quizhtml.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            preview.innerHTML = code;
        }
    }
</script>
