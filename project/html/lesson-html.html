<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Roadmap - Animation Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --html-orange: #e44d26;
            --paper: #fdfcf0;
            --ink: #2b2d42;
        }

        body { 
            background: #d1d5db; 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px; /* เพิ่มมิติความลึกสำหรับการหมุน 3D */
            overflow: hidden;
        }

        /* --- หน้าปก (เหมือนเดิม) --- */
        #book-cover {
            width: 420px; height: 580px;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            border-radius: 10px 30px 30px 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 40px; position: relative;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5);
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.5s;
            z-index: 10; cursor: pointer; border-left: 15px solid #111;
        }

        .book-opened { transform: rotateY(-110deg) translateX(-100%); opacity: 0; pointer-events: none; }

        /* --- ตัวสมุดข้างใน --- */
        #book-inside {
            display: none; width: 450px; min-height: 550px;
            background: var(--paper); position: absolute;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.1);
            border-radius: 5px 20px 20px 5px; padding: 50px 40px;
            transform-style: preserve-3d;
        }

        /* --- อนิเมชั่นการพลิกหน้า (The Flip Animation) --- */
        .page-flip-next {
            animation: flipNext 0.6s ease-in-out;
        }

        .page-flip-prev {
            animation: flipPrev 0.6s ease-in-out;
        }

        @keyframes flipNext {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(-20deg) scale(0.95); opacity: 0.5; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        @keyframes flipPrev {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(20deg) scale(0.95); opacity: 0.5; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        /* สไตล์เนื้อหา */
        .badge-step { background: var(--html-orange); color: white; padding: 5px 15px; border-radius: 50px; font-family: 'Chakra Petch', sans-serif; margin-bottom: 20px; }
        .lesson-title { font-family: 'Chakra Petch', sans-serif; font-size: 1.8rem; color: var(--ink); margin-bottom: 20px; }
        .lesson-desc { color: #555; font-size: 1.1rem; margin-bottom: 40px; min-height: 120px; }
        
        .btn-enter {
            background: var(--html-orange); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; text-decoration: none; display: inline-block;
            transition: 0.3s;
        }
        .btn-enter:hover { transform: scale(1.05); background: #c33a1b; color: white; }

        .btn-nav {
            background: none; border: 1px solid #ddd; color: #888; border-radius: 50%; width: 45px; height: 45px; transition: 0.3s;
        }
        .btn-nav:hover:not(:disabled) { background: var(--ink); color: white; }
    </style>
</head>
<body>

    <div id="book-cover" onclick="openBook()">
        <div style="font-size: 6rem; color: var(--html-orange);"><i class="bi bi-filetype-html"></i></div>
        <h1 style="font-family: 'Chakra Petch', sans-serif; font-size: 3rem;">HTML5</h1>
        <p style="letter-spacing: 3px; opacity: 0.7;">LEARNING ROADMAP</p>
        <div style="margin-top: 30px; font-size: 0.9rem; color: #aaa;" class="animate-pulse">
            <i class="bi bi-hand-index-thumb"></i> คลิกเพื่อเปิดหนังสือ
        </div>
    </div>

    <div id="book-inside" class="flex-column">
        <div id="page-wrapper">
            <div id="page-content">
                </div>
        </div>

        <div class="mt-auto d-flex justify-content-between align-items-center">
            <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                <i class="bi bi-chevron-left"></i>
            </button>
            <div class="small text-muted">หน้า <span id="pageNum">1</span> / 10</div>
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>

    <script>
        const lessons = [
            { id: 1, title: "พื้นฐาน Heading & Text", desc: "เรียนรู้หัวใจของโครงสร้างเว็บ การจัดลำดับความสำคัญของเนื้อหา และการใช้ Tag พื้นฐานสำหรับข้อความ", link: "lesson1.html" },
            { id: 2, title: "การสร้างรายการ (Lists)", desc: "จัดระเบียบความคิดและข้อมูลด้วยการใช้รายการแบบจุด (Bullet) และแบบลำดับตัวเลข", link: "lesson2.html" },
            { id: 3, title: "Multimedia & Links", desc: "เชื่อมโยงโลกทั้งใบเข้าด้วยกันด้วย Hyperlink และเพิ่มมิติให้เว็บด้วยรูปภาพที่สวยงาม", link: "lesson3.html" },
            { id: 4, title: "HTML5 Advanced Mastery", desc: "เรียนรู้การนำเสนอข้อมูลจำนวนมากอย่างเป็นระเบียบ และการสร้างฟอร์มรับข้อมูลเบื้องต้น", link: "lesson4.html" },
            { id: 5, title: "HTML5 Forms & Inputs", desc: "เทคนิคการฝังวิดีโอ การใส่เสียง และการใช้ Semantic HTML เพื่อรองรับ Google Search (SEO)", link: "lesson5.html" },
            { id: 6, title: "HTML5 Advanced Mastery", desc: "สร้างหน้าสมัครสมาชิก และหน้าล็อกอิน ด้วย Input หลากหลายรูปแบบ เช่น Checkbox และ Radio", link: "lesson6.html" },
            { id: 7, title: "Grouping & Layout", desc: "เทคนิคการแบ่งบล็อกหน้าเว็บด้วย Div และ Span ซึ่งเป็นพื้นฐานสำคัญก่อนไปเรียน CSS", link: "lesson7.html" },
            { id: 8, title: "HTML with JavaScript", desc: "ทำให้หน้าเว็บโต้ตอบกับผู้ใช้ได้จริง ด้วยการเชื่อมต่อคำสั่ง JavaScript และ Event ต่างๆ", link: "lesson8.html" },
            { id: 9, title: "คู่มือเอนทิตี (Entities)", desc: "บทสุดท้าย: รหัสลับสำหรับสัญลักษณ์พิเศษที่ไม่มีบนคีย์บอร์ด และการจัดการอักขระที่ถูกจองไว้", link: "lesson9.html" },
            { id: 10, title: "Quiz", desc: "การสอบที่รวม 9 บท 30 ข้อ", link: "quizhtml.html" },
        ];

        let currentPage = 0;

        function openBook() {
            document.getElementById('book-cover').classList.add('book-opened');
            setTimeout(() => {
                document.getElementById('book-cover').style.display = 'none';
                document.getElementById('book-inside').style.display = 'flex';
                renderPage();
            }, 600);
        }

        function renderPage() {
            const lesson = lessons[currentPage];
            document.getElementById('page-content').innerHTML = `
                <div class="badge-step">Chapter ${lesson.id}</div>
                <h2 class="lesson-title">${lesson.title}</h2>
                <p class="lesson-desc">${lesson.desc}</p>
                <div class="text-center mb-4">
                    <a href="${lesson.link}" class="btn-enter w-100 py-3">เข้าสู่บทเรียน <i class="bi bi-arrow-right ms-2"></i></a>
                </div>
            `;
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === lessons.length - 1;
        }

        function changePage(step) {
            const book = document.getElementById('book-inside');
            
            // ใส่ Class อนิเมชั่นตามทิศทาง
            const animClass = step === 1 ? 'page-flip-next' : 'page-flip-prev';
            book.classList.remove('page-flip-next', 'page-flip-prev');
            
            // บังคับให้ Browser รีเฟรช Class เพื่อให้เล่นอนิเมชั่นใหม่
            void book.offsetWidth; 
            
            book.classList.add(animClass);

            // เปลี่ยนเนื้อหาตรงกลางจังหวะที่หน้ากระดาษกำลังเหวี่ยง (300ms)
            setTimeout(() => {
                currentPage += step;
                renderPage();
            }, 300);
        }
    </script>
</body>
</html>
