<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียนที่ 6 - HTML5 Advanced Mastery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --paper: #fdfcf0;
            --ink: #1a1a2e;
            --html-blue: #0077b6; /* เปลี่ยนโทนสีเป็นสีฟ้าเข้มเพื่อความดู Advance */
            --dark-blue: #023e8a;
            --desk: #e5e7eb;
            --preview-bg: #ffffff;
            --accent: #f72585;
        }

        body { 
            background: var(--desk); 
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; perspective: 2000px; overflow: hidden;
        }

        .book-wrapper {
            position: relative;
            width: 500px; height: 800px;
            transform-style: preserve-3d;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .book-wrapper.is-open { width: 1200px; }

        /* ปรับแต่งหน้าปกใหม่ */
        .book-cover {
            position: absolute; width: 500px; height: 100%;
            background: linear-gradient(135deg, var(--html-blue), var(--dark-blue)); 
            left: 0; top: 0; z-index: 100;
            transform-origin: left; transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 5px 20px 20px 5px;
            border-left: 15px solid #000; box-shadow: 25px 0 50px rgba(0,0,0,0.4);
            cursor: pointer; backface-visibility: hidden;
            overflow: hidden;
        }

        /* ตกแต่งลวดลายหน้าปก */
        .book-cover::before {
            content: "<div>"; position: absolute; top: 20px; right: 20px; font-family: monospace; opacity: 0.1; font-size: 5rem;
        }
        .book-cover::after {
            content: "</div>"; position: absolute; bottom: 20px; left: 20px; font-family: monospace; opacity: 0.1; font-size: 5rem;
        }

        .book-cover.opened { transform: rotateY(-175deg); }

        .notebook {
            position: absolute; width: 1200px; height: 100%;
            background: var(--paper); border-radius: 5px 20px 20px 5px;
            display: flex; left: 0; top: 0; z-index: 1; opacity: 0;
            transition: opacity 0.4s ease; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .book-wrapper.is-open .notebook { opacity: 1; }
        .notebook::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.08); z-index: 5; }

        .page-left, .page-right { flex: 1; padding: 40px 60px; overflow-y: auto; scrollbar-width: thin; }

        h2 { font-family: 'Chakra Petch', sans-serif; color: var(--html-blue); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; font-weight: 700; font-size: 1.6rem; }
        h4 { font-family: 'Chakra Petch', sans-serif; color: var(--ink); margin-top: 20px; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 10px; font-size: 1.1rem; }
        p { line-height: 1.6; font-size: 0.95rem; color: #333; }

        .code-block { 
            background: #282c34; color: #abb2bf; padding: 15px; 
            border-radius: 10px; font-family: 'Consolas', monospace; 
            font-size: 0.8rem; margin: 15px 0; border-left: 5px solid var(--accent);
        }
        .preview-label { background: #e9ecef; color: #495057; font-size: 0.75rem; padding: 4px 12px; font-weight: bold; border-left: 5px solid #adb5bd; }
        .code-preview { background: var(--preview-bg); border: 1px solid #ddd; padding: 15px; border-radius: 0 0 10px 10px; margin-bottom: 20px; }

        .tag { color: #e06c75; } .attr { color: #d19a66; } .val { color: #98c379; }
        .tip-box { background: #f0f7ff; border-radius: 8px; padding: 12px; border-left: 5px solid var(--html-blue); margin: 15px 0; font-size: 0.85rem; }
        .tag-badge { background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; color: var(--html-blue); font-size: 0.85rem; }

        #editor { width: 100%; height: 180px; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; }
        #live-preview { width: 100%; height: 220px; background: white; border: 2px dashed #bbb; border-radius: 8px; padding: 10px; overflow: auto; }

        .notebook-footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #fff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 1px solid #eee; border-radius: 0 0 20px 5px; z-index: 10;
        }

        .btn-nav { background: var(--ink); color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .btn-nav:hover:not(:disabled) { background: var(--html-blue); transform: translateY(-2px); color: white; }
        .btn-nav:disabled { background: #ccc; opacity: 0.5; cursor: not-allowed; }
        .btn-next-chapter { background: #8338ec; }
    </style>
</head>
<body>

<div class="book-wrapper" id="wrapper">
    <div class="book-cover" id="bookCover" onclick="openBook()">
         <div style="width:140px; height:140px; background:rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; transform: rotate(10deg);">
            <i class="bi bi-layout-wtf" style="font-size:4.5rem; color:white"></i>
        </div>
        <h1 class="display-5 fw-bold" style="font-family: 'Chakra Petch'; letter-spacing: 2px;">ADVANCED HTML5</h1>
        <p class="lead" style="font-weight: 300;">MODERN WEB ARCHITECTURE</p>
        <div style="width: 100px; height: 5px; background: var(--accent); margin: 20px 0; border-radius: 2px;"></div>
        <h5 class="fw-bold">UNIT 06: FORMS & LAYOUTS</h5>
        <p class="small opacity-75">การจัดการฟอร์มขั้นสูงและการวางโครงสร้างยุคใหม่</p>
        <div class="mt-4 small opacity-75"><i class="bi bi-unlock-fill"></i> แตะเพื่อเข้าสู่เนื้อหาชั้นสูง</div>
    </div>

    <div class="notebook">
        <div class="page-left" id="left-page"></div>
        <div class="page-right" id="right-page"></div>
        
        <div class="notebook-footer">
            <div class="d-flex gap-2">
                  <button class="btn-nav btn-menu" onclick="window.location.href='lesson-html.html'">
                    <i class="bi bi-grid-fill"></i> เลือกบทเรียน
                </button>
                <button class="btn-nav" id="prevBtn" onclick="changePage(-1)">
                    <i class="bi bi-chevron-left"></i> ย้อนกลับ
                </button>
            </div>
            
            <div class="fw-bold text-muted small">Unit 06 | หน้า <span id="pageNum">1</span> / <span id="totalPage"></span></div>
            
            <button class="btn-nav" id="nextBtn" onclick="changePage(1)">
                <span>ถัดไป</span> <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
const content = [
    {
        left: `
            <h2>1. ยุคใหม่ของ Web Forms</h2>
            <p>ในบทที่ 6 นี้ เราจะเลิกใช้แค่ <code>input type="text"</code> แบบธรรมดา แต่เราจะเข้าสู่ <b>Smart Inputs</b> ที่มี Validation ในตัว</p>
            <h4>ทำไมต้อง Advanced Form?</h4>
            <p>HTML5 มีความสามารถในการตรวจสอบข้อมูลเบื้องต้นโดยไม่ต้องง้อ JavaScript ช่วยลดภาระของ Server และทำให้ User Experience ดีขึ้นมาก</p>
            <div class="tip-box">
                <i class="bi bi-info-circle"></i> <b>Input Validation:</b> เราสามารถบังคับให้กรอกข้อมูลด้วย Attribute <code>required</code> ได้ทันที
            </div>
        `,
        right: `
            <h4>ตัวอย่าง Inputs ยุคใหม่</h4>
            <ul>
                <li><code>type="email"</code>: ตรวจสอบรูปแบบ @ อัตโนมัติ</li>
                <li><code>type="range"</code>: แถบสไลด์เลือกค่า</li>
                <li><code>type="date"</code>: ปฏิทินเลือกวันที่ (Native UI)</li>
            </ul>
            <div class="code-block">
                <span class="tag">&lt;input</span> <span class="attr">type=</span><span class="val">"color"</span><span class="tag">&gt;</span><br>
                <span class="tag">&lt;input</span> <span class="attr">type=</span><span class="val">"number"</span> <span class="attr">min=</span><span class="val">"1"</span><span class="tag">&gt;</span>
            </div>
            <p>เบราว์เซอร์สมัยใหม่จะแสดงแป้นพิมพ์ที่เหมาะสมกับ Type นั้นๆ เมื่อเปิดผ่านมือถือครับ</p>
        `
    },
    {
        left: `
            <h2>2. Data Lists & Dropdowns</h2>
            <p>การสร้างทางเลือกให้ผู้ใช้ด้วย <span class="tag-badge">&lt;datalist&gt;</span> ช่วยให้เราทำ <b>Auto-complete</b> ได้อย่างง่ายดาย</p>
            <div class="code-block">
                <span class="tag">&lt;input</span> <span class="attr">list=</span><span class="val">"browsers"</span><span class="tag">&gt;</span><br>
                <span class="tag">&lt;datalist</span> <span class="attr">id=</span><span class="val">"browsers"</span><span class="tag">&gt;</span><br>
                &nbsp;&nbsp;<span class="tag">&lt;option</span> <span class="attr">value=</span><span class="val">"Chrome"</span><span class="tag">&gt;</span><br>
                &nbsp;&nbsp;<span class="tag">&lt;option</span> <span class="attr">value=</span><span class="val">"Firefox"</span><span class="tag">&gt;</span><br>
                <span class="tag">&lt;/datalist&gt;</span>
            </div>
        `,
        right: `
            <h4>ความแตกต่างที่สำคัญ</h4>
            <p>เทียบกับ <code>&lt;select&gt;</code> แล้ว <code>&lt;datalist&gt;</code> ยืดหยุ่นกว่าเพราะผู้ใช้สามารถ <b>"พิมพ์ค้นหา"</b> หรือ <b>"พิมพ์ค่าที่ไม่มีในรายการ"</b> ลงไปได้เอง</p>
            <div class="tip-box" style="background:#fff3cd">
                <i class="bi bi-lightbulb"></i> เหมาะมากสำหรับช่องจังหวัด หรือประเภทย่อยที่มีข้อมูลจำนวนมาก
            </div>
        `
    },
    {
        left: `
            <h2>3. การจัดกลุ่ม Form (Fieldset)</h2>
            <p>เมื่อฟอร์มเริ่มใหญ่ เราต้องจัดระเบียบด้วย <span class="tag-badge">&lt;fieldset&gt;</span> และ <span class="tag-badge">&lt;legend&gt;</span></p>
            <div class="code-block">
                <span class="tag">&lt;fieldset&gt;</span><br>
                &nbsp;&nbsp;<span class="tag">&lt;legend&gt;</span>ข้อมูลส่วนตัว<span class="tag">&lt;/legend&gt;</span><br>
                &nbsp;&nbsp;ชื่อ: <span class="tag">&lt;input type="text"&gt;</span><br>
                <span class="tag">&lt;/fieldset&gt;</span>
            </div>
        `,
        right: `
            <h4>ผลลัพธ์ที่ได้</h4>
            <p>เบราว์เซอร์จะวาดเส้นล้อมรอบกลุ่มข้อมูลนั้นๆ และวางหัวข้อไว้บนเส้นขอบ ทำให้แบบฟอร์มดูเป็นสัดส่วน</p>
            <div class="code-preview">
                <fieldset style="border:1px solid #ccc; padding:10px;">
                    <legend style="padding:0 10px; font-size:0.9rem; font-weight:bold;">ตัวอย่าง</legend>
                    <small>แยกส่วนข้อมูลให้ชัดเจน</small>
                </fieldset>
            </div>
        `
    },
    {
        left: `
            <h2>4. HTML5 Video & Audio Mastery</h2>
            <p>เราไม่ต้องใช้ Plugin เสริมอีกต่อไป! ใช้แท็กตรงตัวเพื่อจัดการสื่อมัลติมีเดีย</p>
            <div class="code-block">
                <span class="tag">&lt;video</span> <span class="attr">controls width=</span><span class="val">"250"</span><span class="tag">&gt;</span><br>
                &nbsp;&nbsp;<span class="tag">&lt;source</span> <span class="attr">src=</span><span class="val">"movie.mp4"</span><span class="tag">&gt;</span><br>
                <span class="tag">&lt;/video&gt;</span>
            </div>
        `,
        right: `
            <h4>Attribute ที่ต้องรู้</h4>
            <ul>
                <li><b>controls:</b> แสดงปุ่ม Play/Pause/Volume</li>
                <li><b>autoplay:</b> เล่นทันที (มักต้องคู่กับ muted)</li>
                <li><b>loop:</b> เล่นวนซ้ำไม่รู้จบ</li>
                <li><b>poster:</b> ภาพปกก่อนกดเล่นวิดีโอ</li>
            </ul>
        `
    },
    {
        left: `
            <h2>5. SVG & Canvas Basics</h2>
            <p>การแสดงผลกราฟิกในระดับ Advance แบ่งเป็น 2 สาย:</p>
            <p>1. <b>SVG:</b> ภาพเวกเตอร์ (XML) ขยายเท่าไหร่ก็ไม่แตก เหมาะกับไอคอนและกราฟิกลายเส้น</p>
            <p>2. <b>Canvas:</b> พื้นที่วาดภาพด้วย JavaScript เหมาะกับเกมหรือการทำ Animation หนักๆ</p>
        `,
        right: `
            <h4>ตัวอย่าง SVG พื้นฐาน</h4>
            <div class="code-block">
                <span class="tag">&lt;svg</span> <span class="attr">width=</span><span class="val">"100"</span> <span class="attr">height=</span><span class="val">"100"</span><span class="tag">&gt;</span><br>
                &nbsp;&nbsp;<span class="tag">&lt;circle</span> <span class="attr">cx=</span><span class="val">"50"</span> <span class="attr">cy=</span><span class="val">"50"</span> <span class="attr">r=</span><span class="val">"40"</span> <span class="attr">fill=</span><span class="val">"red"</span> <span class="tag">/&gt;</span><br>
                <span class="tag">&lt;/svg&gt;</span>
            </div>
            <p class="small text-muted">SVG สามารถแก้ไข Code เพื่อเปลี่ยนสีได้โดยตรงผ่าน CSS เลยนะ!</p>
        `
    },
    {
        left: `
            <h2>6. การจัด Layout ด้วย Table (Advanced)</h2>
            <p>ถึงแม้ปัจจุบันจะใช้ Flexbox แต่ Table ยังสำคัญมากสำหรับข้อมูลที่ซับซ้อน (Complex Data)</p>
            <p>เราต้องใช้โครงสร้าง <b>thead, tbody, tfoot</b> เพื่อความถูกต้อง</p>
        `,
        right: `
            <h4>Attribute: Colspan & Rowspan</h4>
            <p>ใช้สำหรับ "รวมช่อง" ตารางเข้าด้วยกัน</p>
            <div class="code-block">
                <span class="tag">&lt;td</span> <span class="attr">colspan=</span><span class="val">"2"</span><span class="tag">&gt;</span>รวม 2 คอลัมน์<span class="tag">&lt;/td&gt;</span>
            </div>
            <div class="code-preview">
                <table border="1" style="width:100%; text-align:center;">
                    <tr><td colspan="2">หัวข้อใหญ่คุม 2 ช่อง</td></tr>
                    <tr><td>ช่อง 1</td><td>ช่อง 2</td></tr>
                </table>
            </div>
        `
    },
    {
        left: `
            <h2>7. Meta Tags & SEO Optimization</h2>
            <p>หัวใจของการทำให้คนหาเว็บเราเจอใน Google คือการเขียน Meta Tags ในส่วน <code>&lt;head&gt;</code></p>
            <div class="code-block">
                <span class="tag">&lt;meta</span> <span class="attr">name=</span><span class="val">"description"</span> <span class="attr">content=</span><span class="val">"สอนเขียนเว็บ..."</span><span class="tag">&gt;</span><br>
                <span class="tag">&lt;meta</span> <span class="attr">name=</span><span class="val">"keywords"</span> <span class="attr">content=</span><span class="val">"HTML, CSS"</span><span class="tag">&gt;</span>
            </div>
        `,
        right: `
            <h4>Social Share (Open Graph)</h4>
            <p>ถ้าอยากให้เวลาแชร์ลิงก์ลง Facebook แล้วมีรูปสวยๆ ต้องใช้ <code>property="og:image"</code></p>
            <div class="tip-box">
                <i class="bi bi-search"></i> นี่คือเหตุผลที่บางเว็บติดหน้าแรก Google และบางเว็บไม่มีใครหาเจอ!
            </div>
        `
    },
    {
        left: `
            <h2>8. Advanced Workshop</h2>
            <p>ลองสร้าง <b>Interactive Form</b> ของนายเองโดยใช้ความรู้ทั้งหมดที่เรียนมา!</p>
            <textarea id="editor" spellcheck="false" oninput="updatePreview()">
<form>
  <fieldset>
    <legend>สมัครสมาชิก Advance</legend>
    <label>เลือกสีธีม:</label>
    <input type="color"><br><br>
    <label>ระดับความเก่ง (0-100):</label>
    <input type="range" min="0" max="100">
    <br><br>
    <button type="button">ยืนยันข้อมูล</button>
  </fieldset>
</form></textarea>
        `,
        right: `
            <h4>Live Preview:</h4>
            <div id="live-preview"></div>
            <div class="tip-box" style="background: #e0aaff; border-color: #c77dff;">
                <i class="bi bi-award-fill"></i> <b>Mastery Unlocked!</b><br>
                นายจบ Unit 06 แล้ว! ตอนนี้ฝีมือการเขียนโครงสร้าง HTML ของนายเข้าขั้นมือโปรแล้วล่ะ!
            </div>
        `
    }
];

    let currentPage = 0;
    let isOpen = false;

    document.getElementById('totalPage').innerText = content.length;

    function openBook() {
        if (isOpen) return;
        isOpen = true;
        document.getElementById('wrapper').classList.add('is-open');
        document.getElementById('bookCover').classList.add('opened');
        setTimeout(renderPage, 300);
    }

    function renderPage() {
        const set = content[currentPage];
        const left = document.getElementById('left-page');
        const right = document.getElementById('right-page');
        const nextBtn = document.getElementById('nextBtn');
        
        left.style.opacity = 0;
        right.style.opacity = 0;
        
        setTimeout(() => {
            left.innerHTML = set.left;
            right.innerHTML = set.right;
            left.style.opacity = 1;
            right.style.opacity = 1;
            
            document.getElementById('pageNum').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = currentPage === 0;

           if (currentPage === content.length - 1) {
                nextBtn.innerHTML = '<span>ไปบทถัดไป</span> <i class="bi bi-arrow-right-short"></i>';
                nextBtn.classList.add('btn-next-chapter');
                nextBtn.onclick = () => window.location.href = 'lesson7.html';
                // รันฟังก์ชันพรีวิวทันทีที่เปิดหน้า 8
                updatePreview();
            } else {
                nextBtn.innerHTML = '<span>หน้าถัดไป</span> <i class="bi bi-chevron-right"></i>';
                nextBtn.classList.remove('btn-next-chapter');
                nextBtn.onclick = () => changePage(1);
            }
        }, 150);
    }

    function changePage(step) {
        if (currentPage + step >= 0 && currentPage + step < content.length) {
            currentPage += step;
            renderPage();
        }
    }

    function updatePreview() {
        const code = document.getElementById('editor').value;
        const preview = document.getElementById('live-preview');
        if(preview) {
            preview.innerHTML = code;
        }
    }
</script>
</body>
</html>
